name: 'Setup Monorepo'
description: 'Sets up Node, Python, pnpm, and installs dependencies'
runs:
  using: 'composite'
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v5

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Run prepublish and build
      run: |
        pnpm --recursive run prepublish --if-present
        pnpm --recursive run prepublishOnly --if-present
        pnpm --recursive run build --if-present
      shell: bash
