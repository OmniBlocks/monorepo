name: ESLint Autofix

on:
  issue_comment:
    types: [created, edited]  # 'edited' catches checkbox changes!

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  autofix-lint:
    # Trigger on EITHER slash command OR checkbox
    if: >-
      github.event_name == 'issue_comment' && 
      github.event.issue.pull_request &&
      (
        (
          github.event.sender.type == 'User' &&
          contains(github.event.comment.body, '/fix lint')
        ) ||
        (
          github.event.comment.user.login == 'github-actions[bot]' &&
          (
            contains(github.event.comment.body, '[x] 🎨 Auto-fix ESLint issues') ||
            contains(github.event.comment.body, '[X] 🎨 Auto-fix ESLint issues')
          )
        )
      )
    runs-on: ubuntu-latest

    steps:
      - name: Detect trigger method
        id: trigger
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            const isSlashCommand = body.includes('/fix lint');
            const isCheckbox = body.includes('[x] 🎨 Auto-fix ESLint issues') || 
                               body.includes('[X] 🎨 Auto-fix ESLint issues');
            
            console.log(`Slash command: ${isSlashCommand}`);
            console.log(`Checkbox: ${isCheckbox}`);
            console.log(`Action: ${context.payload.action}`);
            
            // Prevent double-trigger: only run on 'edited' if checkbox is checked
            if (context.payload.action === 'edited' && !isCheckbox) {
              console.log('Edit action but checkbox not checked - skipping');
              core.setFailed('Checkbox not checked - ignoring edit');
              return { shouldRun: false };
            }
            
            return {
              method: isCheckbox ? 'checkbox' : 'command',
              shouldRun: isSlashCommand || isCheckbox
            };

      - name: Check user permissions
        id: permission_check
        uses: actions/github-script@v7
        with:
          script: |
            // Only allow collaborators/maintainers to trigger autofix
            const permission = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            
            const allowedRoles = ['admin', 'maintain', 'write'];
            const hasPermission = allowedRoles.includes(permission.data.permission);
            
            console.log(`User: ${context.payload.comment.user.login}`);
            console.log(`Permission: ${permission.data.permission}`);
            console.log(`Has permission: ${hasPermission}`);
            
            if (!hasPermission) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ Sorry @${context.payload.comment.user.login}, only collaborators can trigger autofixes for security reasons! 🔒\n\n` +
                      `You need write access to this repository to use the autofix feature.`
              });
              core.setFailed('User does not have permission');
            }
            
            return hasPermission;

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const isFork = pr.data.head.repo.full_name !== pr.data.base.repo.full_name;
            
            console.log(`PR #${pr.data.number}`);
            console.log(`Head: ${pr.data.head.ref} (${pr.data.head.repo.full_name})`);
            console.log(`Base: ${pr.data.base.ref} (${pr.data.base.repo.full_name})`);
            console.log(`Is fork: ${isFork}`);
            
            return {
              number: pr.data.number,
              isFork,
              headRef: pr.data.head.ref,
              headSha: pr.data.head.sha,
              headRepo: pr.data.head.repo.full_name
            };

      - name: React to trigger
        uses: actions/github-script@v7
        with:
          script: |
            const triggerMethod = ${{ steps.trigger.outputs.result }}.method;
            const reaction = triggerMethod === 'checkbox' ? 'eyes' : 'rocket';
            
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: reaction
            });

      - name: Post starting comment
        id: status_comment
        uses: actions/github-script@v7
        with:
          script: |
            const triggerMethod = ${{ steps.trigger.outputs.result }}.method;
            const triggerText = triggerMethod === 'checkbox' 
              ? 'checkbox selection' 
              : '`/fix lint` command';
            
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🎨 **ESLint Autofix Started!**\n\n` +
                    `Triggered by @${context.payload.comment.user.login} via ${triggerText}\n\n` +
                    `🔄 Running ESLint with \`--fix\` on changed files...`
            });
            
            return comment.data.id;

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).headRef }}
          repository: ${{ fromJSON(steps.pr.outputs.result).headRepo }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      

      - name: Get changed JS/JSX files
        id: changed_files
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100
            });
            
            const jsFiles = files
              .filter(f => f.status !== 'removed')
              .filter(f => /\.(js|jsx)$/.test(f.filename))
              .map(f => f.filename)
              .join(' ');
            
            console.log(`Found ${jsFiles.split(' ').filter(Boolean).length} JS/JSX files`);
            
            return jsFiles;
          result-encoding: string
          
      - name: Install jq
        run: |
          if ! sudo apt-get install -y jq; then
            echo "Error: Failed to install jq"
            exit 1
          fi


      - name: Run ESLint --fix and capture output
        id: autofix
        run: |
          FILES="${{ steps.changed_files.outputs.result }}"
          
          # Exit if no JS files
          if [ -z "$FILES" ]; then
            echo "No JS/JSX files to fix!"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "no_files=true" >> $GITHUB_OUTPUT
            exit 0
          fi
      
          # Run ESLint and save JSON output
          echo "🔧 Running ESLint --fix..."
          npx eslint "$FILES" --format=json --fix > eslint-report.json || true
      
          # Check if fixes were made
          if [[ -z $(git status --porcelain) ]]; then
            echo "✨ No fixes needed!"
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "no_files=false" >> $GITHUB_OUTPUT
          else
            echo "🎉 Files were fixed!"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            
            # Parse JSON to count fixed rules
            if [ -f "eslint-report.json" ] && [ -s "eslint-report.json" ]; then
              FIXED_RULES=$(jq -r '.[] | .messages[] | select(.fix != null) | .ruleId' eslint-report.json 2>/dev/null | sort | uniq -c || echo "")
            else
              FIXED_RULES=""
            fi
            
            echo "fixed_rules<<EOF" >> $GITHUB_OUTPUT
            echo "$FIXED_RULES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push fixes
        if: steps.autofix.outputs.has_changes == 'true' && fromJSON(steps.pr.outputs.result).isFork == false
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          
          # Using echo instead of heredoc
          echo -e "🎨 Auto-fix ESLint issues\n\nFixed the following:\n${{ steps.autofix.outputs.fixed_rules }}\n\nTriggered by @${{ github.event.comment.user.login }}\nCo-authored-by: ${{ github.event.comment.user.login }} <${{ github.event.comment.user.id }}+${{ github.event.comment.user.login }}@users.noreply.github.com>" > commit_message.txt
          
          git commit -F commit_message.txt
          git push

          
          



      - name: Create patch for fork PRs
        if: >-
          steps.autofix.outputs.has_changes == 'true' && 
          fromJSON(steps.pr.outputs.result).isFork == true
        run: |
          git diff > eslint-autofix.patch
          echo "📦 Patch created for fork PR"

      - name: Upload patch artifact (fork PRs)
        if: >-
          steps.autofix.outputs.has_changes == 'true' && 
          fromJSON(steps.pr.outputs.result).isFork == true
        uses: actions/upload-artifact@v4
        with:
          name: eslint-autofix-patch-pr-${{ github.event.pull_request.number }}
          path: eslint-autofix.patch

      - name: Update checkbox (if used)
        if: steps.trigger.outputs.result.method == 'checkbox' && always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const comment = await github.rest.issues.getComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id
              });
              
              let body = comment.data.body;
              const success = '${{ steps.autofix.outputs.has_changes }}' === 'true';
              
              if (success) {
                body = body.replace(
                  /- \[x\] 🎨 Auto-fix ESLint issues/i,
                  '- [x] ~~🎨 Auto-fix ESLint issues~~ ✅ **Complete!**'
                );
              } else {
                body = body.replace(
                  /- \[x\] 🎨 Auto-fix ESLint issues/i,
                  '- [x] ~~🎨 Auto-fix ESLint issues~~ ⚠️ **No fixes needed**'
                );
              }
              
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                body: body
              });
            } catch (error) {
              console.error('Failed to update checkbox:', error);
            }

      - name: Post success comment
        if: steps.autofix.outputs.has_changes == 'true' && fromJSON(steps.pr.outputs.result).isFork == false
        uses: actions/github-script@v7
        with:
          script: |
            const fixedRules = `${{ steps.autofix.outputs.fixed_rules }}`.trim();
            let rulesTable = '';
            
            if (fixedRules) {
              rulesTable = '| Rule | Fixes Applied |\n|------|--------------:|\n';
              rulesTable += fixedRules.split('\n').map(line => {
                const match = line.trim().match(/^\s*(\d+)\s+(.+)$/);
                if (match) {
                  const [, count, rule] = match;
                  return `| ${rule} | ${count} |`;
                }
                return `| ${line.trim()} | - |`;
              }).join('\n');
            }
            
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.status_comment.outputs.result }},
              body: `🎨✨ **ESLint Autofix Complete!**\n\n` +
                    `The following lint issues were automatically fixed:\n\n` +
                    `${rulesTable || 'No fixable issues found.'}\n\n` +
                    `✅ Changes committed to branch. Check the latest commit for details.\n\n` +
                    `Triggered by @${{ github.event.comment.user.login }}`
            });

      - name: Post patch comment (fork PR)
        if: >-
          steps.autofix.outputs.has_changes == 'true' && 
          fromJSON(steps.pr.outputs.result).isFork == true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.status_comment.outputs.result }},
              body: `🎨 **ESLint Autofix Complete!**\n\n` +
                    `Since this is a fork PR, I can't push directly to your branch. But I've generated a patch file! 📦\n\n` +
                    `**To apply the fixes:**\n` +
                    `1. Download the patch from [workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n` +
                    `2. In your local repo: \`git apply eslint-autofix.patch\`\n` +
                    `3. Commit and push the changes\n\n` +
                    `**Or just run locally:**\n` +
                    `\`\`\`bash\n` +
                    `npx eslint . --fix\n` +
                    `git add .\n` +
                    `git commit -m "Fix ESLint issues"\n` +
                    `git push\n` +
                    `\`\`\`\n\n` +
                    `Triggered by @${{ github.event.comment.user.login }} ⚡`
            });

      - name: Post no-changes comment
        if: >-
          (steps.autofix.outputs.has_changes == 'false' && steps.autofix.outputs.no_files == 'false') ||
          steps.autofix.outputs.no_files == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const noFiles = '${{ steps.autofix.outputs.no_files }}' === 'true';
            const message = noFiles
              ? `No JS/JSX files were changed in this PR, so there's nothing to lint! 📝`
              : `ESLint ran with \`--fix\` but no changes were made. Either:\n` +
                `- ✅ All issues are already fixed! 🎉\n` +
                `- ⚠️ The remaining issues can't be auto-fixed (require manual intervention)\n\n` +
                `Check the [inline annotations](https://github.com/${{ github.repository }}/pulls/${{ github.event.issue.number }}/files) for details!`;
            
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.status_comment.outputs.result }},
              body: `✨ **No Fixes Needed!**\n\n${message}\n\n` +
                    `Triggered by @${{ github.event.comment.user.login }}`
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.status_comment.outputs.result }},
              body: `❌ **ESLint Autofix Failed!**\n\n` +
                    `Something went wrong during the autofix process.\n\n` +
                    `Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n\n` +
                    `Triggered by @${{ github.event.comment.user.login }}`
            });
