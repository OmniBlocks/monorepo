name: Check Bundle Size

on:
  workflow_dispatch: {}

jobs:
  measure:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Measure bundle sizes
        run: |
          echo "Bundle size report" > bundle-report.txt
          echo "" >> bundle-report.txt
          find build -type f -printf "%p = %k KB\n" >> bundle-report.txt
          echo "" >> bundle-report.txt
          echo "Total size (KB):" >> bundle-report.txt
          du -sk build | cut -f1 >> bundle-report.txt
          cat bundle-report.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: bundle-size-report
          path: bundle-report.txt
