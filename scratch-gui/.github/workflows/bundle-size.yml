name: Build React App (Skip Large JS Minify)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build with Webpack skipping large files
        run: |
          # Create a temporary webpack config that excludes huge files from Terser
          echo "
          const path = require('path');
          const TerserPlugin = require('terser-webpack-plugin');
          const baseConfig = require('./webpack.config.js');

          module.exports = {
            ...baseConfig,
            optimization: {
              ...baseConfig.optimization,
              minimizer: [
                new TerserPlugin({
                  exclude: /beepbox_editor\\.min\\.js|mario_paintbox_samples\\.js/,
                }),
              ],
            },
          };
          " > webpack.temp.config.js

          # Run webpack with the temporary config
          npx webpack --config webpack.temp.config.js --mode production

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
