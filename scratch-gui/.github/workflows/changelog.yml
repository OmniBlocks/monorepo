name: Changelog Updater

on:
  push:
    branches:
      - master
      - main
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Changelog for Commit
        if: github.event_name == 'push'
        run: |
          # Get the latest commit info
          COMMIT_SHA=$(git rev-parse HEAD)
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_BODY=$(git log -1 --pretty=%b)
          COMMIT_AUTHOR=$(git log -1 --pretty="%an")
          COMMIT_DATE=$(git log -1 --pretty=%ci)
          
          # Skip if this is the changelog update commit itself
          if [[ "$COMMIT_MSG" == *"update CHANGELOG.md"* ]] || [[ "$COMMIT_MSG" == *"[skip ci]"* ]]; then
            echo "Skipping changelog update for changelog commit"
            exit 0
          fi
          
          # Ensure CHANGELOG.md exists with markers
          if [ ! -f CHANGELOG.md ]; then
            cat > CHANGELOG.md << 'HEADER'
          # Changelog

          This file is automatically updated by the Changelog Updater bot.

          <!-- UNRELEASED_COMMITS_START -->
          <!-- UNRELEASED_COMMITS_END -->

          HEADER
          fi
          
          # Check if markers exist, add them if they don't
          if ! grep -q "UNRELEASED_COMMITS_START" CHANGELOG.md; then
            # Insert markers after the header
            sed -i '3 i <!-- UNRELEASED_COMMITS_START -->\n<!-- UNRELEASED_COMMITS_END -->\n' CHANGELOG.md
          fi
          
          # Create the new commit entry
          NEW_ENTRY="### Commit [\`${COMMIT_SHORT}\`](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA}) - ${COMMIT_DATE}

          **${COMMIT_MSG}**
          "
          
          # Add body if it exists and is not empty
          if [ -n "$COMMIT_BODY" ] && [ "$COMMIT_BODY" != "" ]; then
            NEW_ENTRY="${NEW_ENTRY}
          ${COMMIT_BODY}
          "
          fi
          
          NEW_ENTRY="${NEW_ENTRY}
          *Author: ${COMMIT_AUTHOR}*

          ---
          "
          
          # Insert the new entry after the START marker
          awk -v entry="$NEW_ENTRY" '
            /UNRELEASED_COMMITS_START/ { print; print ""; print entry; next }
            { print }
          ' CHANGELOG.md > CHANGELOG.md.tmp
          
          mv CHANGELOG.md.tmp CHANGELOG.md

      - name: Update Changelog for Release
        if: github.event_name == 'release'
        run: |
          # Get release info
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          RELEASE_NAME="${{ github.event.release.name }}"
          RELEASE_DATE=$(date -u +"%Y-%m-%d %H:%M:%S")
          
          # Get previous release tag
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "^${RELEASE_TAG}$" | head -n 1)
          
          # Determine if this is the initial release
          if [ -z "$PREV_TAG" ]; then
            RELEASE_SUBTITLE="### Initial release - All commits:"
          else
            RELEASE_SUBTITLE="### Changes since ${PREV_TAG}:"
          fi
          
          # Extract unreleased commits and convert to bullet list with descriptions
          UNRELEASED_COMMITS=""
          if [ -f CHANGELOG.md ] && grep -q "UNRELEASED_COMMITS_START" CHANGELOG.md; then
            # Extract content between markers, parse detailed entries
            UNRELEASED_SECTION=$(sed -n '/UNRELEASED_COMMITS_START/,/UNRELEASED_COMMITS_END/p' CHANGELOG.md | sed '1d;$d')
            
            # Process the unreleased section to extract commits with bodies
            echo "$UNRELEASED_SECTION" | awk '
              /^### Commit/ {
                if (commit_line != "") {
                  print commit_line
                  if (body != "") print body
                }
                commit_line = $0
                gsub(/^### Commit /, "- ", commit_line)
                gsub(/ - [0-9]{4}-[0-9]{2}-[0-9]{2}.*$/, "", commit_line)
                subject = ""
                body = ""
                author = ""
                next
              }
              /^\*\*.*\*\*$/ {
                subject = $0
                gsub(/\*\*/, "**", subject)
                commit_line = commit_line " " subject
                next
              }
              /^\*Author:/ {
                author = $0
                commit_line = commit_line " " author
                next
              }
              /^---$/ { next }
              /^[[:space:]]*$/ { next }
              {
                if (body == "") {
                  body = "  > " $0
                } else {
                  body = body "\n  > " $0
                }
              }
              END {
                if (commit_line != "") {
                  print commit_line
                  if (body != "") print body
                }
              }
            ' > /tmp/unreleased_commits.txt
            
            UNRELEASED_COMMITS=$(cat /tmp/unreleased_commits.txt)
          fi
          
          # If no unreleased commits in markers, get from git with bodies
          if [ -z "$UNRELEASED_COMMITS" ]; then
            if [ -z "$PREV_TAG" ]; then
              git log ${RELEASE_TAG} --pretty=format:"%H|||%h|||%s|||%an|||%b" | while IFS='|||' read -r hash short_hash subject author body; do
                echo "- [\`${short_hash}\`](https://github.com/${{ github.repository }}/commit/${hash}) **${subject}** - *${author}*"
                if [ -n "$body" ] && [ "$body" != "" ]; then
                  echo "$body" | sed 's/^/  > /'
                fi
              done > /tmp/unreleased_commits.txt
            else
              git log ${PREV_TAG}..${RELEASE_TAG} --pretty=format:"%H|||%h|||%s|||%an|||%b" | while IFS='|||' read -r hash short_hash subject author body; do
                echo "- [\`${short_hash}\`](https://github.com/${{ github.repository }}/commit/${hash}) **${subject}** - *${author}*"
                if [ -n "$body" ] && [ "$body" != "" ]; then
                  echo "$body" | sed 's/^/  > /'
                fi
              done > /tmp/unreleased_commits.txt
            fi
            UNRELEASED_COMMITS=$(cat /tmp/unreleased_commits.txt)
          fi
          
          # Create new release section
          RELEASE_SECTION="## Release [${RELEASE_TAG}](https://github.com/${{ github.repository }}/releases/tag/${RELEASE_TAG}) - ${RELEASE_DATE}
          "
          
          if [ -n "${RELEASE_NAME}" ]; then
            RELEASE_SECTION="${RELEASE_SECTION}
          **${RELEASE_NAME}**
          "
          fi
          
          RELEASE_SECTION="${RELEASE_SECTION}
          ${RELEASE_SUBTITLE}

          ${UNRELEASED_COMMITS}

          ---
          "
          
          # Create new changelog
          if [ -f CHANGELOG.md ]; then
            # Extract everything after the UNRELEASED_COMMITS_END marker
            EXISTING_RELEASES=$(sed -n '/UNRELEASED_COMMITS_END/,$p' CHANGELOG.md | tail -n +2)
            
            cat > CHANGELOG.md << 'HEADER'
          # Changelog

          This file is automatically updated by the Changelog Updater bot.

          <!-- UNRELEASED_COMMITS_START -->
          <!-- UNRELEASED_COMMITS_END -->

          HEADER
            
            echo "$RELEASE_SECTION" >> CHANGELOG.md
            echo "$EXISTING_RELEASES" >> CHANGELOG.md
          else
            cat > CHANGELOG.md << 'HEADER'
          # Changelog

          This file is automatically updated by the Changelog Updater bot.

          <!-- UNRELEASED_COMMITS_START -->
          <!-- UNRELEASED_COMMITS_END -->

          HEADER
            
            echo "$RELEASE_SECTION" >> CHANGELOG.md
          fi

      - name: Commit and Push Changes
        run: |
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update CHANGELOG.md [skip ci]"
            git push
          fi