name: AI Issue Polisher

on:
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write
  models: read # 👈 Required to use the GitHub Models inference API

jobs:
  polish:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: AI Inference
        id: ai
        uses: actions/ai-inference@v2
        with:
          model: gpt-4o # You can also use 'meta/llama-3-70b' or others
          system-prompt: |
            You are a technical editor for the OmniBlocks project.
            Perform the following tasks on the provided issue text:
            1. If it's not in English, translate it to English.
            2. Fix all grammar and spelling mistakes.
            3. If the idea is very short, expand it into a professional summary.
            4. Keep the output strictly in Markdown format.
          prompt: |
            Please polish the following issue content:
            ---
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

      - name: Update Issue
        uses: actions/github-script@v7
        with:
          script: |
            const polishedText = `${{ steps.ai.outputs.response }}`;
            const originalBody = context.payload.issue.body;

            const finalBody = `
            ${polishedText}

            ---
            <details>
            <summary>View original unedited text</summary>

            ${originalBody}

            </details>
            
            _Polished and Translated by GitHub Models AI_`;

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: finalBody
            });
