name: Initialize Changelog (One-time Setup)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  initialize-changelog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate Complete Changelog
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          
          echo "🚀 Initializing changelog..."
          echo "📦 Repository: ${REPO_URL}"
          
          # Create changelog header with markers
          cat > CHANGELOG.md << 'HEADER'
          # Changelog

          This file is automatically updated by the Changelog Updater bot.

          <!-- UNRELEASED_COMMITS_START -->
          HEADER
          
          # Get all tags sorted by date (newest first)
          mapfile -t TAGS < <(git tag --sort=-creatordate)
          TAG_COUNT=${#TAGS[@]}
          
          echo "🏷️  Found ${TAG_COUNT} releases"
          
          # If we have releases, add unreleased commits since the latest release
          if [ "$TAG_COUNT" -gt "0" ]; then
            LATEST_TAG="${TAGS[0]}"
            echo "📝 Adding unreleased commits since ${LATEST_TAG}..."
            
            # Get all commits since the last release with bodies
            git log ${LATEST_TAG}..HEAD --pretty=format:"%H|||%h|||%s|||%an|||%ci|||%b" | while IFS='|||' read -r hash short_hash subject author date body; do
              # Skip changelog bot commits and [skip ci] commits
              if [[ "$subject" == *"update CHANGELOG.md"* ]] || [[ "$subject" == *"[skip ci]"* ]]; then
                continue
              fi
              
              echo "### Commit [\`${short_hash}\`](${REPO_URL}/commit/${hash}) - ${date}"
              echo ""
              echo "**${subject}**"
              echo ""
              
              # Add body if it exists
              if [ -n "$body" ] && [ "$body" != "" ]; then
                echo "$body"
                echo ""
              fi
              
              echo "*Author: ${author}*"
              echo ""
              echo "---"
              echo ""
            done >> CHANGELOG.md
          fi
          
          # Close the unreleased section
          echo "<!-- UNRELEASED_COMMITS_END -->" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          if [ "$TAG_COUNT" -eq "0" ]; then
            echo "📝 No releases found, adding all commits..."
            
            echo "## All Commits" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            
            git log --pretty=format:"%H|||%h|||%s|||%an|||%ci|||%b" | while IFS='|||' read -r hash short_hash subject author date body; do
              echo "### Commit [\`${short_hash}\`](${REPO_URL}/commit/${hash}) - ${date}" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
              echo "**${subject}**" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
              
              if [ -n "$body" ] && [ "$body" != "" ]; then
                echo "$body" >> CHANGELOG.md
                echo "" >> CHANGELOG.md
              fi
              
              echo "*Author: ${author}*" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
              echo "---" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            done
          else
            # Process each release
            for i in "${!TAGS[@]}"; do
              CURRENT_TAG="${TAGS[$i]}"
              PREV_TAG=""
              
              # Get previous tag
              if [ $((i + 1)) -lt ${TAG_COUNT} ]; then
                PREV_TAG="${TAGS[$((i + 1))]}"
              fi
              
              TAG_DATE=$(git log -1 --format=%ci "${CURRENT_TAG}")
              
              echo "📋 Processing release ${CURRENT_TAG}..."
              
              # Determine if this is the initial release
              if [ -z "$PREV_TAG" ]; then
                RELEASE_SUBTITLE="### Initial release - All commits:"
                git log "${CURRENT_TAG}" --pretty=format:"%H|||%h|||%s|||%an|||%b" | while IFS='|||' read -r hash short_hash subject author body; do
                  echo "- [\`${short_hash}\`](${REPO_URL}/commit/${hash}) **${subject}** - *${author}*"
                  if [ -n "$body" ] && [ "$body" != "" ]; then
                    echo "$body" | sed 's/^/  > /'
                  fi
                done > /tmp/commits_${CURRENT_TAG}.txt
              else
                RELEASE_SUBTITLE="### Changes since ${PREV_TAG}:"
                git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"%H|||%h|||%s|||%an|||%b" | while IFS='|||' read -r hash short_hash subject author body; do
                  echo "- [\`${short_hash}\`](${REPO_URL}/commit/${hash}) **${subject}** - *${author}*"
                  if [ -n "$body" ] && [ "$body" != "" ]; then
                    echo "$body" | sed 's/^/  > /'
                  fi
                done > /tmp/commits_${CURRENT_TAG}.txt
              fi
              
              COMMITS=$(cat /tmp/commits_${CURRENT_TAG}.txt)
              
              {
                echo "## Release [${CURRENT_TAG}](${REPO_URL}/releases/tag/${CURRENT_TAG}) - ${TAG_DATE}"
                echo ""
                echo "${RELEASE_SUBTITLE}"
                echo ""
                echo "${COMMITS}"
                echo ""
                echo "---"
                echo ""
              } >> CHANGELOG.md
            done
          fi
          
          echo "✅ Changelog initialized successfully!"

      - name: Commit and Push Changelog
        run: |
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: reinitialize CHANGELOG.md with commit descriptions [skip ci]"
            git push
            echo "📄 CHANGELOG.md has been updated and pushed!"
          fi

      - name: Summary
        run: |
          if [ -f CHANGELOG.md ]; then
            LINE_COUNT=$(wc -l < CHANGELOG.md)
            echo "✅ Changelog reinitialized with ${LINE_COUNT} lines"
            echo "🎉 The changelog now includes commit descriptions!"
          fi