name: Update Contributor Leaderboard

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate stats
      
      - name: Generate Contributor Statistics
        id: stats
        run: |
          echo "ЁЯФе Generating contributor statistics..."
          
          # Create temporary files for data
          ALL_TIME_STATS=$(mktemp)
          LAST_30_DAYS_STATS=$(mktemp)
          LAST_YEAR_STATS=$(mktemp)
          
          # Get date 30 days ago and 1 year ago
          DATE_30_DAYS_AGO=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          DATE_1_YEAR_AGO=$(date -d '1 year ago' +%Y-%m-%d 2>/dev/null || date -v-1y +%Y-%m-%d)
          
          # Function to calculate stats - simpler and more reliable approach
          calculate_stats() {
            local time_filter="$1"
            local output_file="$2"
            
            echo "ЁЯУК Processing commits with filter: $time_filter" >&2
            
            # Get all unique authors
            authors=$(git log $time_filter --format='%aN' | sort -u)
            
            while IFS= read -r author; do
              if [ -z "$author" ]; then continue; fi
              
              echo "  Processing $author..." >&2
              
              # Count commits
              commits=$(git log $time_filter --author="$author" --oneline | wc -l)
              
              # Get additions and deletions using shortstat (most reliable for all commit types)
              stats=$(git log $time_filter --author="$author" --pretty=tformat: --numstat 2>/dev/null | \
                gawk '
                  BEGIN { add=0; del=0 }
                  # Skip binary files and submodule changes
                  $1 == "-" || $2 == "-" { next }
                  # Sum up numeric values
                  $1 ~ /^[0-9]+$/ && $2 ~ /^[0-9]+$/ { 
                    add += $1
                    del += $2
                  }
                  END { 
                    printf "%d %d", add, del
                  }
                ')
              
              additions=$(echo "$stats" | awk '{print $1}')
              deletions=$(echo "$stats" | awk '{print $2}')
              
              # If numstat gave us zeros, try shortstat as fallback (catches merge commits better)
              if [ "$additions" = "0" ] && [ "$deletions" = "0" ]; then
                shortstat=$(git log $time_filter --author="$author" --shortstat 2>/dev/null | \
                  gawk '
                    BEGIN { add=0; del=0 }
                    /insertion/ { 
                      match($0, /([0-9]+) insertion/, arr)
                      add += arr[1]
                    }
                    /deletion/ {
                      match($0, /([0-9]+) deletion/, arr)  
                      del += arr[1]
                    }
                    END {
                      printf "%d %d", add, del
                    }
                  ')
                additions=$(echo "$shortstat" | awk '{print $1}')
                deletions=$(echo "$shortstat" | awk '{print $2}')
              fi
              
              # Ensure we have valid numbers
              additions=${additions:-0}
              deletions=${deletions:-0}
              total_changes=$((additions + deletions))
              
              echo "$commits|$author|$additions|$deletions|$total_changes"
            done <<< "$authors" | sort -t'|' -k5 -rn > "$output_file"
          }
          
          # Calculate stats for each time period
          echo "ЁЯПЖ Calculating all-time statistics..." >&2
          calculate_stats "" "$ALL_TIME_STATS"
          
          echo "ЁЯУЕ Calculating last year statistics..." >&2
          calculate_stats "--since='$DATE_1_YEAR_AGO'" "$LAST_YEAR_STATS"
          
          echo "ЁЯФе Calculating last 30 days statistics..." >&2
          calculate_stats "--since='$DATE_30_DAYS_AGO'" "$LAST_30_DAYS_STATS"
          
          # Store file paths
          echo "all_time_stats=$ALL_TIME_STATS" >> $GITHUB_OUTPUT
          echo "last_30_days_stats=$LAST_30_DAYS_STATS" >> $GITHUB_OUTPUT
          echo "last_year_stats=$LAST_YEAR_STATS" >> $GITHUB_OUTPUT
          
          echo "тЬи Statistics generation complete!" >&2
      
      - name: Format Leaderboard
        id: format
        run: |
          ALL_TIME_STATS="${{ steps.stats.outputs.all_time_stats }}"
          LAST_30_DAYS_STATS="${{ steps.stats.outputs.last_30_days_stats }}"
          LAST_YEAR_STATS="${{ steps.stats.outputs.last_year_stats }}"
          
          # Generate markdown content
          cat > leaderboard.md << 'EOF'
          # ЁЯПЖ Contributor Leaderboard
          
          **Last Updated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ---
          
          ## ЁЯУК All-Time Statistics
          
          | Rank | Contributor | Commits | Additions тЮХ | Deletions тЮЦ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          EOF
          
          # Add all-time stats
          rank=1
          while IFS='|' read -r commits author additions deletions total; do
            if [ -n "$author" ]; then
              # Add medal emojis for top 3
              case $rank in
                1) rank_display="ЁЯеЗ 1" ;;
                2) rank_display="ЁЯеИ 2" ;;
                3) rank_display="ЁЯеЙ 3" ;;
                *) rank_display="$rank" ;;
              esac
              printf "| %s | %s | %s | %s | %s | %s |\n" "$rank_display" "$author" "$commits" "$additions" "$deletions" "$total" >> leaderboard.md
              rank=$((rank + 1))
              if [ "$rank" -gt 20 ]; then break; fi
            fi
          done < "$ALL_TIME_STATS"
          
          # Add last year section
          cat >> leaderboard.md << 'EOF'
          
          ---
          
          ## ЁЯУЕ Last Year Statistics
          
          | Rank | Contributor | Commits | Additions тЮХ | Deletions тЮЦ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          EOF
          
          rank=1
          while IFS='|' read -r commits author additions deletions total; do
            if [ -n "$author" ]; then
              # Add medal emojis for top 3
              case $rank in
                1) rank_display="ЁЯеЗ 1" ;;
                2) rank_display="ЁЯеИ 2" ;;
                3) rank_display="ЁЯеЙ 3" ;;
                *) rank_display="$rank" ;;
              esac
              printf "| %s | %s | %s | %s | %s | %s |\n" "$rank_display" "$author" "$commits" "$additions" "$deletions" "$total" >> leaderboard.md
              rank=$((rank + 1))
              if [ "$rank" -gt 15 ]; then break; fi
            fi
          done < "$LAST_YEAR_STATS"
          
          # Add last 30 days section
          cat >> leaderboard.md << 'EOF'
          
          ---
          
          ## ЁЯФе Last 30 Days Statistics
          
          | Rank | Contributor | Commits | Additions тЮХ | Deletions тЮЦ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          EOF
          
          rank=1
          while IFS='|' read -r commits author additions deletions total; do
            if [ -n "$author" ]; then
              # Add medal emojis for top 3
              case $rank in
                1) rank_display="ЁЯеЗ 1" ;;
                2) rank_display="ЁЯеИ 2" ;;
                3) rank_display="ЁЯеЙ 3" ;;
                *) rank_display="$rank" ;;
              esac
              printf "| %s | %s | %s | %s | %s | %s |\n" "$rank_display" "$author" "$commits" "$additions" "$deletions" "$total" >> leaderboard.md
              rank=$((rank + 1))
              if [ "$rank" -gt 10 ]; then break; fi
            fi
          done < "$LAST_30_DAYS_STATS"
          
          # Add footer
          cat >> leaderboard.md << 'EOF'
          
          ---
          
          ## ЁЯУИ Repository Summary
          
          EOF
          
          # Add repository summary
          total_commits=$(git rev-list --count HEAD)
          total_contributors=$(git log --format='%aN' | sort -u | wc -l)
          
          # Calculate totals using the same reliable method
          total_stats=$(git log --pretty=tformat: --numstat | gawk '
            BEGIN { add=0; del=0 }
            $1 == "-" || $2 == "-" { next }
            $1 ~ /^[0-9]+$/ && $2 ~ /^[0-9]+$/ { 
              add += $1
              del += $2
            }
            END { 
              printf "%d %d", add, del
            }
          ')
          
          total_additions=$(echo "$total_stats" | awk '{print $1}')
          total_deletions=$(echo "$total_stats" | awk '{print $2}')
          
          cat >> leaderboard.md << EOF
          - **Total Commits:** $total_commits
          - **Total Contributors:** $total_contributors
          - **Total Additions:** $total_additions тЮХ
          - **Total Deletions:** $total_deletions тЮЦ
          - **Net Changes:** $((total_additions - total_deletions))
          
          ---
          
          *This leaderboard is automatically updated daily by [GitHub Actions](https://github.com/${{ github.repository }}/actions/workflows/leaderboard.yml)*
          EOF
          
          # Evaluate the date command properly
          sed -i "s/\$(date -u.*)/$(date -u +"%Y-%m-%d %H:%M:%S UTC")/" leaderboard.md
          
          # Output the content
          echo "LEADERBOARD_CONTENT<<EOFMARKER" >> $GITHUB_OUTPUT
          cat leaderboard.md >> $GITHUB_OUTPUT
          echo "EOFMARKER" >> $GITHUB_OUTPUT
      
      - name: Update Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Update issue #275 with the leaderboard
          gh issue edit 275 \
            --body "${{ steps.format.outputs.LEADERBOARD_CONTENT }}" \
            --repo ${{ github.repository }}
          
          echo "тЬЕ Leaderboard updated successfully!"
