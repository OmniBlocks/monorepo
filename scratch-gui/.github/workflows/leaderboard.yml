name: Update Contributor Leaderboard

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for accurate stats
      
      - name: Generate Contributor Statistics
        id: stats
        run: |
          echo "Generating contributor statistics..."
          
          # Create temporary files for data
          ALL_TIME_STATS=$(mktemp)
          LAST_30_DAYS_STATS=$(mktemp)
          LAST_YEAR_STATS=$(mktemp)
          
          # Get date 30 days ago and 1 year ago
          DATE_30_DAYS_AGO=$(date -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -v-30d +%Y-%m-%d)
          DATE_1_YEAR_AGO=$(date -d '1 year ago' +%Y-%m-%d 2>/dev/null || date -v-1y +%Y-%m-%d)
          
          # Generate all-time stats
          git log --format='%aN' | sort | uniq -c | sort -rn | while read count author; do
            additions=$(git log --author="$author" --pretty=tformat: --numstat | awk '{add+=$1} END {print add+0}')
            deletions=$(git log --author="$author" --pretty=tformat: --numstat | awk '{del+=$2} END {print del+0}')
            total_changes=$((additions + deletions))
            echo "$count|$author|$additions|$deletions|$total_changes"
          done > "$ALL_TIME_STATS"
          
          # Generate last 30 days stats
          git log --since="$DATE_30_DAYS_AGO" --format='%aN' | sort | uniq -c | sort -rn | while read count author; do
            additions=$(git log --since="$DATE_30_DAYS_AGO" --author="$author" --pretty=tformat: --numstat | awk '{add+=$1} END {print add+0}')
            deletions=$(git log --since="$DATE_30_DAYS_AGO" --author="$author" --pretty=tformat: --numstat | awk '{del+=$2} END {print del+0}')
            total_changes=$((additions + deletions))
            echo "$count|$author|$additions|$deletions|$total_changes"
          done > "$LAST_30_DAYS_STATS"
          
          # Generate last year stats
          git log --since="$DATE_1_YEAR_AGO" --format='%aN' | sort | uniq -c | sort -rn | while read count author; do
            additions=$(git log --since="$DATE_1_YEAR_AGO" --author="$author" --pretty=tformat: --numstat | awk '{add+=$1} END {print add+0}')
            deletions=$(git log --since="$DATE_1_YEAR_AGO" --author="$author" --pretty=tformat: --numstat | awk '{del+=$2} END {print del+0}')
            total_changes=$((additions + deletions))
            echo "$count|$author|$additions|$deletions|$total_changes"
          done > "$LAST_YEAR_STATS"
          
          # Store file paths
          echo "all_time_stats=$ALL_TIME_STATS" >> $GITHUB_OUTPUT
          echo "last_30_days_stats=$LAST_30_DAYS_STATS" >> $GITHUB_OUTPUT
          echo "last_year_stats=$LAST_YEAR_STATS" >> $GITHUB_OUTPUT
      
      - name: Format Leaderboard
        id: format
        run: |
          ALL_TIME_STATS="${{ steps.stats.outputs.all_time_stats }}"
          LAST_30_DAYS_STATS="${{ steps.stats.outputs.last_30_days_stats }}"
          LAST_YEAR_STATS="${{ steps.stats.outputs.last_year_stats }}"
          
          # Generate markdown content
          cat > leaderboard.md << 'EOF'
          # 🏆 Contributor Leaderboard
          
          **Last Updated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ---
          
          ## 📊 All-Time Statistics
          
          | Rank | Contributor | Commits | Additions ➕ | Deletions ➖ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          EOF
          
          # Add all-time stats
          rank=1
          while IFS='|' read -r commits author additions deletions total; do
            if [ -n "$author" ]; then
              printf "| %d | %s | %s | %s | %s | %s |\n" "$rank" "$author" "$commits" "$additions" "$deletions" "$total" >> leaderboard.md
              rank=$((rank + 1))
              if [ "$rank" -gt 20 ]; then break; fi
            fi
          done < "$ALL_TIME_STATS"
          
          # Add last year section
          cat >> leaderboard.md << 'EOF'
          
          ---
          
          ## 📅 Last Year Statistics
          
          | Rank | Contributor | Commits | Additions ➕ | Deletions ➖ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          EOF
          
          rank=1
          while IFS='|' read -r commits author additions deletions total; do
            if [ -n "$author" ]; then
              printf "| %d | %s | %s | %s | %s | %s |\n" "$rank" "$author" "$commits" "$additions" "$deletions" "$total" >> leaderboard.md
              rank=$((rank + 1))
              if [ "$rank" -gt 15 ]; then break; fi
            fi
          done < "$LAST_YEAR_STATS"
          
          # Add last 30 days section
          cat >> leaderboard.md << 'EOF'
          
          ---
          
          ## 🔥 Last 30 Days Statistics
          
          | Rank | Contributor | Commits | Additions ➕ | Deletions ➖ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          EOF
          
          rank=1
          while IFS='|' read -r commits author additions deletions total; do
            if [ -n "$author" ]; then
              printf "| %d | %s | %s | %s | %s | %s |\n" "$rank" "$author" "$commits" "$additions" "$deletions" "$total" >> leaderboard.md
              rank=$((rank + 1))
              if [ "$rank" -gt 10 ]; then break; fi
            fi
          done < "$LAST_30_DAYS_STATS"
          
          # Add footer
          cat >> leaderboard.md << 'EOF'
          
          ---
          
          ## 📈 Repository Summary
          
          EOF
          
          # Add repository summary
          total_commits=$(git rev-list --count HEAD)
          total_contributors=$(git log --format='%aN' | sort -u | wc -l)
          total_additions=$(git log --pretty=tformat: --numstat | awk '{add+=$1} END {print add+0}')
          total_deletions=$(git log --pretty=tformat: --numstat | awk '{del+=$2} END {print del+0}')
          
          cat >> leaderboard.md << EOF
          - **Total Commits:** $total_commits
          - **Total Contributors:** $total_contributors
          - **Total Additions:** $total_additions ➕
          - **Total Deletions:** $total_deletions ➖
          - **Net Changes:** $((total_additions - total_deletions))
          
          ---
          
          *This leaderboard is automatically updated daily by [GitHub Actions](https://github.com/${{ github.repository }}/actions/workflows/leaderboard.yml)*
          EOF
          
          # Evaluate the date command properly
          sed -i "s/\$(date -u.*)/$(date -u +"%Y-%m-%d %H:%M:%S UTC")/" leaderboard.md
          
          # Output the content
          echo "LEADERBOARD_CONTENT<<EOFMARKER" >> $GITHUB_OUTPUT
          cat leaderboard.md >> $GITHUB_OUTPUT
          echo "EOFMARKER" >> $GITHUB_OUTPUT
      
      - name: Update Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Update issue #275 with the leaderboard
          gh issue edit 275 \
            --body "${{ steps.format.outputs.LEADERBOARD_CONTENT }}" \
            --repo ${{ github.repository }}
          
          echo "✅ Leaderboard updated successfully!"
      
      - name: Comment on Success
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 275 \
            --body "🤖 Leaderboard updated automatically on $(date -u +"%Y-%m-%d %H:%M:%S UTC")" \
            --repo ${{ github.repository }}
