name: Update Contributor Leaderboard

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate Contributor Statistics
        run: |
          echo "🔥 Generating contributor statistics..."
          
          # Function to generate stats for a time period
          generate_stats() {
            local since_flag="$1"
            local output_file="$2"
            
            # Get unique author emails and names
            git log $since_flag --format='%aN|%aE' | sort -u > /tmp/authors.txt
            
            while IFS='|' read -r name email; do
              # Count commits by email (exact match, no escaping needed!)
              commits=$(git log $since_flag --author="$email" --oneline | wc -l)
              
              if [ "$commits" -eq 0 ]; then continue; fi
              
              # Get stats by email
              stats=$(git log $since_flag --author="$email" --pretty=tformat: --numstat | \
                awk 'BEGIN {add=0; del=0} 
                     $1 != "-" && $2 != "-" && $1 ~ /^[0-9]+$/ && $2 ~ /^[0-9]+$/ {
                       add+=$1; del+=$2
                     } 
                     END {printf "%d %d", add, del}')
              
              add=$(echo "$stats" | cut -d' ' -f1)
              del=$(echo "$stats" | cut -d' ' -f2)
              total=$((add + del))
              
              echo "$commits|$name|$add|$del|$total"
            done < /tmp/authors.txt | sort -t'|' -k1 -rn > "$output_file"
          }
          
          # Generate all three time periods
          generate_stats "" "/tmp/all_time.txt"
          generate_stats "--since='1 year ago'" "/tmp/last_year.txt"
          generate_stats "--since='30 days ago'" "/tmp/last_30.txt"
          
          echo "all_time=/tmp/all_time.txt" >> $GITHUB_OUTPUT
          echo "last_year=/tmp/last_year.txt" >> $GITHUB_OUTPUT
          echo "last_30=/tmp/last_30.txt" >> $GITHUB_OUTPUT
        id: stats
      
      - name: Format Leaderboard
        run: |
          cat > leaderboard.md << 'HEADER'
          # 🏆 Contributor Leaderboard
          
          **Last Updated:** TIMESTAMP_PLACEHOLDER
          
          ---
          
          ## 📊 All-Time Statistics
          
          | Rank | Contributor | Commits | Additions ➕ | Deletions ➖ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          HEADER
          
          # Add all-time stats (top 20)
          rank=1
          while IFS='|' read commits name add del total; do
            [ -z "$name" ] && continue
            case $rank in
              1) medal="🥇 1" ;;
              2) medal="🥈 2" ;;
              3) medal="🥉 3" ;;
              *) medal="$rank" ;;
            esac
            echo "| $medal | $name | $commits | $add | $del | $total |" >> leaderboard.md
            rank=$((rank + 1))
            [ $rank -gt 20 ] && break
          done < ${{ steps.stats.outputs.all_time }}
          
          cat >> leaderboard.md << 'YEAR'
          
          ---
          
          ## 📅 Last Year Statistics
          
          | Rank | Contributor | Commits | Additions ➕ | Deletions ➖ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          YEAR
          
          # Add last year stats (top 15)
          rank=1
          while IFS='|' read commits name add del total; do
            [ -z "$name" ] && continue
            case $rank in
              1) medal="🥇 1" ;;
              2) medal="🥈 2" ;;
              3) medal="🥉 3" ;;
              *) medal="$rank" ;;
            esac
            echo "| $medal | $name | $commits | $add | $del | $total |" >> leaderboard.md
            rank=$((rank + 1))
            [ $rank -gt 15 ] && break
          done < ${{ steps.stats.outputs.last_year }}
          
          cat >> leaderboard.md << 'MONTH'
          
          ---
          
          ## 🔥 Last 30 Days Statistics
          
          | Rank | Contributor | Commits | Additions ➕ | Deletions ➖ | Total Changes |
          |------|-------------|---------|--------------|--------------|---------------|
          MONTH
          
          # Add last 30 days stats (top 10)
          rank=1
          while IFS='|' read commits name add del total; do
            [ -z "$name" ] && continue
            case $rank in
              1) medal="🥇 1" ;;
              2) medal="🥈 2" ;;
              3) medal="🥉 3" ;;
              *) medal="$rank" ;;
            esac
            echo "| $medal | $name | $commits | $add | $del | $total |" >> leaderboard.md
            rank=$((rank + 1))
            [ $rank -gt 10 ] && break
          done < ${{ steps.stats.outputs.last_30 }}
          
          # Add summary
          total_commits=$(git rev-list --count HEAD)
          total_contributors=$(git log --format='%aE' | sort -u | wc -l)
          total_stats=$(git log --pretty=tformat: --numstat | \
            awk 'BEGIN {add=0;del=0} $1!="-"&&$2!="-"&&$1~/^[0-9]+$/&&$2~/^[0-9]+$/ {add+=$1;del+=$2} END {print add,del}')
          total_add=$(echo "$total_stats" | cut -d' ' -f1)
          total_del=$(echo "$total_stats" | cut -d' ' -f2)
          
          cat >> leaderboard.md << FOOTER
          
          ---
          
          ## 📈 Repository Summary
          
          - **Total Commits:** $total_commits
          - **Total Contributors:** $total_contributors
          - **Total Additions:** $total_add ➕
          - **Total Deletions:** $total_del ➖
          - **Net Changes:** $((total_add - total_del))
          
          ---
          
          *This leaderboard is automatically updated daily by [GitHub Actions](https://github.com/${{ github.repository }}/actions/workflows/leaderboard.yml)*
          FOOTER
          
          # Replace timestamp
          sed -i "s/TIMESTAMP_PLACEHOLDER/$(date -u +'%Y-%m-%d %H:%M:%S UTC')/" leaderboard.md
          
          # Output for issue update
          {
            echo "BODY<<ENDOFBODY"
            cat leaderboard.md
            echo "ENDOFBODY"
          } >> $GITHUB_OUTPUT
        id: format
      
      - name: Update Issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit 275 --body "${{ steps.format.outputs.BODY }}"
          echo "✅ Leaderboard updated!"
