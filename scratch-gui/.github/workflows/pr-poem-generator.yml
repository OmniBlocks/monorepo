name: PR Poem Generator 🎭

on:
  pull_request:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

permissions:
  pull-requests: write
  contents: read

jobs:
  generate-pr-poem:
    runs-on: ubuntu-latest
    # Skip for bot PRs
    if: github.event.pull_request.user.type != 'Bot'
    
    steps:
      - name: Add Initial Reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              content: 'rocket'
            });
      
      - name: Generate PR Poem with AI
        id: generate-poem
        uses: actions/ai-inference@v1
        with:
          model: 'gpt-4o-mini'
          prompt: |
            You are a creative poet for the OmniBlocks scratch-gui project.
            
            Write a short, playful poem (4-8 lines) about this pull request:
            
            **PR Title:** ${{ github.event.pull_request.title }}
            **PR Description:**
            ${{ github.event.pull_request.body }}
            **Author:** @${{ github.event.pull_request.user.login }}
            
            Guidelines:
            - Keep it fun, lighthearted, and encouraging
            - Reference the PR changes creatively
            - Celebrate the contributor's effort
            - Use emojis sparingly (1-2 max)
            - Make it rhyme or have rhythm
            - Keep it under 100 words
            - Be respectful and professional
            
            Output only the poem, no explanations or metadata.
      
      - name: Post Poem Comment
        uses: actions/github-script@v7
        env:
          POEM: ${{ steps.generate-poem.outputs.response }}
        with:
          script: |
            const poem = process.env.POEM || 
              `A contribution so fine,
Your code will surely shine! ✨`;
            
            const comment = `## 🎭 Pull Request Poem

${poem}

---
_Generated with ❤️ by the OmniBlocks Poetry Bot_`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
            
            console.log('✅ Posted poem to PR #' + context.issue.number);