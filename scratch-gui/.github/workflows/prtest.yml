      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Create Lighthouse config
        run: |
          cat > lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "numberOfRuns": 1,
                "url": ["http://localhost:8080"]
              },
              "assert": {
                "preset": "lighthouse:no-pwa"
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF

      - name: Start HTTP server for Lighthouse
        run: |
          npx http-server build -p 8080 &
          echo $! > server.pid
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "Server is ready!"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Run Lighthouse CI
        id: lighthouse
        continue-on-error: true
        run: |
          lhci autorun || echo "Lighthouse completed with warnings"
          if [ -d ".lighthouseci" ] && [ "$(ls -A .lighthouseci 2>/dev/null)" ]; then
            echo "lighthouse_success=true" >> $GITHUB_OUTPUT
          else
            echo "lighthouse_success=false" >> $GITHUB_OUTPUT
          fi

      - name: Parse Lighthouse Results
        id: lighthouse_parse
        continue-on-error: true
        run: |
          if [ -d ".lighthouseci" ] && [ "$(ls -A .lighthouseci 2>/dev/null)" ]; then
            REPORT=$(find .lighthouseci -name "lhr-*.json" -type f | sort -r | head -1)
            
            if [ -f "$REPORT" ]; then
              # Extract scores (0-100 scale)
              PERFORMANCE=$(jq '.categories.performance.score * 100 | floor' "$REPORT" 2>/dev/null || echo "N/A")
              ACCESSIBILITY=$(jq '.categories.accessibility.score * 100 | floor' "$REPORT" 2>/dev/null || echo "N/A")
              BEST_PRACTICES=$(jq '.categories["best-practices"].score * 100 | floor' "$REPORT" 2>/dev/null || echo "N/A")
              SEO=$(jq '.categories.seo.score * 100 | floor' "$REPORT" 2>/dev/null || echo "N/A")
              
              echo "performance_score=${PERFORMANCE}" >> $GITHUB_OUTPUT
              echo "accessibility_score=${ACCESSIBILITY}" >> $GITHUB_OUTPUT
              echo "best_practices_score=${BEST_PRACTICES}" >> $GITHUB_OUTPUT
              echo "seo_score=${SEO}" >> $GITHUB_OUTPUT
              
              # Get key metrics
              FCP=$(jq '.audits["first-contentful-paint"].displayValue' "$REPORT" 2>/dev/null | tr -d '"' || echo "N/A")
              LCP=$(jq '.audits["largest-contentful-paint"].displayValue' "$REPORT" 2>/dev/null | tr -d '"' || echo "N/A")
              TBT=$(jq '.audits["total-blocking-time"].displayValue' "$REPORT" 2>/dev/null | tr -d '"' || echo "N/A")
              CLS=$(jq '.audits["cumulative-layout-shift"].displayValue' "$REPORT" 2>/dev/null | tr -d '"' || echo "N/A")
              SI=$(jq '.audits["speed-index"].displayValue' "$REPORT" 2>/dev/null | tr -d '"' || echo "N/A")
              
              echo "fcp=${FCP}" >> $GITHUB_OUTPUT
              echo "lcp=${LCP}" >> $GITHUB_OUTPUT
              echo "tbt=${TBT}" >> $GITHUB_OUTPUT
              echo "cls=${CLS}" >> $GITHUB_OUTPUT
              echo "speed_index=${SI}" >> $GITHUB_OUTPUT
              
              echo "lighthouse_parsed=true" >> $GITHUB_OUTPUT
            else
              echo "lighthouse_parsed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "lighthouse_parsed=false" >> $GITHUB_OUTPUT
          fi

