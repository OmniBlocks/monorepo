name: Mega PR Test & Analysis

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write
  checks: write  # 👈 NEW: Required for creating Check annotations!

jobs:
  skip-notice:
    if: >-
      (github.actor == 'dependabot[bot]') &&
      ((github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/test pr')))
    runs-on: ubuntu-latest
    
    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'issue_comment'
              ? context.issue.number
              : context.payload.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            const username = context.eventName === 'issue_comment'
            ? context.payload.comment.user.login
            : context.payload.pull_request.user.login;
              
            core.setOutput('number', pr.data.number);
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('base_sha', pr.data.base.sha);
            core.setOutput('username', username);


      - name: Post dependabot skip notice
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
              body: `# ℹ️ **Mega PR Test Skipped**\n\n` +
                    `The comprehensive PR test & analysis has been skipped for this pull request because it was created by Dependabot.\n\n` +
                    `Dependency update PRs are automatically excluded from the mega test workflow to avoid unnecessary CI resource usage.`
            });

      - name: Check changed files
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            
            // Fetch list of changed files via GitHub API
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });
            
            console.log(`Found ${files.length} changed file(s)`);
            files.forEach(f => console.log(`  - ${f.filename}`));
            
            // Check if any non-doc/config files changed
            const hasCodeChanges = files.some(f => 
              !f.filename.match(/\.(md|txt|yml|yaml)$/)
            );
            
            if (hasCodeChanges) {
              console.log("✅ Code changes detected - Mega PR test should run");
              core.setOutput('should_run', 'true');
            } else {
              console.log("📝 Only docs/config changed - skipping Mega PR test");
              core.setOutput('should_run', 'false');
            }

      - name: Post skip notice
        if: steps.check.outputs.should_run == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const username = '${{ steps.pr.outputs.username }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: `# ℹ️ **Mega PR Test Skipped**
                    `Hi @${username}! The comprehensive Mega PR test was skipped because this PR only changes documentation or configuration files (.md, .txt, .yml).
                    `_To force the Mega PR test to run, comment \`/test pr\` on this PR._`
            });

  mega-test:
    if: >-
      (github.actor != 'dependabot[bot]') &&
      ((github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/test pr')))
    runs-on: ubuntu-latest

    steps:
      - name: Record start time
        id: start_time
        run: echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Sanitize actor name
        id: sanitize_actor
        run: |
          ACTOR="${{ github.actor }}"
          # Remove [bot] suffix from actor name for file paths and URLs
          SANITIZED_ACTOR="${ACTOR%\[bot\]}"
          echo "sanitized_actor=$SANITIZED_ACTOR" >> $GITHUB_OUTPUT
          echo "Sanitized actor: $ACTOR -> $SANITIZED_ACTOR"

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'issue_comment'
              ? context.issue.number
              : context.payload.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            return {
              ref: pr.data.head.ref,
              sha: pr.data.head.sha,
              number: pr.data.number
            };

      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.0
        with:
          workflow_id: 'prtest.yml'
          access_token: ${{ github.token }}
          all_but_latest: true

      - name: React to comment (if triggered by comment)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Post initial comment
        id: mega_comment
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ fromJSON(steps.pr.outputs.result).number }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `${checklist_spinner} Checkout & Setup\n` +
                    `⬜ Installing dependencies\n` +
                    `⬜ Building project\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `⬜ Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing`
            });
            return comment.data.id;

      # ============================================================
      # BUILD PHASE
      # ============================================================

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Update comment - Installing Dependencies
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `${checklist_spinner} Installing dependencies\n` +
                    `⬜ Building project\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `⬜ Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing`
            });

      - name: Install dependencies
        run: npm ci

      - name: Update comment - Building
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `${checklist_spinner} Building project\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `⬜ Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing`
            });

      # 🗺️ NEW: Enable source maps for better error reporting!
      - name: Build website
        run: npm run build
        env:
          NODE_ENV: production
          SOURCEMAP: source-map  # 👈 Enables source maps in CI builds!

      # ============================================================
      # DEPLOYMENT PHASE (MOVED UP BEFORE TESTS)
      # ============================================================

      - name: Update comment - Deploying
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `${checklist_spinner} Deploying to test environment\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `⬜ Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing`
            });

      - name: Prepare per-PR directory
        run: |
          mkdir -p ./public/${{ steps.sanitize_actor.outputs.sanitized_actor }}/${{ fromJSON(steps.pr.outputs.result).number }}
          cp -r ./build/* ./public/${{ steps.sanitize_actor.outputs.sanitized_actor }}/${{ fromJSON(steps.pr.outputs.result).number }}/
          touch ./public/.nojekyll

      - name: Checkout gh-pages branch
        id: checkout_gh_pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
        continue-on-error: true

      - name: Create gh-pages branch if not exists
        if: steps.checkout_gh_pages.outcome == 'failure'
        run: |
          mkdir -p gh-pages
          cd gh-pages
          git init -b gh-pages
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Sync files to gh-pages
        run: |
          mkdir -p gh-pages/${{ steps.sanitize_actor.outputs.sanitized_actor }}/${{ fromJSON(steps.pr.outputs.result).number }}
          cp -r public/${{ steps.sanitize_actor.outputs.sanitized_actor }}/${{ fromJSON(steps.pr.outputs.result).number }}/* gh-pages/${{ steps.sanitize_actor.outputs.sanitized_actor }}/${{ fromJSON(steps.pr.outputs.result).number }}/
          cp public/.nojekyll gh-pages/ || true

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Deploy PR ${{ fromJSON(steps.pr.outputs.result).number }} by ${{ steps.sanitize_actor.outputs.sanitized_actor }}"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin gh-pages
          else
            echo "No changes to commit."
          fi

      - name: Update comment - Deployment Done
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `✅ Deploying to test environment\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${checklist_spinner} Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing`
            });

      # ============================================================
      # TESTING PHASE
      # ============================================================

      # 🔥 NEW: Fixed ESLint OOM with memory limit!
      - name: Run ESLint
        id: lint
        continue-on-error: true
        env:
          NODE_OPTIONS: --max-old-space-size=4096  # 👈 4GB limit prevents OOM!
        run: |
          npm run test:lint 2>&1 | tee lint-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "lint_status=passed" >> $GITHUB_OUTPUT
            echo "lint_errors=0" >> $GITHUB_OUTPUT
            echo "lint_warnings=0" >> $GITHUB_OUTPUT
          else
            echo "lint_status=failed" >> $GITHUB_OUTPUT
            ERRORS=$(grep -E '^\s+[0-9]+:[0-9]+\s+error\s+' lint-output.txt | wc -l || echo "0")
            WARNINGS=$(grep -E '^\s+[0-9]+:[0-9]+\s+warning\s+' lint-output.txt | wc -l || echo "0")
            echo "lint_errors=${ERRORS:-0}" >> $GITHUB_OUTPUT
            echo "lint_warnings=${WARNINGS:-0}" >> $GITHUB_OUTPUT
          fi

      - name: Update comment - Running Unit Tests
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === 'passed' ? '✅' : '❌';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `✅ Deploying to test environment\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${lintStatus} Running linter (ESLint)\n` +
                    `${checklist_spinner} Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing`
            });

      - name: Run Unit Tests
        id: unit_tests
        continue-on-error: true
        run: |
          npm run test:unit 2>&1 | tee unit-test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "unit_status=passed" >> $GITHUB_OUTPUT
          else
            echo "unit_status=failed" >> $GITHUB_OUTPUT
          fi
          
          TOTAL=$(grep -oP '\d+(?= tests?)' unit-test-output.txt | head -1)
          PASSED=$(grep -oP '\d+(?= passed)' unit-test-output.txt | head -1)
          FAILED=$(grep -oP '\d+(?= failed)' unit-test-output.txt | head -1)
          SKIPPED=$(grep -oP '\d+(?= skipped)' unit-test-output.txt | head -1)
          
          echo "unit_total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "unit_passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "unit_failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "unit_skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Update comment - Running Integration Tests
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === 'passed' ? '✅' : '❌';
            const unitStatus = '${{ steps.unit_tests.outputs.unit_status }}' === 'passed' ? '✅' : '❌';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `✅ Deploying to test environment\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${lintStatus} Running linter (ESLint)\n` +
                    `${unitStatus} Running unit tests\n` +
                    `${checklist_spinner} Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing`
            });

      - name: Run Integration Tests
        id: integration_tests
        continue-on-error: true
        run: |
          npm run test:integration 2>&1 | tee integration-test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "integration_status=passed" >> $GITHUB_OUTPUT
          else
            echo "integration_status=failed" >> $GITHUB_OUTPUT
          fi
          
          TOTAL=$(grep -oP '\d+(?= tests?)' integration-test-output.txt | head -1)
          PASSED=$(grep -oP '\d+(?= passed)' integration-test-output.txt | head -1)
          FAILED=$(grep -oP '\d+(?= failed)' integration-test-output.txt | head -1)
          SKIPPED=$(grep -oP '\d+(?= skipped)' integration-test-output.txt | head -1)
          
          echo "integration_total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "integration_passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "integration_failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "integration_skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      # 🎯 NEW: Create inline annotations from test errors!
      - name: Create GitHub Check annotations from test errors
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const annotations = [];
            
            // Parse unit test output for errors with stack traces
            if (fs.existsSync('unit-test-output.txt')) {
              const unitOutput = fs.readFileSync('unit-test-output.txt', 'utf8');
              
              // Pattern to match JavaScript stack trace locations: at file.js:line:column
              const errorPattern = /at\s+.*?\(([^)]+):(\d+):(\d+)\)/g;
              const lines = unitOutput.split('\n');
              
              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                
                // Check if this is an error line
                if (line.includes('Error:') || line.includes('FAIL')) {
                  let errorMessage = line.trim();
                  
                  // Look ahead for stack trace
                  let match;
                  for (let j = i; j < Math.min(i + 10, lines.length); j++) {
                    const stackLine = lines[j];
                    
                    while ((match = errorPattern.exec(stackLine)) !== null) {
                      let [_, filePath, lineNum, column] = match;
                      
                      // Clean up webpack:// URLs
                      if (filePath.startsWith('webpack:///')) {
                        filePath = filePath.replace('webpack:///', '');
                      }
                      
                      // Skip node_modules, external files, and non-src files
                      if (filePath.includes('node_modules') || 
                          filePath.startsWith('http') ||
                          (!filePath.startsWith('src/') && !filePath.startsWith('test/'))) {
                        continue;
                      }
                      
                      annotations.push({
                        path: filePath,
                        start_line: parseInt(lineNum) || 1,
                        end_line: parseInt(lineNum) || 1,
                        annotation_level: 'failure',
                        message: errorMessage,
                        title: '🧪 Unit Test Failure'
                      });
                    }
                  }
                }
              }
            }
            
            // Parse integration test output
            if (fs.existsSync('integration-test-output.txt')) {
              const integrationOutput = fs.readFileSync('integration-test-output.txt', 'utf8');
              const errorPattern = /at\s+.*?\(([^)]+):(\d+):(\d+)\)/g;
              const lines = integrationOutput.split('\n');
              
              for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                
                if (line.includes('Error:') || line.includes('FAIL')) {
                  let errorMessage = line.trim();
                  
                  let match;
                  for (let j = i; j < Math.min(i + 10, lines.length); j++) {
                    const stackLine = lines[j];
                    
                    while ((match = errorPattern.exec(stackLine)) !== null) {
                      let [_, filePath, lineNum, column] = match;
                      
                      if (filePath.startsWith('webpack:///')) {
                        filePath = filePath.replace('webpack:///', '');
                      }
                      
                      if (filePath.includes('node_modules') || 
                          filePath.startsWith('http') ||
                          (!filePath.startsWith('src/') && !filePath.startsWith('test/'))) {
                        continue;
                      }
                      
                      annotations.push({
                        path: filePath,
                        start_line: parseInt(lineNum) || 1,
                        end_line: parseInt(lineNum) || 1,
                        annotation_level: 'failure',
                        message: errorMessage,
                        title: '🎭 Integration Test Failure'
                      });
                    }
                  }
                }
              }
            }
            
            // Create GitHub Check with annotations (max 50 per request)
            if (annotations.length > 0) {
              const sha = '${{ fromJSON(steps.pr.outputs.result).sha }}';
              
              // Remove duplicates
              const uniqueAnnotations = annotations.filter((annotation, index, self) =>
                index === self.findIndex((a) => (
                  a.path === annotation.path && 
                  a.start_line === annotation.start_line &&
                  a.message === annotation.message
                ))
              );
              
              try {
                await github.rest.checks.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'Test Failures & Console Errors',
                  head_sha: sha,
                  status: 'completed',
                  conclusion: 'neutral',
                  output: {
                    title: `🎯 Found ${uniqueAnnotations.length} issue${uniqueAnnotations.length === 1 ? '' : 's'} in tests`,
                    summary: `Detected ${uniqueAnnotations.length} test failures or console errors with source-mapped locations.\n\n` +
                             `These have been annotated inline in the **Files Changed** tab! 🎉\n\n` +
                             `Check the exact lines where errors occurred to fix them faster! ⚡`,
                    annotations: uniqueAnnotations.slice(0, 50)  // GitHub limit: 50 per request
                  }
                });
                
                console.log(`✅ Created ${uniqueAnnotations.length} inline annotations!`);
              } catch (error) {
                console.error('Failed to create annotations:', error.message);
              }
            } else {
              console.log('🎉 No test errors found to annotate!');
            }

