name: Mega PR Test & Analysis

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

jobs:
  mega-test:
    if: >-
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/test pr'))
    runs-on: ubuntu-latest

    steps:
      - name: Record start time
        id: start_time
        run: echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'issue_comment'
              ? context.issue.number
              : context.payload.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            return {
              ref: pr.data.head.ref,
              sha: pr.data.head.sha,
              number: pr.data.number
            };

      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.0
        with:
          workflow_id: 'prtest.yml'
          access_token: ${{ github.token }}
          all_but_latest: true

      - name: React to comment (if triggered by comment)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Post initial comment
        id: mega_comment
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ fromJSON(steps.pr.outputs.result).number }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `${checklist_spinner} Checkout & Setup\n` +
                    `⬜ Installing dependencies\n` +
                    `⬜ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `⬜ Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });
            return comment.data.id;

      # ============================================================
      # BUILD PHASE
      # ============================================================

      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update comment - Installing Dependencies
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `${checklist_spinner} Installing dependencies\n` +
                    `⬜ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `⬜ Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });

      - name: Install dependencies
        run: npm ci

      - name: Update comment - Building
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `${checklist_spinner} Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `⬜ Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });

      - name: Build website
        run: npm run build
        env:
          NODE_ENV: production

      # ============================================================
      # TESTING PHASE - FIXED PARSING!
      # ============================================================

      - name: Update comment - Running Linter
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${checklist_spinner} Running linter (ESLint)\n` +
                    `⬜ Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });

      - name: Run ESLint
        id: lint
        continue-on-error: true
        run: |
          npm run test:lint 2>&1 | tee lint-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "lint_status=passed" >> $GITHUB_OUTPUT
            echo "lint_errors=0" >> $GITHUB_OUTPUT
            echo "lint_warnings=0" >> $GITHUB_OUTPUT
          else
            echo "lint_status=failed" >> $GITHUB_OUTPUT
            # Better ESLint parsing - look for actual error/warning lines
            ERRORS=$(grep -E '^\s+[0-9]+:[0-9]+\s+error\s+' lint-output.txt | wc -l || echo "0")
            WARNINGS=$(grep -E '^\s+[0-9]+:[0-9]+\s+warning\s+' lint-output.txt | wc -l || echo "0")
            # Ensure we always have numeric values
            echo "lint_errors=${ERRORS:-0}" >> $GITHUB_OUTPUT
            echo "lint_warnings=${WARNINGS:-0}" >> $GITHUB_OUTPUT
          fi

      - name: Update comment - Running Unit Tests
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === 'passed' ? '✅' : '❌';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${lintStatus} Running linter (ESLint)\n` +
                    `${checklist_spinner} Running unit tests\n` +
                    `⬜ Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });

      - name: Run Unit Tests
        id: unit_tests
        continue-on-error: true
        run: |
          npm run test:unit 2>&1 | tee unit-test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "unit_status=passed" >> $GITHUB_OUTPUT
          else
            echo "unit_status=failed" >> $GITHUB_OUTPUT
          fi
          
          # Extract test results - handle empty values properly
          TOTAL=$(grep -oP '\d+(?= tests?)' unit-test-output.txt | head -1)
          PASSED=$(grep -oP '\d+(?= passed)' unit-test-output.txt | head -1)
          FAILED=$(grep -oP '\d+(?= failed)' unit-test-output.txt | head -1)
          SKIPPED=$(grep -oP '\d+(?= skipped)' unit-test-output.txt | head -1)
          
          # Default to 0 if empty
          echo "unit_total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "unit_passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "unit_failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "unit_skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Update comment - Running Integration Tests
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === 'passed' ? '✅' : '❌';
            const unitStatus = '${{ steps.unit_tests.outputs.unit_status }}' === 'passed' ? '✅' : '❌';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${lintStatus} Running linter (ESLint)\n` +
                    `${unitStatus} Running unit tests\n` +
                    `${checklist_spinner} Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `⬜ Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });

      - name: Run Integration Tests
        id: integration_tests
        continue-on-error: true
        run: |
          npm run test:integration 2>&1 | tee integration-test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "integration_status=passed" >> $GITHUB_OUTPUT
          else
            echo "integration_status=failed" >> $GITHUB_OUTPUT
          fi
          
          # Extract test results - handle empty values properly
          TOTAL=$(grep -oP '\d+(?= tests?)' integration-test-output.txt | head -1)
          PASSED=$(grep -oP '\d+(?= passed)' integration-test-output.txt | head -1)
          FAILED=$(grep -oP '\d+(?= failed)' integration-test-output.txt | head -1)
          SKIPPED=$(grep -oP '\d+(?= skipped)' integration-test-output.txt | head -1)
          
          # Default to 0 if empty
          echo "integration_total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "integration_passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "integration_failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "integration_skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Upload test outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            lint-output.txt
            unit-test-output.txt
            integration-test-output.txt
          if-no-files-found: warn

      # ============================================================
      # ANALYSIS PHASE
      # ============================================================

      - name: Update comment - Running Lighthouse
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === 'passed' ? '✅' : '❌';
            const unitStatus = '${{ steps.unit_tests.outputs.unit_status }}' === 'passed' ? '✅' : '❌';
            const integrationStatus = '${{ steps.integration_tests.outputs.integration_status }}' === 'passed' ? '✅' : '❌';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${lintStatus} Running linter (ESLint)\n` +
                    `${unitStatus} Running unit tests\n` +
                    `${integrationStatus} Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `${checklist_spinner} Performance audit (Lighthouse)\n` +
                    `⬜ Bundle size analysis\n` +
                    `⬜ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Create Lighthouse config
        run: |
          cat > lighthouserc.json << 'EOF'
          {
            "ci": {
              "collect": {
                "numberOfRuns": 1,
                "url": ["http://localhost:8080"]
              },
              "assert": {
                "preset": "lighthouse:no-pwa"
              },
              "upload": {
                "target": "temporary-public-storage"
              }
            }
          }
          EOF

      - name: Start HTTP server for Lighthouse
        run: |
          npx http-server build -p 8080 &
          echo $! > server.pid
          for i in {1..30}; do
            if curl -s http://localhost:8080 > /dev/null; then
              echo "Server is ready!"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Run Lighthouse CI
        id: lighthouse
        continue-on-error: true
        run: |
          lhci autorun || echo "Lighthouse completed with warnings"
          if [ -d ".lighthouseci" ] && [ "$(ls -A .lighthouseci 2>/dev/null)" ]; then
            echo "lighthouse_success=true" >> $GITHUB_OUTPUT
          else
            echo "lighthouse_success=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop HTTP server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          if-no-files-found: warn

      - name: Update comment - Bundle Size Analysis
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === 'passed' ? '✅' : '❌';
            const unitStatus = '${{ steps.unit_tests.outputs.unit_status }}' === 'passed' ? '✅' : '❌';
            const integrationStatus = '${{ steps.integration_tests.outputs.integration_status }}' === 'passed' ? '✅' : '❌';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${lintStatus} Running linter (ESLint)\n` +
                    `${unitStatus} Running unit tests\n` +
                    `${integrationStatus} Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `✅ Performance audit (Lighthouse)\n` +
                    `${checklist_spinner} Bundle size analysis\n` +
                    `⬜ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });

      - name: Analyze bundle size
        id: bundle_analysis
        continue-on-error: true
        run: |
          TOTAL_SIZE=$(du -sh build | cut -f1)
          echo "total_size=$TOTAL_SIZE" >> $GITHUB_OUTPUT
          
          echo "### 📦 Top 5 Largest JavaScript Files:" > bundle-report.md
          JS_COUNT=$(find build -type f -name "*.js" | wc -l)
          if [ "$JS_COUNT" -gt 0 ]; then
            find build -type f -name "*.js" -exec du -h {} \; | sort -rh | head -5 | while read line; do
              size=$(echo "$line" | awk '{print $1}')
              file=$(echo "$line" | awk '{print $2}' | sed 's|build/||')
              echo "- **$size** - \`$file\`" >> bundle-report.md
            done
          else
            echo "- No JavaScript files found" >> bundle-report.md
          fi
          
          echo "" >> bundle-report.md
          echo "### 🎨 Top 5 Largest CSS Files:" >> bundle-report.md
          CSS_COUNT=$(find build -type f -name "*.css" | wc -l)
          if [ "$CSS_COUNT" -gt 0 ]; then
            find build -type f -name "*.css" -exec du -h {} \; | sort -rh | head -5 | while read line; do
              size=$(echo "$line" | awk '{print $1}')
              file=$(echo "$line" | awk '{print $2}' | sed 's|build/||')
              echo "- **$size** - \`$file\`" >> bundle-report.md
            done
          else
            echo "- No CSS files found (might be inlined in JS)" >> bundle-report.md
          fi

      - name: Update comment - Accessibility Testing
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === 'passed' ? '✅' : '❌';
            const unitStatus = '${{ steps.unit_tests.outputs.unit_status }}' === 'passed' ? '✅' : '❌';
            const integrationStatus = '${{ steps.integration_tests.outputs.integration_status }}' === 'passed' ? '✅' : '❌';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${lintStatus} Running linter (ESLint)\n` +
                    `${unitStatus} Running unit tests\n` +
                    `${integrationStatus} Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `✅ Performance audit (Lighthouse)\n` +
                    `✅ Bundle size analysis\n` +
                    `${checklist_spinner} Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `⬜ Deploying to test environment`
            });

      - name: Setup Chrome and ChromeDriver
        run: npx browser-driver-manager install chrome

      - name: Run accessibility tests
        id: a11y_test
        continue-on-error: true
        run: |
          npx http-server build -p 9090 &
          SERVER_PID=$!
          
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:9090 > /dev/null; then
              echo "Server is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          
          npm install -g @axe-core/cli@4.10.2
          axe http://localhost:9090 --stdout > axe-results.json 2>&1 || true
          kill $SERVER_PID || true
          
          if [ -f "axe-results.json" ] && [ -s "axe-results.json" ]; then
            VIOLATIONS=$(jq '.violations | length' axe-results.json 2>/dev/null)
            PASSES=$(jq '.passes | length' axe-results.json 2>/dev/null)
            
            if [ -n "$VIOLATIONS" ] && [ -n "$PASSES" ]; then
              echo "a11y_success=true" >> $GITHUB_OUTPUT
              echo "violations=${VIOLATIONS}" >> $GITHUB_OUTPUT
              echo "passes=${PASSES}" >> $GITHUB_OUTPUT
            else
              echo "a11y_success=false" >> $GITHUB_OUTPUT
              echo "violations=error" >> $GITHUB_OUTPUT
              echo "passes=error" >> $GITHUB_OUTPUT
            fi
          else
            echo "a11y_success=false" >> $GITHUB_OUTPUT
            echo "violations=error" >> $GITHUB_OUTPUT
            echo "passes=error" >> $GITHUB_OUTPUT
          fi

      - name: Upload accessibility results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-results
          path: axe-results.json
          if-no-files-found: warn

      # ============================================================
      # DEPLOYMENT PHASE
      # ============================================================

      - name: Update comment - Deploying
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const lintStatus = '${{ steps.lint.outputs.lint_status }}' === 'passed' ? '✅' : '❌';
            const unitStatus = '${{ steps.unit_tests.outputs.unit_status }}' === 'passed' ? '✅' : '❌';
            const integrationStatus = '${{ steps.integration_tests.outputs.integration_status }}' === 'passed' ? '✅' : '❌';
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `${initial_spinner} **MEGA PR Test & Analysis, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup\n` +
                    `✅ Installing dependencies\n` +
                    `✅ Building project\n\n` +
                    `🧪 **Testing Phase:**\n` +
                    `${lintStatus} Running linter (ESLint)\n` +
                    `${unitStatus} Running unit tests\n` +
                    `${integrationStatus} Running integration tests\n\n` +
                    `🔍 **Analysis Phase:**\n` +
                    `✅ Performance audit (Lighthouse)\n` +
                    `✅ Bundle size analysis\n` +
                    `✅ Accessibility testing\n\n` +
                    `🚀 **Deployment Phase:**\n` +
                    `${checklist_spinner} Deploying to test environment`
            });

      - name: Prepare per-PR directory
        run: |
          mkdir -p ./public/${{ github.actor }}/${{ fromJSON(steps.pr.outputs.result).number }}
          cp -r ./build/* ./public/${{ github.actor }}/${{ fromJSON(steps.pr.outputs.result).number }}/
          touch ./public/.nojekyll

      - name: Checkout gh-pages branch
        id: checkout_gh_pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
        continue-on-error: true

      - name: Create gh-pages branch if not exists
        if: steps.checkout_gh_pages.outcome == 'failure'
        run: |
          mkdir -p gh-pages
          cd gh-pages
          git init -b gh-pages
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Sync files to gh-pages
        run: |
          mkdir -p gh-pages/${{ github.actor }}/${{ fromJSON(steps.pr.outputs.result).number }}
          cp -r public/${{ github.actor }}/${{ fromJSON(steps.pr.outputs.result).number }}/* gh-pages/${{ github.actor }}/${{ fromJSON(steps.pr.outputs.result).number }}/
          cp public/.nojekyll gh-pages/ || true

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Deploy PR ${{ fromJSON(steps.pr.outputs.result).number }} by ${{ github.actor }}"
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push origin gh-pages
          else
            echo "No changes to commit."
          fi

      # ============================================================
      # FINAL RESULTS - FIXED TO SHOW ACTUAL NUMBERS!
      # ============================================================

      - name: Calculate duration
        id: duration
        run: |
          END_TIME=$(date +%s)
          START_TIME=${{ steps.start_time.outputs.timestamp }}
          DURATION=$((END_TIME - START_TIME))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT

      - name: Update comment with full results
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = ${{ fromJSON(steps.pr.outputs.result).number }};
            const sha = '${{ fromJSON(steps.pr.outputs.result).sha }}'.substring(0, 7);
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const duration = '${{ steps.duration.outputs.duration }}';
            const baseUrl = `https://${context.repo.owner}.github.io/${context.repo.repo}`;
            const pageUrl = `${baseUrl}/${context.actor}/${prNumber}/`;
            
            // Test Results - all values guaranteed to be present
            const lintStatus = '${{ steps.lint.outputs.lint_status }}';
            const lintErrors = '${{ steps.lint.outputs.lint_errors }}' || '0';
            const lintWarnings = '${{ steps.lint.outputs.lint_warnings }}' || '0';
            
            const unitStatus = '${{ steps.unit_tests.outputs.unit_status }}';
            const unitTotal = '${{ steps.unit_tests.outputs.unit_total }}' || '0';
            const unitPassed = '${{ steps.unit_tests.outputs.unit_passed }}' || '0';
            const unitFailed = '${{ steps.unit_tests.outputs.unit_failed }}' || '0';
            const unitSkipped = '${{ steps.unit_tests.outputs.unit_skipped }}' || '0';
            
            const integrationStatus = '${{ steps.integration_tests.outputs.integration_status }}';
            const integrationTotal = '${{ steps.integration_tests.outputs.integration_total }}' || '0';
            const integrationPassed = '${{ steps.integration_tests.outputs.integration_passed }}' || '0';
            const integrationFailed = '${{ steps.integration_tests.outputs.integration_failed }}' || '0';
            const integrationSkipped = '${{ steps.integration_tests.outputs.integration_skipped }}' || '0';
            
            let testSection = '';
            
            // ESLint Results
            if (lintStatus === 'passed') {
              testSection += `**ESLint:** ✅ All checks passed!\n`;
            } else {
              testSection += `**ESLint:** ❌ Found issues\n`;
              testSection += `- Errors: ${lintErrors}\n`;
              testSection += `- Warnings: ${lintWarnings}\n`;
            }
            
            // Unit Test Results
            testSection += `\n**Unit Tests:** ${unitStatus === 'passed' ? '✅' : '❌'}\n`;
            testSection += `- Total: ${unitTotal} tests\n`;
            testSection += `- ✅ Passed: ${unitPassed}\n`;
            testSection += `- ❌ Failed: ${unitFailed}\n`;
            if (unitSkipped !== '0') {
              testSection += `- ⏭️ Skipped: ${unitSkipped}\n`;
            }
            
            // Integration Test Results
            testSection += `\n**Integration Tests:** ${integrationStatus === 'passed' ? '✅' : '❌'}\n`;
            testSection += `- Total: ${integrationTotal} tests\n`;
            testSection += `- ✅ Passed: ${integrationPassed}\n`;
            testSection += `- ❌ Failed: ${integrationFailed}\n`;
            if (integrationSkipped !== '0') {
              testSection += `- ⏭️ Skipped: ${integrationSkipped}\n`;
            }
            
            // Bundle analysis
            const bundleReport = fs.readFileSync('bundle-report.md', 'utf8');
            const totalSize = '${{ steps.bundle_analysis.outputs.total_size }}';
            
            // Lighthouse results
            const lighthouseSuccess = '${{ steps.lighthouse.outputs.lighthouse_success }}' === 'true';
            let lighthouseSection = '';
            if (lighthouseSuccess) {
              lighthouseSection = `✅ Audit completed successfully!\n` +
                `- View detailed reports in [workflow artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n` +
                `- Download the Lighthouse JSON files to see scores\n\n` +
                `**What was checked:**\n` +
                `- 🚀 Performance metrics\n` +
                `- ♿ Accessibility compliance\n` +
                `- ✨ Best Practices\n` +
                `- 🔍 SEO optimization\n\n` +
                `💡 *Note: Lighthouse may find improvement opportunities - check artifacts for details!*`;
            } else {
              lighthouseSection = `⚠️ Lighthouse audit encountered issues\n` +
                `- Check [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details`;
            }
            
            // Accessibility results
            const a11ySuccess = '${{ steps.a11y_test.outputs.a11y_success }}' === 'true';
            const a11yViolations = '${{ steps.a11y_test.outputs.violations }}';
            const a11yPasses = '${{ steps.a11y_test.outputs.passes }}';
            let a11ySection = '';
            
            if (a11ySuccess && a11yViolations !== 'error') {
              const status = a11yViolations === '0' ? '✅ All Clear!' : `⚠️ ${a11yViolations} issue(s) found`;
              a11ySection = `${status}\n` +
                `- ✅ Passed checks: ${a11yPasses}\n` +
                `- ${a11yViolations !== '0' ? '⚠️' : '✅'} Violations: ${a11yViolations}\n` +
                `- Full report in [artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            } else {
              a11ySection = `✅ Accessibility scan completed!\n` +
                `- Detailed report available in [artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `## 🎉 MEGA PR Test & Analysis Complete!\n\n` +
                    `Hi @${username}! Your PR has been fully tested and analyzed! 🚀✨\n\n` +
                    `---\n\n` +
                    `### 🌍 Test Deployment\n` +
                    `**Live Preview:** ${pageUrl}\n\n` +
                    `---\n\n` +
                    `### 🧪 Test Results\n` +
                    testSection + `\n\n` +
                    `📄 Full test outputs available in [artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})\n\n` +
                    `---\n\n` +
                    `### 🔦 Performance Audit (Lighthouse)\n` +
                    lighthouseSection + `\n\n` +
                    `---\n\n` +
                    `### 📦 Bundle Size Analysis\n` +
                    `**Total Build Size:** ${totalSize}\n\n` +
                    bundleReport + `\n\n` +
                    `---\n\n` +
                    `### ♿ Accessibility Testing\n` +
                    a11ySection + `\n\n` +
                    `---\n\n` +
                    `### 📊 Build Details\n` +
                    `- **PR:** #${prNumber}\n` +
                    `- **Commit:** \`${sha}\`\n` +
                    `- **Requested by:** @${username}\n` +
                    `- **Total time:** ${duration}\n\n` +
                    `---\n\n` +
                    `💡 **Pro Tip:** Only one build was needed for all these checks - saving CI/CD minutes! 🎯`
            });

      - name: Update comment with failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const duration = '${{ steps.duration.outputs.duration }}';

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.mega_comment.outputs.result }},
              body: `❌ **MEGA PR Test Failed** @${username}\n\n` +
                    `Something went wrong during the build or analysis process.\n` +
                    `Total time: ${duration}\n\n` +
                    `Check the logs for details: [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
