      - name: Run accessibility tests
        id: a11y_test
        continue-on-error: true
        run: |
          npx http-server build -p 9090 &
          SERVER_PID=$!
          
          echo "Waiting for server to start..."
          for i in {1..30}; do
            if curl -s http://localhost:9090 > /dev/null; then
              echo "Server is ready!"
              break
            fi
            echo "Attempt $i/30..."
            sleep 2
          done
          
          npm install -g @axe-core/cli@4.10.2
          axe http://localhost:9090 --stdout > axe-results.json 2>&1 || true
          kill $SERVER_PID || true
          
          if [ -f "axe-results.json" ] && [ -s "axe-results.json" ]; then
            VIOLATIONS=$(jq '.violations | length' axe-results.json 2>/dev/null)
            PASSES=$(jq '.passes | length' axe-results.json 2>/dev/null)
            
            if [ -n "$VIOLATIONS" ] && [ -n "$PASSES" ]; then
              echo "a11y_success=true" >> $GITHUB_OUTPUT
              echo "violations=${VIOLATIONS}" >> $GITHUB_OUTPUT
              echo "passes=${PASSES}" >> $GITHUB_OUTPUT
            else
              echo "a11y_success=false" >> $GITHUB_OUTPUT
              echo "violations=error" >> $GITHUB_OUTPUT
              echo "passes=error" >> $GITHUB_OUTPUT
            fi
          else
            echo "a11y_success=false" >> $GITHUB_OUTPUT
            echo "violations=error" >> $GITHUB_OUTPUT
            echo "passes=error" >> $GITHUB_OUTPUT
          fi

      - name: Parse Accessibility Violations
        id: a11y_parse
        continue-on-error: true
        run: |
          if [ -f "axe-results.json" ] && [ -s "axe-results.json" ]; then
            echo "### Top Accessibility Violations:" > a11y-violations.md
            
            VIOLATION_COUNT=$(jq '.violations | length' axe-results.json 2>/dev/null || echo "0")
            
            if [ "$VIOLATION_COUNT" != "0" ] && [ "$VIOLATION_COUNT" != "null" ]; then
              for i in {0..4}; do
                ID=$(jq -r ".violations[$i].id // empty" axe-results.json 2>/dev/null)
                if [ -n "$ID" ]; then
                  IMPACT=$(jq -r ".violations[$i].impact // \"unknown\"" axe-results.json)
                  DESCRIPTION=$(jq -r ".violations[$i].description // \"No description\"" axe-results.json)
                  HELP=$(jq -r ".violations[$i].help // \"\"" axe-results.json)
                  HELP_URL=$(jq -r ".violations[$i].helpUrl // \"\"" axe-results.json)
                  NODE_COUNT=$(jq ".violations[$i].nodes | length" axe-results.json)
                  
                  echo "" >> a11y-violations.md
                  echo "**$((i+1)). $HELP** (Impact: \`$IMPACT\`)" >> a11y-violations.md
                  echo "- **Rule:** \`$ID\`" >> a11y-violations.md
                  echo "- **Description:** $DESCRIPTION" >> a11y-violations.md
                  echo "- **Affected elements:** $NODE_COUNT" >> a11y-violations.md
                  if [ -n "$HELP_URL" ]; then
                    echo "- **Learn more:** $HELP_URL" >> a11y-violations.md
                  fi
                fi
              done
              echo "a11y_parsed=true" >> $GITHUB_OUTPUT
            else
              echo "No violations found! ✨" > a11y-violations.md
              echo "a11y_parsed=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Could not parse accessibility results" > a11y-violations.md
            echo "a11y_parsed=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload accessibility results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accessibility-results
          path: |
            axe-results.json
            a11y-violations.md
          if-no-files-found: warn

