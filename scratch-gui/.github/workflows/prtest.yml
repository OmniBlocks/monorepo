name: Mega PR Test & Analysis

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write
  id-token: write
  issues: write

jobs:
  dependabot-skip-notice:
    if: >
      (github.actor == 'dependabot[bot]') &&
      ((github.event_name == 'pull_request') || (github.event_name == 'issue_comment'))
    runs-on: ubuntu-latest
    steps:
      - name: Skip notice for Dependabot
        run: echo "Dependabot detected; skipping notice"

  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy
        run: |
          echo "Deploying project..."
          npm run deploy

  test-and-analysis:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  comment-handler:
    if: github.event_name == 'issue_comment'
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Handle comment
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"

          echo "Processing comment: $COMMENT_BODY"

          # Example trigger
          if [[ "$COMMENT_BODY" == *"retest"* ]]; then
            echo "Triggering test rerun for PR #$ISSUE_NUMBER"

            curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/$REPO/issues/$ISSUE_NUMBER/comments \
              -d "{\"body\":\"Tests have been triggered! 🚀\"}"
          fi
