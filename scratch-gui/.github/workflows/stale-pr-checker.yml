name: Stale PR Reminder with AI 🤖

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  find-stale-prs:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.create-matrix.outputs.matrix }}
      has-prs: ${{ steps.create-matrix.outputs.has-prs }}
    
    steps:
      - name: Find stale PRs
        id: create-matrix
        uses: actions/github-script@v7
        with:
          script: |
            const STALE_DAYS = 7;
            const DIFF_SIZE_LIMIT = 5000;
            
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const now = new Date();
            const stalePRs = [];
            
            for (const pr of prs) {
              const updatedAt = new Date(pr.updated_at);
              const daysSinceUpdate = Math.floor((now - updatedAt) / (1000 * 60 * 60 * 24));
              
              if (daysSinceUpdate < STALE_DAYS) continue;
              
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              
              const recentReminder = comments.find(c => 
                c.user.login === 'github-actions[bot]' && 
                c.body.includes('🕐 Stale PR Reminder') &&
                (new Date() - new Date(c.created_at)) < 7 * 24 * 60 * 60 * 1000
              );
              
              if (recentReminder) {
                console.log(`Skipping PR #${pr.number} - already reminded recently`);
                continue;
              }
              
              let diffContext = '';
              try {
                const { data: diff } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  mediaType: { format: 'diff' }
                });
                
                const diffSize = Buffer.byteLength(diff, 'utf8');
                if (diffSize < DIFF_SIZE_LIMIT) {
                  const maxChars = 8000;
                  diffContext = diff.length > maxChars 
                    ? diff.substring(0, maxChars) + '\n\n[... diff truncated ...]'
                    : diff;
                }
              } catch (e) {
                console.log(`Could not fetch diff: ${e.message}`);
              }
              
              const recentCommentContext = comments.length > 0
                ? `Last comment ${Math.floor((new Date() - new Date(comments[comments.length - 1].created_at)) / (1000 * 60 * 60 * 24))} days ago by @${comments[comments.length - 1].user.login}`
                : 'No recent comments';
              
              stalePRs.push({
                number: pr.number,
                title: pr.title,
                author: pr.user.login,
                daysSinceUpdate: daysSinceUpdate,
                recentCommentContext: recentCommentContext,
                diffContext: diffContext || '(Diff too large to include)'
              });
            }
            
            core.setOutput('matrix', JSON.stringify(stalePRs));
            core.setOutput('has-prs', stalePRs.length > 0 ? 'true' : 'false');
            console.log(`Found ${stalePRs.length} stale PRs`);

  remind-stale-prs:
    needs: find-stale-prs
    if: needs.find-stale-prs.outputs.has-prs == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        pr: ${{ fromJson(needs.find-stale-prs.outputs.matrix) }}
      max-parallel: 5
      fail-fast: false
    
    steps:
      - name: Post reminder comment
        uses: actions/github-script@v7
        with:
          script: |
            const aiMessage = `Hey @${{ matrix.pr.author }}! 👋 This PR has been quiet for a while. Need any help getting it across the finish line? Feel free to ask! 🚀`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ matrix.pr.number }},
              body: `## 🕐 Stale PR Reminder\n\n${aiMessage}\n\n---\n\n_This is an automated friendly reminder. No pressure! 💙_`
            });
            
            console.log(`✅ Posted reminder to PR #${{ matrix.pr.number }}`);
