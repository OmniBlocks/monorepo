name: Stale PR Reminder with AI 🤖

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read
  issues: write

jobs:
  remind-stale-prs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Find and process stale PRs
        uses: actions/github-script@v7
        with:
          script: |
            const STALE_DAYS = 7;
            const DIFF_SIZE_LIMIT = 5000; // bytes
            
            // Get all open PRs
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });
            
            const now = new Date();
            
            for (const pr of prs) {
              const updatedAt = new Date(pr.updated_at);
              const daysSinceUpdate = Math.floor((now - updatedAt) / (1000 * 60 * 60 * 24));
              
              // Skip if not stale
              if (daysSinceUpdate < STALE_DAYS) continue;
              
              // Check if we already reminded them recently (within last 7 days)
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number
              });
              
              const recentReminder = comments.find(c => 
                c.user.login === 'github-actions[bot]' && 
                c.body.includes('🕐 Stale PR Reminder') &&
                (new Date() - new Date(c.created_at)) < 7 * 24 * 60 * 60 * 1000
              );
              
              if (recentReminder) {
                console.log(`Skipping PR #${pr.number} - already reminded recently`);
                continue;
              }
              
              console.log(`Processing stale PR #${pr.number}: ${pr.title}`);
              
              // Get PR diff
              let diffContext = '';
              try {
                const { data: diff } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  mediaType: { format: 'diff' }
                });
                
                const diffSize = Buffer.byteLength(diff, 'utf8');
                console.log(`Diff size: ${diffSize} bytes`);
                
                if (diffSize < DIFF_SIZE_LIMIT) {
                  // Include truncated diff in context
                  const maxChars = 8000; // Leave room for prompt
                  diffContext = diff.length > maxChars 
                    ? diff.substring(0, maxChars) + '\n\n[... diff truncated ...]'
                    : diff;
                }
              } catch (e) {
                console.log(`Could not fetch diff: ${e.message}`);
              }
              
              // Get recent comment context
              const recentCommentContext = comments.length > 0
                ? `Last comment ${Math.floor((new Date() - new Date(comments[comments.length - 1].created_at)) / (1000 * 60 * 60 * 24))} days ago by @${comments[comments.length - 1].user.login}`
                : 'No recent comments';
              
              // Build AI prompt
              const prompt = `You're a friendly, playful AI bot for OmniBlocks/scratch-gui (a Scratch editor fork).

Write a personalized stale PR reminder for:
- PR #${pr.number} by @${pr.author.login}
- Title: "${pr.title}"
- Days since last update: ${daysSinceUpdate}
- ${recentCommentContext}
${diffContext ? `Here's the PR diff:\n\`\`\`diff\n${diffContext}\n\`\`\`` : '(Diff too large to include)'}
Write a friendly 2-3 sentence reminder that:
- Acknowledges what the PR is trying to do
- Gently asks if they need help or if something is blocking progress
- Uses the playful OmniBlocks tone (emojis welcome! 🎨)
- Is encouraging, not pushy

Keep it under 200 words!`;
              
              // Write prompt to file for ai-inference action
              const fs = require('fs');
              fs.writeFileSync(`pr-${pr.number}-prompt.txt`, prompt);
              
              // Store PR info for later
              fs.appendFileSync('stale-prs.json', JSON.stringify({
                number: pr.number,
                author: pr.author.login
              }) + '\n');
            }
      
      - name: Generate AI response for each stale PR
        id: ai_responses
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read list of stale PRs
            if (!fs.existsSync('stale-prs.json')) {
              console.log('No stale PRs found!');
              return;
            }
            
            const stalePRs = fs.readFileSync('stale-prs.json', 'utf8')
              .trim()
              .split('\n')
              .filter(line => line)
              .map(line => JSON.parse(line));
            
            console.log(`Found ${stalePRs.length} stale PRs to process`);
            
            for (const pr of stalePRs) {
              console.log(`Generating AI message for PR #${pr.number}...`);
              
              // Read prompt
              const prompt = fs.readFileSync(`pr-${pr.number}-prompt.txt`, 'utf8');
              
              // Call AI inference action by writing a step file
              // (GitHub Actions doesn't support dynamic action calls in scripts)
              // So we'll do the API call directly like summary.yml does
              
              try {
                const response = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`
                  },
                  body: JSON.stringify({
                    messages: [
                      {
                        role: 'system',
                        content: 'You are a helpful, friendly AI assistant for a GitHub repository. Be concise, encouraging, and playful.'
                      },
                      {
                        role: 'user',
                        content: prompt
                      }
                    ],
                    model: 'gpt-4o-mini',
                    temperature: 0.8,
                    max_tokens: 300
                  })
                });
                
                if (!response.ok) {
                  throw new Error(`AI API returned ${response.status}`);
                }
                
                const data = await response.json();
                const aiMessage = data.choices[0].message.content.trim();
                
                console.log(`Generated message for PR #${pr.number}`);
                
                // Post the AI-generated comment!
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `## 🕐 Stale PR Reminder\n\n${aiMessage}\n\n---\n\n_This is an automated friendly reminder. No pressure! 💙_`
                });
                
                console.log(`✅ Posted AI reminder to PR #${pr.number}`);
                
              } catch (error) {
                console.error(`Failed to generate/post message for PR #${pr.number}:`, error);
                
                // Fallback to generic message if AI fails
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `## 🕐 Stale PR Reminder\n\nHey @${pr.author}! 👋 This PR has been quiet for a while. Need any help getting it across the finish line? Feel free to ask! 🚀\n\n---\n\n_This is an automated friendly reminder. No pressure! 💙_`
                });
              }
            }
