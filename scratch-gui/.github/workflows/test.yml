name: Build Monitor
on:
  push:
    branches: [ main ]

jobs:
  build-monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run build
      id: build
      run: |
        build_output=$(npm run build 2>&1)
        if [ $? -ne 0 ]; then
          echo "::set-output name=status::failure"
          echo "::set-output name=build_output::${build_output//$'\n'/'%0A'}"
        fi
        
    - name: Create issue if build failed
      if: steps.build.outputs.status == 'failure'
      uses: actions/github-script@v6
      with:
        script: |
          const buildOutput = `\`\`\`\n${process.env.BUILD_OUTPUT}\n\`\`\``;
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'build-failure'
          });
          
          // Check if an open issue with this label already exists
          const existingIssue = issues.find(issue => 
            issue.title.includes('Build Failure') && 
            issue.labels.some(label => label.name === 'build-failure')
          );
          
          if (!existingIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Failure - ${new Date().toISOString()}`,
              body: `The latest commit (${context.sha}) failed to build.\n\n**Build Output:**\n${buildOutput}\n\n[View Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['build-failure', 'bug']
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              body: `Another build failure detected in commit ${context.sha}.\n\n**Build Output:**\n${buildOutput}\n\n[View Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
          }
      env:
        BUILD_OUTPUT: ${{ steps.build.outputs.build_output }}
