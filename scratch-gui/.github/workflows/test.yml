name: Build Monitor
on:
  push:
    branches: [ main ]

jobs:
  build-monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check package.json
      id: check-package
      run: |
        if [ ! -f package.json ]; then
          echo "error=missing-package-json" >> $GITHUB_OUTPUT
          echo "Package.json file not found!"
        elif ! jq empty package.json 2>/dev/null; then
          echo "error=invalid-package-json" >> $GITHUB_OUTPUT
          json_error=$(jq empty package.json 2>&1 | head -1 || true)
          echo "json_error=$json_error" >> $GITHUB_OUTPUT
          echo "Package.json contains invalid JSON"
        fi
        
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      id: install
      run: |
        # Skip if package.json is invalid
        if [ "${{ steps.check-package.outputs.error }}" = "invalid-package-json" ] || [ "${{ steps.check-package.outputs.error }}" = "missing-package-json" ]; then
          echo "Skipping npm ci due to package.json issues"
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        npm ci 2>&1 | tee install-output.log || {
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "error=npm-ci-failed" >> $GITHUB_OUTPUT
          exit 1
        }
      
    - name: Run build
      id: build
      run: |
        # Skip if package.json is invalid or installation failed
        if [ "${{ steps.check-package.outputs.error }}" ] || [ "${{ steps.install.outputs.status }}" = "failure" ]; then
          echo "Skipping build due to previous failures"
          echo "status=failure" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        npm run build 2>&1 | tee build-output.log || {
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "error=build-failed" >> $GITHUB_OUTPUT
          exit 1
        }
      
    - name: Create issue if failed
      if: steps.check-package.outputs.error || steps.install.outputs.status == 'failure' || steps.build.outputs.status == 'failure'
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const errorType = '${{ steps.check-package.outputs.error || steps.install.outputs.error || steps.build.outputs.error }}';
          const jsonError = '${{ steps.check-package.outputs.json_error }}';
          
          let title = '';
          let body = '';
          let logContent = '';
          
          try {
            const fs = require('fs');
            
            if (errorType === 'missing-package-json') {
              title = `Build Failure - Missing package.json - ${new Date().toLocaleString()}`;
              body = `🚨 **package.json file not found in commit [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})**`;
            } 
            else if (errorType === 'invalid-package-json') {
              title = `Build Failure - Invalid package.json - ${new Date().toLocaleString()}`;
              body = [
                `🚨 **package.json contains invalid JSON in commit [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})**`,
                '',
                `**JSON Error:** ${jsonError}`,
                '',
                '**Next steps:**',
                '1. Check the package.json file for syntax errors',
                '2. Validate your JSON using a JSON validator',
                '3. Fix the issues or revert the commit'
              ].join('\n');
            }
            else if (errorType === 'npm-ci-failed') {
              logContent = fs.readFileSync('install-output.log', 'utf8');
              title = `Build Failure - Dependency Installation Failed - ${new Date().toLocaleString()}`;
              body = [
                `🚨 **npm ci failed in commit [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})**`,
                '',
                '**Most relevant errors:**',
                '```',
                logContent.split('\n').filter(line => 
                  line.toLowerCase().includes('error') || 
                  line.toLowerCase().includes('fail') || 
                  line.includes('ERR!')
                ).join('\n'),
                '```',
                '',
                `**Workflow run:** [View details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '<details>',
                '<summary>Full installation output</summary>',
                '',
                '```',
                logContent,
                '```',
                '</details>',
                '',
                '**Next steps:**',
                '1. Check the package.json and package-lock.json files',
                '2. Verify all dependencies are properly specified',
                '3. Try running "npm ci" locally to debug',
                '4. Fix the issues or revert the commit'
              ].join('\n');
            }
            else if (errorType === 'build-failed') {
              logContent = fs.readFileSync('build-output.log', 'utf8');
              title = `Build Failure - Build Process Failed - ${new Date().toLocaleString()}`;
              body = [
                `🚨 **Build failed in commit [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})**`,
                '',
                '**Most relevant errors:**',
                '```',
                logContent.split('\n').filter(line => 
                  line.toLowerCase().includes('error') || 
                  line.toLowerCase().includes('fail') || 
                  line.includes('ERR!')
                ).join('\n'),
                '```',
                '',
                `**Workflow run:** [View details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '<details>',
                '<summary>Full build output</summary>',
                '',
                '```',
                logContent,
                '```',
                '</details>',
                '',
                '**Next steps:**',
                '1. Check the commit changes',
                '2. Review the build errors above',
                '3. Fix the issues or revert the commit'
              ].join('\n');
            }
            
            // Check for existing issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['build-failure']
            });
            
            const existingIssue = issues.find(issue => 
              issue.title.includes('Build Failure') && 
              issue.labels.some(label => label.name === 'build-failure')
            );
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['build-failure', 'bug']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `⚠️ **New failure detected**\n\n${body}`
              });
            }
          } catch (error) {
            console.error('Error creating issue:', error);
            // Fallback to simple issue creation
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Failure - ${new Date().toLocaleString()}`,
              body: `Build process failed in commit ${context.sha}. Please check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['build-failure', 'bug']
            });
          }
