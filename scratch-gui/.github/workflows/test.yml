        with:
          script: |
            const errors = process.env.ERRORS;
            const events = process.env.EVENTS;
            const aiAnalysis = process.env.AI_ANALYSIS;
            const tokenEstimate = process.env.TOKEN_ESTIMATE;
            const videoDir = process.env.VIDEO_DIR;
            const runId = context.runId;
            const sha = context.sha;
            const commitAuthor = context.payload.head_commit?.author?.username || 'unknown';
            const issueExists = process.env.ISSUE_EXISTS === 'true';
            const issueNumber = process.env.ISSUE_NUMBER;
            
            const assignees = ['supervoidcoder'];
            if (commitAuthor && commitAuthor !== 'unknown' && commitAuthor !== 'supervoidcoder') {
              assignees.push(commitAuthor);
            }
            
            let aiSection = '';
            if (aiAnalysis && tokenEstimate < 8000) {
              aiSection = `### 🤖 AI Analysis\n\n${aiAnalysis}\n\n`;
            } else if (tokenEstimate >= 8000) {
              aiSection = `### ⚠️ AI Analysis Skipped\n\nLog too large (${tokenEstimate} tokens).\n\n`;
            }
            
            let videoSection = `### 📹 Video\n\n`;
            if (videoDir) {
              const videoBranchUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/raw/chaos-videos/${videoDir}`;
              const webmUrl = `${videoBranchUrl}/chaos-test-chromium-video.webm`;
              const gifUrl = `${videoBranchUrl}/chaos-test-chromium-video.gif`;
              
              videoSection += `![Chaos Test Recording](${gifUrl})\n\n`;
              videoSection += `📥 [Download original video (WebM)](${webmUrl})\n`;
              videoSection += `🗂️ [Browse all files](https://github.com/${context.repo.owner}/${context.repo.repo}/tree/chaos-videos/${videoDir})\n\n`;
            } else {
              videoSection += `[Workflow artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})\n\n`;
            }
            
            const bodyContent = `## 🐛 Chaos Test Errors (New Occurrence)\n\n**Platform:** <img width="12" height="12" alt="Windows Logo" src="https://github.com/user-attachments/assets/4da4c060-732a-4aaf-b080-6b8de0600c71" /> Windows + Chromium\n**Run:** ${runId}\n**Commit:** ${sha}\n**Author:** ${commitAuthor}\n**Date:** ${new Date().toUTCString()}\n\n${videoSection}\n### 🚨 Errors\n\`\`\`\n${errors}\n\`\`\`\n\n### 🎯 Last 10 Clicks\n\`\`\`\n${events}\n\`\`\`\n\n${aiSection}---\n*🤖 Auto-updated from [run ${runId}](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId})*`;
            
            if (issueExists && issueNumber) {
              console.log(`💬 Commenting on existing issue #${issueNumber}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: parseInt(issueNumber),
                body: bodyContent
              });
              console.log(`✅ Added comment to issue #${issueNumber}`);
            } else {
              console.log('📝 Creating new issue');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🌪️ Console Errors During Chaos Testing (Windows)`,
                body: bodyContent.replace('## 🐛 Chaos Test Errors (New Occurrence)', '## 🐛 Chaos Test Errors'),
                labels: ['bug', 'automated-test', 'console-error', 'chaos-testing'],
                assignees: assignees
              });
              console.log('✅ Created new issue');
            }

      - name: Search for existing recorded actions issue
