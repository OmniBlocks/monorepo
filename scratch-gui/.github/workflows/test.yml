      - name: Calculate duration
        id: duration
        if: always()
        run: |
          END_TIME=$(date +%s)
          START_TIME=${{ needs.main-branch-test-and-chaos.outputs.start_timestamp }}
          DURATION=$((END_TIME - START_TIME))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "duration=${MINUTES}m ${SECONDS}s" >> $GITHUB_OUTPUT

      - name: Generate enhanced HTML dashboard
        env:
          COMMIT_SHA: ${{ github.sha }}
          BUILD_STATUS: ${{ needs.main-branch-test-and-chaos.outputs.build_status }}
          LINT_STATUS: ${{ needs.main-branch-test-and-chaos.outputs.lint_status }}
          LINT_ERRORS: ${{ needs.main-branch-test-and-chaos.outputs.lint_errors }}
          LINT_WARNINGS: ${{ needs.main-branch-test-and-chaos.outputs.lint_warnings }}
          UNIT_STATUS: ${{ needs.main-branch-test-and-chaos.outputs.unit_status }}
          UNIT_TOTAL: ${{ needs.main-branch-test-and-chaos.outputs.unit_total }}
          UNIT_PASSED: ${{ needs.main-branch-test-and-chaos.outputs.unit_passed }}
          UNIT_FAILED: ${{ needs.main-branch-test-and-chaos.outputs.unit_failed }}
          UNIT_SKIPPED: ${{ needs.main-branch-test-and-chaos.outputs.unit_skipped }}
          INTEGRATION_STATUS: ${{ needs.main-branch-test-and-chaos.outputs.integration_status }}
          INTEGRATION_TOTAL: ${{ needs.main-branch-test-and-chaos.outputs.integration_total }}
          INTEGRATION_PASSED: ${{ needs.main-branch-test-and-chaos.outputs.integration_passed }}
          INTEGRATION_FAILED: ${{ needs.main-branch-test-and-chaos.outputs.integration_failed }}
          INTEGRATION_SKIPPED: ${{ needs.main-branch-test-and-chaos.outputs.integration_skipped }}
          DURATION: ${{ steps.duration.outputs.duration }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          VIDEO_DIR: ${{ steps.upload_to_branch.outputs.video_dir }}
        run: |
          set -e
          mkdir -p dashboard

          echo "📥 Listing downloaded matrix artifacts..."
          find all-matrix-results -maxdepth 3 -type d -print 2>/dev/null || true

          echo "📸 Copying screenshots from all platforms..."
          SCREENSHOT_COUNT=0

          shopt -s nullglob
          for platform_dir in all-matrix-results/chaos-results-*/; do
            [ -d "$platform_dir" ] || continue
            platform_name=$(basename "$platform_dir" | sed 's/^chaos-results-//')
            src_dir="$platform_dir/screenshots"
            if [ -d "$src_dir" ]; then
              target_dir="dashboard/screenshots-${platform_name}"
              mkdir -p "$target_dir"
              copied=0
              for png in "$src_dir"/*.png; do
                [ -f "$png" ] || continue
                cp "$png" "$target_dir/"
                copied=$((copied+1))
              done
              if [ "$copied" -gt 0 ]; then
                echo "    ✅ $platform_name: $copied screenshots"
                SCREENSHOT_COUNT=$((SCREENSHOT_COUNT + copied))
              else
                echo "    ⚠️  $platform_name: screenshots dir exists but no PNGs"
              fi
            else
              echo "    ⚠️  $platform_name: no screenshots dir"
            fi
          done
          shopt -u nullglob

          # Fallback: copy Windows+Chromium screenshots if matrix artifacts were empty
          if [ "$SCREENSHOT_COUNT" -eq 0 ] && [ -d "windows-results/screenshots" ]; then
            echo "↩️  Fallback: copying screenshots from windows-results/"
            mkdir -p dashboard/screenshots-windows-latest-chromium
            cp -n windows-results/screenshots/*.png dashboard/screenshots-windows-latest-chromium/ 2>/dev/null || true
            FALLBACK_COPIED=$(ls -1 dashboard/screenshots-windows-latest-chromium/*.png 2>/dev/null | wc -l || echo 0)
            SCREENSHOT_COUNT=$((SCREENSHOT_COUNT + FALLBACK_COPIED))
            echo "    ✅ Fallback copied: $FALLBACK_COPIED"
          fi

          # Compose the env status for the HTML generator
          if [ "$SCREENSHOT_COUNT" -gt 0 ]; then
            export SCREENSHOT_STATUS=success
          else
            export SCREENSHOT_STATUS=missing
          fi

          # Pull chaos status from Windows+Chromium summary if present
          if [ -f windows-results/platform-summary.json ]; then
            CHAOS_STATUS_VAL=$(jq -r '.chaos_status // empty' windows-results/platform-summary.json 2>/dev/null || echo "")
            CHAOS_ERRORS_VAL=$(jq -r '.errors_found // false' windows-results/platform-summary.json 2>/dev/null || echo "false")
            [ -n "$CHAOS_STATUS_VAL" ] && export CHAOS_STATUS="$CHAOS_STATUS_VAL"
            [ -n "$CHAOS_ERRORS_VAL" ] && export CHAOS_ERRORS_FOUND="$CHAOS_ERRORS_VAL"
          fi

          # Aggregate logs so the dashboard can display them
          : > screenshot-output.txt
          : > chaos-test-output.txt
          : > recorded-actions-output.txt
          find all-matrix-results -type f -name "screenshot-output.txt" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo' \; >> screenshot-output.txt 2>/dev/null || true
          find windows-results -type f -name "screenshot-output.txt" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo' \; >> screenshot-output.txt 2>/dev/null || true
          find all-matrix-results -type f -name "chaos-test-output.txt" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo' \; >> chaos-test-output.txt 2>/dev/null || true
          find windows-results -type f -name "chaos-test-output.txt" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo' \; >> chaos-test-output.txt 2>/dev/null || true
          find all-matrix-results -type f -name "recorded-actions-output.txt" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo' \; >> recorded-actions-output.txt 2>/dev/null || true
          find windows-results -type f -name "recorded-actions-output.txt" -exec sh -c 'echo "=== {} ==="; cat "{}"; echo' \; >> recorded-actions-output.txt 2>/dev/null || true

          echo ""
          echo "📊 Screenshot summary: $SCREENSHOT_COUNT total files copied"
          echo "📁 Dashboard directories created:"
          find dashboard -maxdepth 1 -type d -name "screenshots-*" -print | while read dir; do
            count=$(ls "$dir"/*.png 2>/dev/null | wc -l)
            echo "  $dir: $count images"
          done

          # Generate the dashboard HTML (reads env + aggregated logs from cwd)
          python3 .github/scripts/generate-dashboard.py dashboard
          
      - name: Deploy to gh-pages
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if git ls-remote --heads https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages | grep -q gh-pages; then
            git clone --single-branch --branch gh-pages --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages
            cd gh-pages
          else
            mkdir -p gh-pages
            cd gh-pages
            git init -b gh-pages
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
          
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          mkdir -p "tests/$TIMESTAMP"
          cp -r ../dashboard/* "tests/$TIMESTAMP/"
          
          cd tests
          rm -f latest
          ln -s "$TIMESTAMP" latest
          
          cat > index.html << 'INDEXEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Test Results - OmniBlocks 🌪️</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                padding: 40px;
                text-align: center;
              }
              
              .container {
                max-width: 800px;
                margin: 0 auto;
                background: rgba(255, 255, 255, 0.1);
                backdrop-filter: blur(10px);
                border-radius: 20px;
                padding: 40px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
              }
              
              h1 {
                font-size: 3em;
                margin-bottom: 20px;
              }
              
              .button {
                display: inline-block;
                padding: 15px 40px;
                margin: 10px;
                background: white;
                color: #667eea;
                text-decoration: none;
                border-radius: 50px;
                font-weight: bold;
                font-size: 1.1em;
                transition: transform 0.3s ease, box-shadow 0.3s ease;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
              }
              
              .button:hover {
                transform: translateY(-3px);
                box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
              }
              
              .note {
                margin-top: 30px;
                opacity: 0.8;
              }
              
              .chaos {
                font-size: 2em;
                margin: 20px 0;
              }
              
              .browsers {
                font-size: 1.2em;
                margin: 15px 0;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>🚀 OmniBlocks</h1>
              <h2>Main Branch Test Results</h2>
              <div class="chaos">🌪️ ULTRA CHAOS TESTING! 🌪️</div>
              <div class="browsers">🌐 Multi-Browser Testing: Chromium • Firefox • WebKit</div>
              <p>Comprehensive chaos testing across Windows, Ubuntu, and macOS with multiple browsers!</p>
              <a href="latest/index.html" class="button">📊 View Latest Dashboard</a>
              <p class="note">Now featuring Firefox 🦊 and WebKit 🧭 alongside Chromium! 🎉</p>
            </div>
          </body>
          </html>
          INDEXEOF
          
          cd ..
          git add tests/
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update test results with multi-browser chaos testing 🌪️🦊🧭 - $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            git push origin gh-pages || git push -u origin gh-pages
          else
            echo "No changes to commit."
          fi

      - name: Create issue on build failure
        if: needs.main-branch-test-and-chaos.result == 'failure'
        uses: actions/github-script@v7
        env:
          DURATION: ${{ steps.duration.outputs.duration }}
        with:
          script: |
            const script = require('./.github/scripts/create-failure-issue.js');
            await script({github, context, core});
