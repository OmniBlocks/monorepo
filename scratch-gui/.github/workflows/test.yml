              <h1>🚀 OmniBlocks</h1>
              <h2>Main Branch Test Results</h2>
              <div class="chaos">🌪️ ULTRA CHAOS TESTING! 🌪️</div>
              <p>Multi-platform chaos testing with AI-powered error analysis!</p>
              <a href="latest/index.html" class="button">📊 View Latest Dashboard</a>
              <p class="note">Now testing across Windows, Ubuntu, and macOS! 🎉</p>
