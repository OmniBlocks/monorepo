                  }

                  if (isTargetPlatform) {
                    console.log(\`🎯 Ubuntu+Firefox modal dismissal complete. Dismissed: \${modalDismissed}\`);
                  }

                  return modalDismissed;
                }
                
                // Apply modal dismissal after initial page load
                await dismissModal(page, browserName);
                
                for (const action of actions) {
                  eventLog.push({ ...action, executedAt: Date.now() });
                  
                  switch(action.type) {
                    case 'goto':
                      await page.goto(action.url);
                      await page.waitForLoadState('networkidle');
                      // ✅ FIX: Dismiss modal after page navigation
                      await dismissModal(page, browserName);
                      break;
                    case 'click':
                      // ✅ FIX: Dismiss modal before click attempts
                      await dismissModal(page, browserName);
                      if (action.index !== undefined) {
                        await page.locator(action.selector).nth(action.index).click();
                      } else {
                        await page.locator(action.selector).click();
                      }
                      break;
                    case 'type':
                      await page.locator(action.selector).fill(action.text);
