          node generate-custom-tests.js

      - name: Start HTTP server
        shell: bash
        run: |
          npx http-server build -p 8080 &
          echo $! > server.pid
          
          for i in {1..30}; do
            if curl -f -s http://localhost:8080/ > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Server failed to start within 30 seconds"
              exit 1
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

      - name: Capture screenshots
        id: screenshots
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p screenshots
          npx playwright test screenshot-test.spec.js --project=${{ matrix.browser }} 2>&1 | tee screenshot-output.txt
          if [ $? -eq 0 ]; then
            echo "screenshot_status=success" >> $GITHUB_OUTPUT
          else
            echo "screenshot_status=failed" >> $GITHUB_OUTPUT
          fi
          
          echo "📸 Screenshots captured:"
          ls -lh screenshots/ 2>/dev/null || echo "No screenshots directory"

      - name: Run chaos tests with video recording
        id: chaos_tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          set -o pipefail
          mkdir -p test-results chaos-reports
          
          npx playwright test chaos-test.spec.js --project=${{ matrix.browser }} 2>&1 | tee chaos-test-output.txt
          CHAOS_EXIT=${PIPESTATUS[0]}
          
          npx playwright test recorded-actions-test.spec.js --project=${{ matrix.browser }} 2>&1 | tee recorded-actions-output.txt
          RECORDED_EXIT=${PIPESTATUS[0]}
          
          set -e
          
          echo "🎬 Searching for test videos..."
          echo "Directory structure:"
          find test-results -type f 2>/dev/null | head -30
          
          VIDEO_COUNT=$(find test-results -type f -name "*.webm" 2>/dev/null | wc -l)
          echo "Found $VIDEO_COUNT video files"
          
          if [ $VIDEO_COUNT -gt 0 ]; then
            echo "Video files:"
            find test-results -type f -name "*.webm" -exec ls -lh {} \;
          else
            echo "⚠️ WARNING: No video files found!"
            echo "Contents of test-results:"
            ls -R test-results/ 2>/dev/null || echo "test-results directory not found"
          fi
          
          if [ $CHAOS_EXIT -eq 0 ] && [ $RECORDED_EXIT -eq 0 ]; then
            echo "chaos_status=passed" >> $GITHUB_OUTPUT
            echo "errors_found=false" >> $GITHUB_OUTPUT
          else
            echo "chaos_status=failed" >> $GITHUB_OUTPUT
            echo "errors_found=true" >> $GITHUB_OUTPUT
          fi

      - name: Stop HTTP server
        if: always()
        shell: bash
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
            rm server.pid
          fi

      - name: Create platform summary
        shell: bash
        run: |
          cat > platform-summary.json << EOF
          {
            "os": "${{ matrix.os }}",
            "browser": "${{ matrix.browser }}",
            "chaos_status": "${{ steps.chaos_tests.outputs.chaos_status }}",
            "screenshot_status": "${{ steps.screenshots.outputs.screenshot_status }}",
            "errors_found": "${{ steps.chaos_tests.outputs.errors_found }}"
          }
          EOF

      - name: Upload matrix results
        uses: actions/upload-artifact@v4
        with:
          name: chaos-results-${{ matrix.os }}-${{ matrix.browser }}
          path: |
            screenshots/
            chaos-results.json
            recorded-*-results.json
            test-results/
            screenshot-output.txt
            chaos-test-output.txt
            recorded-actions-output.txt
            platform-summary.json
          retention-days: 1

  # ============================================================
  # ANALYZE + CREATE/UPDATE ISSUES (Windows+Chromium only)
  # ============================================================
  analyze-and-report:
    needs: [main-branch-test-and-chaos, chaos-matrix]
    if: always()
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download test logs
        uses: actions/download-artifact@v4
        with:
          name: test-logs
        continue-on-error: true

      - name: Download Windows+Chromium results (primary)
        uses: actions/download-artifact@v4
        with:
          name: chaos-results-windows-latest-chromium
          path: windows-results/
        continue-on-error: true

      - name: Download all matrix results
        uses: actions/download-artifact@v4
        with:
          pattern: chaos-results-*
          path: all-matrix-results/
          merge-multiple: false
        continue-on-error: true

      - name: Analyze Windows chaos test errors (for issues)
        id: analyze_chaos_errors
        continue-on-error: true
        run: |
          cd windows-results || exit 0
          
          FOUND_ERRORS=false
          
          if [ -f chaos-results.json ]; then
            ERROR_COUNT=$(jq '.errors | length' chaos-results.json)
            if [ "$ERROR_COUNT" -gt 0 ]; then
              FOUND_ERRORS=true
              echo "chaos_has_errors=true" >> $GITHUB_OUTPUT
              
              ERRORS=$(jq -r '.errors[] | "[\(.timestamp)] \(.text)"' chaos-results.json | head -20)
              EVENTS=$(jq -r '.events[-10:] | .[] | "[\(.time)ms] Click #\(.clickNumber): \(.element)"' chaos-results.json)
              
              COMBINED="${ERRORS}\n\nLast 10 events:\n${EVENTS}"
              TOKEN_ESTIMATE=$((${#COMBINED} / 4))
              
              echo "chaos_token_estimate=$TOKEN_ESTIMATE" >> $GITHUB_OUTPUT
              
              {
                echo "chaos_errors<<EOF"
                echo "$ERRORS"
                echo "EOF"
              } >> $GITHUB_OUTPUT
              
              {
                echo "chaos_events<<EOF"
                echo "$EVENTS"
                echo "EOF"
              } >> $GITHUB_OUTPUT
            fi
          fi
          
          for result_file in recorded-*-results.json; do
            if [ -f "$result_file" ]; then
              ERROR_COUNT=$(jq '.errors | length' "$result_file")
              if [ "$ERROR_COUNT" -gt 0 ]; then
                FOUND_ERRORS=true
                TEST_NAME=$(jq -r '.testName' "$result_file")
                TEST_FILE=$(jq -r '.testFile' "$result_file")
                
                echo "recorded_has_errors=true" >> $GITHUB_OUTPUT
                echo "recorded_test_name=$TEST_NAME" >> $GITHUB_OUTPUT
                echo "recorded_test_file=$TEST_FILE" >> $GITHUB_OUTPUT
                
                ERRORS=$(jq -r '.errors[] | "[\(.timestamp)] \(.text)"' "$result_file" | head -20)
                EVENTS=$(jq -r '.events | .[] | "[\(.executedAt)] \(.type): \(.selector // .url // "")"' "$result_file")
                
                COMBINED="${ERRORS}\n\nActions:\n${EVENTS}"
                TOKEN_ESTIMATE=$((${#COMBINED} / 4))
                
                echo "recorded_token_estimate=$TOKEN_ESTIMATE" >> $GITHUB_OUTPUT
                
                {
                  echo "recorded_errors<<EOF"
                  echo "$ERRORS"
                  echo "EOF"
                } >> $GITHUB_OUTPUT
                
                {
                  echo "recorded_events<<EOF"
                  echo "$EVENTS"
                  echo "EOF"
                } >> $GITHUB_OUTPUT
                
                break
              fi
            fi
          done
          
          echo "found_errors=$FOUND_ERRORS" >> $GITHUB_OUTPUT

      - name: Install FFmpeg
        if: steps.analyze_chaos_errors.outputs.found_errors == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Upload videos to chaos-videos branch
        if: steps.analyze_chaos_errors.outputs.found_errors == 'true'
        id: upload_to_branch
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if git ls-remote --heads https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git chaos-videos | grep -q chaos-videos; then
            git clone --single-branch --branch chaos-videos --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git chaos-videos
            cd chaos-videos
          else
            mkdir -p chaos-videos
            cd chaos-videos
            git init -b chaos-videos
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            echo "# Chaos Test Videos" > README.md
            git add README.md
            git commit -m "Initialize chaos-videos branch"
            git push origin chaos-videos || git push -u origin chaos-videos
          fi
          
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          RUN_ID="${{ github.run_id }}"
          VIDEO_DIR="${TIMESTAMP}-${RUN_ID}"
          
          mkdir -p "$VIDEO_DIR"
          
          # ✅ FIX: Enhanced video discovery with better pattern matching
          echo "🔍 Searching for test videos in Windows+Chromium results..."
          echo ""

          # Log all available directories for debugging
          echo "📂 All test result directories:"
          find ../windows-results/test-results -type d -maxdepth 1 2>/dev/null | sort || echo "No directories found"

          echo ""
          echo "🌪️ Looking for chaos test video..."
          # Search for chaos test directories - Playwright creates dirs based on test.describe() name
          # Pattern: 🌪️-Chaos-Testing-* or *Chaos* or containing "Random Click Spam"
          CHAOS_DIR=$(find ../windows-results/test-results -type d \( \
            -name "*Chaos*" -o \
            -name "*Random*Click*" -o \
            -name "*Click*Spam*" \
          \) 2>/dev/null | grep -v ".git" | head -1)

          echo "  Search pattern used: *Chaos*, *Random*Click*, *Click*Spam*"
          echo "  Found directory: $CHAOS_DIR"

          if [ -n "$CHAOS_DIR" ] && [ -d "$CHAOS_DIR" ]; then
            echo "✅ Found chaos test directory: $CHAOS_DIR"
            CHAOS_VIDEO="$CHAOS_DIR/video.webm"
            if [ -f "$CHAOS_VIDEO" ]; then
              cp "$CHAOS_VIDEO" "$VIDEO_DIR/chaos-test-chromium-video.webm"
              echo "✅ Copied chaos video from: $CHAOS_VIDEO"
            else
              echo "⚠️ No video.webm in chaos directory"
              ls -la "$CHAOS_DIR" 2>/dev/null || echo "Can't list directory"
            fi
          else
            echo "❌ No chaos test directory found"
            echo "  Checking for any directories with video files:"
            find ../windows-results/test-results -type f -name "video.webm" 2>/dev/null | head -5 || echo "    No video files found"
          fi

          echo ""
          echo "🎬 Looking for recorded actions video..."
          # Search for recorded actions test directories
          RECORDED_DIR=$(find ../windows-results/test-results -type d \( \
            -name "recorded-actions-test-*" -o \
            -name "*Recorded*Actions*" -o \
            -name "*Actions*Playback*" \
          \) 2>/dev/null | grep -v ".git" | head -1)

          echo "  Search pattern used: recorded-actions-test-*, *Recorded*Actions*, *Actions*Playback*"
          echo "  Found directory: $RECORDED_DIR"

          if [ -n "$RECORDED_DIR" ] && [ -d "$RECORDED_DIR" ]; then
            echo "✅ Found recorded actions directory: $RECORDED_DIR"
            RECORDED_VIDEO="$RECORDED_DIR/video.webm"
            if [ -f "$RECORDED_VIDEO" ]; then
              cp "$RECORDED_VIDEO" "$VIDEO_DIR/recorded-actions-chromium-video.webm"
              echo "✅ Copied recorded actions video from: $RECORDED_VIDEO"
            else
              echo "⚠️ No video.webm in recorded actions directory"
              ls -la "$RECORDED_DIR" 2>/dev/null || echo "Can't list directory"
            fi
          else
            echo "❌ No recorded actions directory found"
          fi
          
          echo ""
          echo "📦 Videos collected in $VIDEO_DIR:"
          ls -lh "$VIDEO_DIR"/*.webm 2>/dev/null || echo "⚠️ No videos found!"
          
          echo ""
          echo "🎨 Converting videos to GIF..."
          for webm in "$VIDEO_DIR"/*.webm; do
            if [ -f "$webm" ]; then
              gif="${webm%.webm}.gif"
              echo "Converting $(basename "$webm")..."
              ffmpeg -i "$webm" -vf "fps=10,scale=800:-1:flags=lanczos,split[s0][s1];[s0]palettegen=max_colors=256[p];[s1][p]paletteuse=dither=bayer:bayer_scale=5" -loop 0 "$gif" -y 2>&1 | tail -5
            fi
          done
          
          echo "video_timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "video_dir=$VIDEO_DIR" >> $GITHUB_OUTPUT
          
          git add .
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Add chaos test videos from run $RUN_ID"
            git push origin chaos-videos
            echo "✅ Videos pushed to chaos-videos branch!"
          else
            echo "⚠️ No changes to push"
          fi

      - name: AI analysis for chaos test errors
        id: ai_chaos_analysis
        if: steps.analyze_chaos_errors.outputs.chaos_has_errors == 'true' && steps.analyze_chaos_errors.outputs.chaos_token_estimate < 8000
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          prompt: |
            You are analyzing console errors found during chaos testing (random click spam) of the OmniBlocks scratch-gui editor.
            
            **Console Errors Detected:**
            ${{ steps.analyze_chaos_errors.outputs.chaos_errors }}
            
            **Events Leading to Errors (Last 10 clicks):**
            ${{ steps.analyze_chaos_errors.outputs.chaos_events }}
            
            **Your Task:**
            Provide a concise hypothesis (2-3 paragraphs) about:
            1. What likely caused these errors
            2. Which UI components or interactions are problematic
            3. Suggested areas to investigate for fixes
            
            Be specific about element classes, timing issues, or race conditions if visible.

      - name: AI analysis for recorded actions errors
        id: ai_recorded_analysis
        if: steps.analyze_chaos_errors.outputs.recorded_has_errors == 'true' && steps.analyze_chaos_errors.outputs.recorded_token_estimate < 8000
        continue-on-error: true
        uses: actions/ai-inference@v1
