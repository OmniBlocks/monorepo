name: Build Monitor
on:
  push:
    branches: [ main ]

jobs:
  build-monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run build and capture output
      id: build
      run: |
        # Run build and capture both stdout and stderr
        build_output=$(npm run build 2>&1)
        
        # Check exit status
        if [ $? -ne 0 ]; then
          # Escape newlines for JSON output
          output_escaped=$(echo "$build_output" | jq -R -s -c '.')
          echo "build_output=$output_escaped" >> $GITHUB_OUTPUT
          echo "::set-output name=status::failure"
          # Print output to workflow log
          echo "Build failed with output:"
          echo "$build_output"
          exit 1
        fi
      
    - name: Create issue if build failed
      if: steps.build.outputs.status == 'failure'
      uses: actions/github-script@v6
      with:
        script: |
          const buildOutput = JSON.parse(`${{ steps.build.outputs.build_output }}`);
          const errorSummary = buildOutput.split('\n').filter(line => 
            line.includes('error') || 
            line.includes('fail') || 
            line.includes('ERR!')
          ).join('\n');
          
          const shortError = errorSummary.length > 0 ? 
            `**Most relevant errors:**\n\`\`\`\n${errorSummary}\n\`\`\`` : 
            'No specific error messages detected';
          
          const fullOutput = buildOutput.length > 2000 ? 
            `\n\n<details>\n<summary>Full build output (truncated)</summary>\n\n\`\`\`\n${buildOutput.substring(0, 2000)}\n[...]\n\`\`\`\n</details>` : 
            `\n\n**Full build output:**\n\`\`\`\n${buildOutput}\n\`\`\``;
          
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'build-failure'
          });
          
          const existingIssue = issues.find(issue => 
            issue.title.includes('Build Failure') && 
            issue.labels.some(label => label.name === 'build-failure')
          );
          
          const issueBody = `🚨 **Build failed in commit [${context.sha.substring(0, 7)}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})**
          
${shortError}

**Workflow run:** [View details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
${fullOutput}

**Next steps:**
1. Check the commit changes
2. Review the build errors above
3. Fix the issues or revert the commit`;

          if (!existingIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Failure - ${new Date().toLocaleString()}`,
              body: issueBody,
              labels: ['build-failure', 'bug']
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              body: `⚠️ **New build failure detected**\n\n${issueBody}`
            });
          }
