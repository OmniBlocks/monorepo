name: Build Monitor
on:
  push:
    branches: [ main ]

jobs:
  build-monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      id: install
      run: |
        install_output=$(npm ci 2>&1)
        if [ $? -ne 0 ]; then
          echo "::set-output name=status::failure"
          echo "::set-output name=error_output::${install_output//$'\n'/'%0A'}"
          exit 1
        fi
        
    - name: Run build
      id: build
      if: steps.install.outputs.status != 'failure'
      run: |
        build_output=$(npm run build 2>&1)
        if [ $? -ne 0 ]; then
          echo "::set-output name=status::failure"
          echo "::set-output name=error_output::${build_output//$'\n'/'%0A'}"
          exit 1
        fi
        
    - name: Create issue if failed
      if: steps.install.outputs.status == 'failure' || steps.build.outputs.status == 'failure'
      uses: actions/github-script@v6
      with:
        script: |
          const errorStep = steps.install.outputs.status == 'failure' ? 'dependency installation' : 'build';
          const errorOutput = `\`\`\`\n${process.env.ERROR_OUTPUT}\n\`\`\``;
          
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'build-failure'
          });
          
          // Check if an open issue with this label already exists
          const existingIssue = issues.find(issue => 
            issue.title.includes('Build Failure') && 
            issue.labels.some(label => label.name === 'build-failure')
          );
          
          const title = `Build Failure - ${new Date().toISOString()}`;
          const body = `The latest commit (${context.sha}) failed during ${errorStep}.\n\n**Error Output:**\n${errorOutput}\n\n[View Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
          
          if (!existingIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['build-failure', 'bug']
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              body: `Another failure detected in commit ${context.sha} during ${errorStep}.\n\n**Error Output:**\n${errorOutput}\n\n[View Workflow Run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
            });
          }
      env:
        ERROR_OUTPUT: ${{ steps.install.outputs.error_output || steps.build.outputs.error_output }}
        steps: ${{ toJson(steps) }}
