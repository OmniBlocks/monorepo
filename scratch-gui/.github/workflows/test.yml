name: Build Failure Reporter
on:
  push:
    branches: [ main ]

jobs:
  build-monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run build
      id: build
      run: |
        # Run build and capture output
        npm run build 2>&1 | tee build-output.log
        echo "exit_status=$?" >> $GITHUB_OUTPUT
        
    - name: Create issue if build failed
      if: steps.build.outputs.exit_status != '0'
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          try {
            // Read build output
            const buildOutput = fs.readFileSync('build-output.log', 'utf8');
            
            // Create issue body
            const issueBody = [
              `🚨 Build failed in commit [${context.sha.substring(0, 7)}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})`,
              '',
              `**Workflow run:** [View details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '**Build output:**',
              '```',
              buildOutput,
              '```',
              '',
              '**Next steps:**',
              '1. Check the commit changes',
              '2. Review the build errors above',
              '3. Fix the issues or revert the commit'
            ].join('\n');
            
            // Create issue
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Failed - ${new Date().toLocaleString()}`,
              body: issueBody,
              labels: ['build-failure', 'bug']
            });
          } catch (error) {
            // Fallback if log reading fails
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Failed - ${new Date().toLocaleString()}`,
              body: `Build failed in commit ${context.sha}. Please check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['build-failure', 'bug']
            });
          }
