                page.on('console', msg => {
                  if (msg.type() === 'error') {
                    const text = msg.text();
                    consoleErrors.push({
                      text: text,
                      timestamp: Date.now(),
                      location: msg.location()
                    });
                  }
                });
                
                const actions = ${JSON.stringify(testConfig.actions)};
                
                // ✅ FIX: Improved modal dismissal helper for Ubuntu+Firefox
                async function dismissModal(page, browserName) {
                  const isUbuntu = process.platform === 'linux';
                  const isFirefox = browserName === 'firefox';
                  const isTargetPlatform = isUbuntu && isFirefox;
                  
                  if (isTargetPlatform) {
                    console.log('🎯 Recorded test detected Ubuntu+Firefox - applying enhanced modal dismissal');
                  }

                  // Try to capture screenshot before dismissal
                  try {
                    const preDismissalPath = \`screenshots/recorded-\${testSlug}-pre-modal-dismissal-\${Date.now()}.png\`;
                    await page.screenshot({ path: preDismissalPath });
                    if (isTargetPlatform) {
                      console.log(\`📸 Pre-dismissal screenshot saved: \${preDismissalPath}\`);
                    }
                  } catch (e) {
                    console.log('Could not capture pre-dismissal screenshot:', e.message);
                  }

                  let modalDismissed = false;

                  // Strategy 1: Click close button inside modal
                  try {
                    const modalOverlay = page.locator('.ReactModal__Overlay');
                    if (await modalOverlay.count() > 0) {
                      console.log('🔍 Found ReactModal overlay');
                      
                      const closeButton = page.locator('.ReactModal__Content button').first()
                        .or(page.locator('[class*="modal"] button').first())
                        .or(page.locator('button[aria-label*="close" i]').first());
                      
                      if (await closeButton.count() > 0) {
                        console.log('✓ Attempting to click close button');
                        await closeButton.click({ timeout: 2000, force: true });
                        await page.waitForTimeout(500);
                        modalDismissed = true;
                        console.log('✓ Close button clicked');
                      }
                    }
                  } catch (e) {
                    console.log('Close button click failed:', e.message);
                  }

                  // Strategy 2: Click outside modal (on overlay)
                  if (!modalDismissed) {
                    try {
                      const modalOverlay = page.locator('.ReactModal__Overlay');
                      if (await modalOverlay.count() > 0) {
                        console.log('✓ Attempting to click overlay (outside modal)');
                        await modalOverlay.click({ position: { x: 10, y: 10 }, timeout: 2000 });
                        await page.waitForTimeout(500);
                        modalDismissed = true;
                        console.log('✓ Overlay clicked');
                      }
                    } catch (e) {
                      console.log('Overlay click failed:', e.message);
                    }
                  }

                  // Strategy 3: Press Escape key
                  if (!modalDismissed) {
                    try {
                      console.log('✓ Attempting Escape key');
                      await page.keyboard.press('Escape');
                      await page.waitForTimeout(500);
                      modalDismissed = true;
                      console.log('✓ Escape key pressed');
                    } catch (e) {
                      console.log('Escape key failed:', e.message);
                    }
                  }

                  // Strategy 4: Force remove modal (last resort)
                  if (!modalDismissed) {
                    try {
                      console.log('⚠️ Attempting force removal of modal');
                      await page.evaluate(() => {
                        const overlay = document.querySelector('.ReactModal__Overlay');
                        if (overlay) {
                          overlay.remove();
                          console.log('Modal forcibly removed from DOM');
                        }
                      });
                      await page.waitForTimeout(300);
                      modalDismissed = true;
                      console.log('✓ Modal forcibly removed');
                    } catch (e) {
                      console.log('Force removal failed:', e.message);
                    }
                  }

                  // Check if modal is still present
                  try {
                    const modalStillPresent = await page.locator('.ReactModal__Overlay').count() > 0;
                    if (modalStillPresent) {
                      console.log('⚠️ Modal still present after all dismissal attempts');
                    } else {
                      console.log('✅ Modal successfully dismissed');
                    }
                  } catch (e) {
                    // Ignore check errors
                  }

                  // Capture screenshot after dismissal attempts
                  try {
