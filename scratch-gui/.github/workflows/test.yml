name: Main Branch Test Monitor + Chaos Testing 🌪️

permissions:
  contents: write
  issues: write
  models: read

on:
  push:
    branches: [ main ]

jobs:
  main-branch-test-and-chaos:
    runs-on: ubuntu-latest
    outputs:
      start_timestamp: ${{ steps.start_time.outputs.timestamp }}
      build_status: ${{ steps.build.outputs.build_status }}
      lint_status: ${{ steps.lint.outputs.lint_status }}
      lint_errors: ${{ steps.lint.outputs.lint_errors }}
      lint_warnings: ${{ steps.lint.outputs.lint_warnings }}
      unit_status: ${{ steps.unit_tests.outputs.unit_status }}
      unit_total: ${{ steps.unit_tests.outputs.unit_total }}
      unit_passed: ${{ steps.unit_tests.outputs.unit_passed }}
      unit_failed: ${{ steps.unit_tests.outputs.unit_failed }}
      unit_skipped: ${{ steps.unit_tests.outputs.unit_skipped }}
      integration_status: ${{ steps.integration_tests.outputs.integration_status }}
      integration_total: ${{ steps.integration_tests.outputs.integration_total }}
      integration_passed: ${{ steps.integration_tests.outputs.integration_passed }}
      integration_failed: ${{ steps.integration_tests.outputs.integration_failed }}
      integration_skipped: ${{ steps.integration_tests.outputs.integration_skipped }}

    steps:
      - name: Record start time
        id: start_time
        run: echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Checkout main branch
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # ============================================================
      # BUILD PHASE
      # ============================================================

      - name: Install dependencies
        id: install
        run: |
          echo "install_status=success" >> $GITHUB_OUTPUT
          npm ci 2>&1 | tee install-output.txt || {
            echo "install_status=failure" >> $GITHUB_OUTPUT
            exit 1
          }

      - name: Build project
        id: build
        if: steps.install.outputs.install_status == 'success'
        run: |
          echo "build_status=success" >> $GITHUB_OUTPUT
          npm run build 2>&1 | tee build-output.txt || {
            echo "build_status=failure" >> $GITHUB_OUTPUT
            exit 1
          }
        env:
          NODE_ENV: production

      - name: Upload build artifact
        if: steps.build.outputs.build_status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build/
          retention-days: 1

      # ============================================================
      # TESTING PHASE
      # ============================================================

      - name: Run linter
        id: lint
        if: steps.build.outputs.build_status == 'success'
        env:
          NODE_OPTIONS: --max-old-space-size=8912 
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:lint 2>&1 | tee lint-output.txt
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "lint_status=passed" >> $GITHUB_OUTPUT
            echo "lint_errors=0" >> $GITHUB_OUTPUT
            echo "lint_warnings=0" >> $GITHUB_OUTPUT
          else
            echo "lint_status=failed" >> $GITHUB_OUTPUT
            ERRORS=$(grep -E '^\s+[0-9]+:[0-9]+\s+error\s+' lint-output.txt | wc -l || echo "0")
            WARNINGS=$(grep -E '^\s+[0-9]+:[0-9]+\s+warning\s+' lint-output.txt | wc -l || echo "0")
            echo "lint_errors=${ERRORS:-0}" >> $GITHUB_OUTPUT
            echo "lint_warnings=${WARNINGS:-0}" >> $GITHUB_OUTPUT
          fi

      - name: Run unit tests
        id: unit_tests
        if: steps.build.outputs.build_status == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:unit 2>&1 | tee unit-test-output.txt
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "unit_status=passed" >> $GITHUB_OUTPUT
          else
            echo "unit_status=failed" >> $GITHUB_OUTPUT
          fi
          
          TOTAL=$(grep -oP '\d+(?= tests?)' unit-test-output.txt | head -1)
          PASSED=$(grep -oP '\d+(?= passed)' unit-test-output.txt | head -1)
          FAILED=$(grep -oP '\d+(?= failed)' unit-test-output.txt | head -1)
          SKIPPED=$(grep -oP '\d+(?= skipped)' unit-test-output.txt | head -1)
          
          echo "unit_total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "unit_passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "unit_failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "unit_skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Run integration tests
        id: integration_tests
        if: steps.build.outputs.build_status == 'success'
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:integration 2>&1 | tee integration-test-output.txt
          EXIT_CODE=$?
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "integration_status=passed" >> $GITHUB_OUTPUT
          else
            echo "integration_status=failed" >> $GITHUB_OUTPUT
          fi
          
          TOTAL=$(grep -oP '\d+(?= tests?)' integration-test-output.txt | head -1)
          PASSED=$(grep -oP '\d+(?= passed)' integration-test-output.txt | head -1)
          FAILED=$(grep -oP '\d+(?= failed)' integration-test-output.txt | head -1)
          SKIPPED=$(grep -oP '\d+(?= skipped)' integration-test-output.txt | head -1)
          
          echo "integration_total=${TOTAL:-0}" >> $GITHUB_OUTPUT
          echo "integration_passed=${PASSED:-0}" >> $GITHUB_OUTPUT
          echo "integration_failed=${FAILED:-0}" >> $GITHUB_OUTPUT
          echo "integration_skipped=${SKIPPED:-0}" >> $GITHUB_OUTPUT

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            install-output.txt
            build-output.txt
            lint-output.txt
            unit-test-output.txt
            integration-test-output.txt
          retention-days: 1

  # ============================================================
  # MATRIX JOB: SCREENSHOTS + CHAOS TESTING
  # ============================================================
  chaos-matrix:
    needs: main-branch-test-and-chaos
    if: needs.main-branch-test-and-chaos.outputs.build_status == 'success'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            browser: chromium
            primary: true
          - os: windows-latest
            browser: firefox
          - os: windows-latest
            browser: webkit
          - os: ubuntu-latest
            browser: chromium
          - os: ubuntu-latest
            browser: firefox
          - os: macos-latest
            browser: chromium
          - os: macos-latest
            browser: webkit
    
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          path: build/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test@latest

      - name: Install Playwright browsers (Linux)
        if: runner.os == 'Linux'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright browsers (macOS/Windows)
        if: runner.os != 'Linux'
        run: npx playwright install ${{ matrix.browser }}

      - name: Create Playwright config
        shell: bash
        run: |
          cat > playwright.config.js << 'EOF'
          const { defineConfig, devices } = require('@playwright/test');

          module.exports = defineConfig({
            testDir: '.',
            outputDir: 'test-results',
            timeout: 120000,
            fullyParallel: false,
            forbidOnly: !!process.env.CI,
            retries: 0,
            workers: 1,
            reporter: [['list'], ['json', { outputFile: 'test-results.json' }]],
            use: {
              trace: 'on',
              screenshot: 'on',
              video: 'on',
              baseURL: 'http://localhost:8080',
            },
            projects: [
              {
                name: 'chromium',
                use: { 
                  ...devices['Desktop Chrome'],
                  permissions: ['midi', 'midi-sysex'],
                },
              },
              {
                name: 'firefox',
                use: { 
                  ...devices['Desktop Firefox'],
                },
              },
              {
                name: 'webkit',
                use: { 
                  ...devices['Desktop Safari'],
                },
              },
            ],
          });
          EOF

      - name: Create screenshot test
        shell: bash
        run: |
          cat > screenshot-test.spec.js << 'EOF'
          const { test } = require('@playwright/test');

          // ✅ FIX: Improved modal dismissal helper for Ubuntu+Firefox
          async function dismissModal(page, browserName) {
            const isUbuntu = process.platform === 'linux';
            const isFirefox = browserName === 'firefox';
            const isTargetPlatform = isUbuntu && isFirefox;
            
            if (isTargetPlatform) {
              console.log('🎯 Detected Ubuntu+Firefox - applying enhanced modal dismissal');
            }

            // Try to capture screenshot before dismissal
            try {
              const preDismissalPath = `screenshots/pre-modal-dismissal-${Date.now()}.png`;
              await page.screenshot({ path: preDismissalPath });
              if (isTargetPlatform) {
                console.log(`📸 Pre-dismissal screenshot saved: ${preDismissalPath}`);
              }
            } catch (e) {
              console.log('Could not capture pre-dismissal screenshot:', e.message);
            }

            let modalDismissed = false;

            // Strategy 1: Click close button inside modal
            try {
              const modalOverlay = page.locator('.ReactModal__Overlay');
              if (await modalOverlay.count() > 0) {
                console.log('🔍 Found ReactModal overlay');
                
                const closeButton = page.locator('.ReactModal__Content button').first()
                  .or(page.locator('[class*="modal"] button').first())
                  .or(page.locator('button[aria-label*="close" i]').first());
                
                if (await closeButton.count() > 0) {
                  console.log('✓ Attempting to click close button');
                  await closeButton.click({ timeout: 2000, force: true });
                  await page.waitForTimeout(500);
                  modalDismissed = true;
                  console.log('✓ Close button clicked');
                }
              }
            } catch (e) {
              console.log('Close button click failed:', e.message);
            }

            // Strategy 2: Click outside modal (on overlay)
            if (!modalDismissed) {
              try {
                const modalOverlay = page.locator('.ReactModal__Overlay');
                if (await modalOverlay.count() > 0) {
                  console.log('✓ Attempting to click overlay (outside modal)');
                  await modalOverlay.click({ position: { x: 10, y: 10 }, timeout: 2000 });
                  await page.waitForTimeout(500);
                  modalDismissed = true;
                  console.log('✓ Overlay clicked');
                }
              } catch (e) {
                console.log('Overlay click failed:', e.message);
              }
            }

            // Strategy 3: Press Escape key
            if (!modalDismissed) {
              try {
                console.log('✓ Attempting Escape key');
                await page.keyboard.press('Escape');
                await page.waitForTimeout(500);
                modalDismissed = true;
                console.log('✓ Escape key pressed');
              } catch (e) {
                console.log('Escape key failed:', e.message);
              }
            }

            // Strategy 4: Force remove modal (last resort)
            if (!modalDismissed) {
              try {
                console.log('⚠️ Attempting force removal of modal');
                await page.evaluate(() => {
                  const overlay = document.querySelector('.ReactModal__Overlay');
                  if (overlay) {
                    overlay.remove();
                    console.log('Modal forcibly removed from DOM');
                  }
                });
                await page.waitForTimeout(300);
                modalDismissed = true;
                console.log('✓ Modal forcibly removed');
              } catch (e) {
                console.log('Force removal failed:', e.message);
              }
            }

            // Check if modal is still present
            try {
              const modalStillPresent = await page.locator('.ReactModal__Overlay').count() > 0;
              if (modalStillPresent) {
                console.log('⚠️ Modal still present after all dismissal attempts');
              } else {
                console.log('✅ Modal successfully dismissed');
              }
            } catch (e) {
              // Ignore check errors
            }

            // Capture screenshot after dismissal attempts
            try {
              const postDismissalPath = `screenshots/post-modal-dismissal-${Date.now()}.png`;
              await page.screenshot({ path: postDismissalPath });
              if (isTargetPlatform) {
                console.log(`📸 Post-dismissal screenshot saved: ${postDismissalPath}`);
              }
            } catch (e) {
              console.log('Could not capture post-dismissal screenshot:', e.message);
            }

            if (isTargetPlatform) {
              console.log(`🎯 Ubuntu+Firefox modal dismissal complete. Dismissed: ${modalDismissed}`);
            }

            return modalDismissed;
          }

          test.describe('Main Branch Screenshots', () => {
            test('Stage and Sprites', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(5000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              const stageWrapper = await page.locator('[class*="stage-and-target-wrapper"]').first();
              if (await stageWrapper.count() > 0) {
                await stageWrapper.screenshot({ path: 'screenshots/stage-sprites.png' });
              } else {
                await page.screenshot({ path: 'screenshots/stage-sprites.png', clip: { x: 0, y: 0, width: 600, height: 800 } });
              }
            });

            test('Blocks Workspace', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(5000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              const editorWrapper = await page.locator('[class*="editor-wrapper"]').first();
              if (await editorWrapper.count() > 0) {
                await editorWrapper.screenshot({ path: 'screenshots/blocks-workspace.png' });
              } else {
                await page.screenshot({ path: 'screenshots/blocks-workspace.png', fullPage: false });
              }
            });

            test('Player View', async ({ page, browserName }) => {
              await page.goto('/');
              await page.waitForLoadState('networkidle');
              await page.waitForTimeout(3000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              await page.screenshot({ path: 'screenshots/player-view.png', fullPage: true });
            });

            test('Editor Initial (Code Tab)', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(4000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              await page.screenshot({ path: 'screenshots/editor-initial.png', fullPage: true });
            });

            test('Code Tab', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(3000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              const tabList = await page.locator('[class*="react-tabs_react-tabs__tab-list"]').first();
              const codeTab = await tabList.locator('[class*="react-tabs_react-tabs__tab"]').nth(0);
              await codeTab.click();
              await page.waitForTimeout(2000);
              
              await page.screenshot({ path: 'screenshots/code-tab.png', fullPage: true });
            });

            test('Costumes Tab', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(3000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              const tabList = await page.locator('[class*="react-tabs_react-tabs__tab-list"]').first();
              const costumesTab = await tabList.locator('[class*="react-tabs_react-tabs__tab"]').nth(1);
              await costumesTab.click();
              await page.waitForTimeout(2000);
              
              await page.screenshot({ path: 'screenshots/costumes-tab.png', fullPage: true });
            });

            test('Sounds Tab', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(3000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              const tabList = await page.locator('[class*="react-tabs_react-tabs__tab-list"]').first();
              const soundsTab = await tabList.locator('[class*="react-tabs_react-tabs__tab"]').nth(2);
              await soundsTab.click();
              await page.waitForTimeout(2000);
              
              await page.screenshot({ path: 'screenshots/sounds-tab.png', fullPage: true });
            });

            test('Songs Tab', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(3000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              const tabList = await page.locator('[class*="react-tabs_react-tabs__tab-list"]').first();
              const songsTab = await tabList.locator('[class*="react-tabs_react-tabs__tab"]').nth(3);
              await songsTab.click();
              await page.waitForTimeout(2000);
              
              await page.screenshot({ path: 'screenshots/songs-tab.png', fullPage: true });
            });

            test('Extension Library', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(3000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              const extensionButton = page.locator('[class*="extension-button"]').first()
                .or(page.locator('button:has-text("Add Extension")'))
                .or(page.locator('[aria-label*="extension" i]').first());
              
              if (await extensionButton.count() > 0) {
                await extensionButton.click();
                await page.waitForTimeout(2000);
              }
              
              await page.screenshot({ path: 'screenshots/extension-library.png', fullPage: true });
            });

            test('Advanced Settings', async ({ page, context, browserName }) => {
              if (browserName === 'chromium') {
                try {
                  await context.grantPermissions(['midi', 'midi-sysex'], { origin: 'http://localhost:8080' });
                } catch (e) {
                  console.log('MIDI permissions not available');
                }
              }
              
              await page.goto('/editor.html');
              await page.waitForLoadState('networkidle');
              await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
              await page.waitForTimeout(3000);
              
              // ✅ FIX: Improved modal dismissal for Ubuntu+Firefox
              await dismissModal(page, browserName);
              
              const settingsButton = page.locator('[class*="menu-bar"]')
                .locator('[class*="settings"], [aria-label*="settings" i], [aria-label*="advanced" i]')
                .first()
                .or(page.locator('button:has-text("Settings")'))
                .or(page.locator('button:has-text("Advanced")'));
              
              if (await settingsButton.count() > 0) {
                await settingsButton.click();
                await page.waitForTimeout(2000);
              }
              
              await page.screenshot({ path: 'screenshots/advanced-settings.png', fullPage: true });
            });
          });
          EOF

      - name: Checkout repo for chaos tests
        uses: actions/checkout@v4
        with:
          path: repo-source

      - name: Create chaos tests directory
        shell: bash
        run: |
          mkdir -p .github/chaos-tests
          
          if [ -d "repo-source/.github/chaos-tests" ]; then
            cp -r repo-source/.github/chaos-tests/* .github/chaos-tests/ 2>/dev/null || true
          fi
          
          if [ ! "$(ls -A .github/chaos-tests/*.json 2>/dev/null)" ]; then
            cat > .github/chaos-tests/sample-tabs.json << 'JSONEOF'
          {
            "name": "Sample Tab Navigation",
            "description": "Navigate through all tabs",
            "actions": [
              { "type": "goto", "url": "/editor.html" },
              { "type": "wait", "duration": 3000 },
              { "type": "click", "selector": "[class*='react-tabs_react-tabs__tab']", "index": 1 },
              { "type": "wait", "duration": 2000 },
              { "type": "click", "selector": "[class*='react-tabs_react-tabs__tab']", "index": 2 },
              { "type": "wait", "duration": 2000 },
              { "type": "click", "selector": "[class*='react-tabs_react-tabs__tab']", "index": 0 },
              { "type": "wait", "duration": 2000 }
            ]
          }
          JSONEOF
          fi

      - name: Generate chaos and recorded tests
        shell: bash
        run: |
          # ✅ FIX: NO service worker filtering - catch ALL errors!
          cat > chaos-test.spec.js << 'EOF'
          const { test } = require('@playwright/test');
          const fs = require('fs');

          // ✅ FIX: Improved modal dismissal helper for Ubuntu+Firefox
          async function dismissModal(page, browserName) {
            const isUbuntu = process.platform === 'linux';
            const isFirefox = browserName === 'firefox';
            const isTargetPlatform = isUbuntu && isFirefox;
            
            if (isTargetPlatform) {
              console.log('🎯 Detected Ubuntu+Firefox - applying enhanced modal dismissal');
            }

            // Try to capture screenshot before dismissal
            try {
              const preDismissalPath = `screenshots/chaos-pre-modal-dismissal-${Date.now()}.png`;
              await page.screenshot({ path: preDismissalPath });
              if (isTargetPlatform) {
                console.log(`📸 Pre-dismissal screenshot saved: ${preDismissalPath}`);
              }
            } catch (e) {
              console.log('Could not capture pre-dismissal screenshot:', e.message);
            }

            let modalDismissed = false;

            // Strategy 1: Click close button inside modal
            try {
              const modalOverlay = page.locator('.ReactModal__Overlay');
              if (await modalOverlay.count() > 0) {
                console.log('🔍 Found ReactModal overlay');
                
                const closeButton = page.locator('.ReactModal__Content button').first()
                  .or(page.locator('[class*="modal"] button').first())
                  .or(page.locator('button[aria-label*="close" i]').first());
                
