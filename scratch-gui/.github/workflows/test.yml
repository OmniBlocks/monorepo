name: Build Monitor
on:
  push:
    branches: [ main ]

jobs:
  build-monitor:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run build and capture output
      id: build
      run: |
        # Run build and capture both stdout and stderr
        npm run build 2>&1 | tee build-output.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "status=failure" >> $GITHUB_OUTPUT
          echo "Build failed, see build-output.log"
        fi
      
    - name: Create issue if build failed
      if: steps.build.outputs.status == 'failure'
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          try {
            const buildOutput = fs.readFileSync('build-output.log', 'utf8');
            
            // Extract the most relevant error lines
            const errorLines = buildOutput.split('\n').filter(line => 
              line.toLowerCase().includes('error') || 
              line.toLowerCase().includes('fail') || 
              line.includes('ERR!')
            );
            
            // Build error summary safely
            let errorSummary = '';
            if (errorLines.length > 0) {
              errorSummary = [
                '**Most relevant errors:**',
                '```',
                ...errorLines,
                '```'
              ].join('\n');
            } else {
              errorSummary = 'No specific error messages detected';
            }
            
            // Format the issue body
            const issueBody = [
              `🚨 **Build failed in commit [\`${context.sha.substring(0, 7)}\`](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/commit/${context.sha})**`,
              '',
              errorSummary,
              '',
              `**Workflow run:** [View details](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              '<details>',
              '<summary>Full build output</summary>',
              '',
              '```',
              buildOutput,
              '```',
              '</details>',
              '',
              '**Next steps:**',
              '1. Check the commit changes',
              '2. Review the build errors above',
              '3. Fix the issues or revert the commit'
            ].join('\n');

            // Check for existing issues
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['build-failure']
            });
            
            const existingIssue = issues.find(issue => 
              issue.title.includes('Build Failure') && 
              issue.labels.some(label => label.name === 'build-failure')
            );
            
            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Build Failure - ${new Date().toLocaleString()}`,
                body: issueBody,
                labels: ['build-failure', 'bug']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `⚠️ **New build failure detected**\n\n${issueBody}`
              });
            }
          } catch (error) {
            console.error('Error creating issue:', error);
            // Fallback to simple issue creation if file reading fails
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Build Failure - ${new Date().toLocaleString()}`,
              body: `Build failed in commit ${context.sha}. Please check the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['build-failure', 'bug']
            });
          }
