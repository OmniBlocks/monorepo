name: Visual Regression Testing (Enhanced)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-files:
    # PR events, or /vrt comment by a human on a PR. Ignore dependabot.
    if: |
      github.actor != 'dependabot[bot]' &&
      (
        github.event_name == 'pull_request' ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request &&
          contains(github.event.comment.body, '/vrt') &&
          github.event.comment.user.type == 'User'
        )
      )
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.choose.outputs.should_run }}
      pr_number: ${{ steps.pr.outputs.number }}
      head_sha: ${{ steps.pr.outputs.head_sha }}
      base_sha: ${{ steps.pr.outputs.base_sha }}
      requester: ${{ steps.pr.outputs.requester }}
      is_human: ${{ steps.pr.outputs.is_human }}
    steps:
      - name: React to /vrt (comment trigger)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR and requester
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'issue_comment'
              ? context.issue.number
              : context.payload.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const requesterLogin = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : pr.data.user.login;

            const requesterType = context.eventName === 'issue_comment'
              ? context.payload.comment.user.type
              : (context.payload.sender && context.payload.sender.type) || 'User';

            core.setOutput('number', pr.data.number);
            core.setOutput('head_sha', pr.data.head.sha);
            core.setOutput('base_sha', pr.data.base.sha);
            core.setOutput('requester', requesterLogin);
            core.setOutput('is_human', requesterType === 'User' ? 'true' : 'false');

      - name: Decide whether to run
        id: choose
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const forced = (context.eventName === 'issue_comment') &&
                           context.payload.comment &&
                           /\/vrt/i.test(context.payload.comment.body);

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100
            });

            const changed = files.map(f => f.filename);
            const docsOnly = changed.length > 0 && changed.every(f => /\.(md|txt|ya?ml)$/i.test(f));

            const shouldRun = forced || !docsOnly;
            core.info(`Changed files (${changed.length}): ${changed.join(', ') || '(none)'}`);
            core.setOutput('should_run', shouldRun ? 'true' : 'false');

      - name: Post skip notice
        if: steps.choose.outputs.should_run == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const isHuman = '${{ steps.pr.outputs.is_human }}' === 'true';
            const name = isHuman ? '@' + '${{ steps.pr.outputs.requester }}' : '${{ steps.pr.outputs.requester }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ steps.pr.outputs.number }}'),
              body:
                `## 🎬 Visual Regression Testing — Skipped\n\n` +
                `Hi ${name}! VRT was skipped because this PR only changes .md/.txt/.yml files.\n\n` +
                `To force a run, comment \`/vrt\` on this PR.`
            });

  build:
    needs: check-files
    if: needs.check-files.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      comment_id: ${{ steps.open_comment.outputs.comment_id }}
    steps:
      - name: Open status comment
        id: open_comment
        uses: actions/github-script@v7
        env:
          REQUESTER: ${{ needs.check-files.outputs.requester }}
          IS_HUMAN: ${{ needs.check-files.outputs.is_human }}
          PR_NUMBER: ${{ needs.check-files.outputs.pr_number }}
        with:
          script: |
            const name = process.env.IS_HUMAN === 'true' ? '@' + process.env.REQUESTER : process.env.REQUESTER;
            const body =
              `## 🚀 ULTRA Visual Regression Tester — LET’S GOOOO\n\n` +
              `Requester: ${name}\n\n` +
              `- 🏗️ Build: spinning up\n` +
              `- 🧪 Matrix: queued (3 OS × 3 browsers = 9 combos)\n` +
              `- 🎨 Analysis: incoming\n\n` +
              `_parallelize all the pixels_ ✨`;
            const c = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body
            });
            core.setOutput('comment_id', String(c.data.id));

      - name: Save comment id
        run: echo "${{ steps.open_comment.outputs.comment_id }}" > comment_id.txt

      - name: Upload comment id
        uses: actions/upload-artifact@v4
        with:
          name: vrt-comment-id
          path: comment_id.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Build BASE at repo root
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-files.outputs.base_sha }}
          fetch-depth: 1

      - name: Install and build (base)
        env:
          NODE_ENV: production
        shell: bash
        run: |
          set -e
          npm ci

          # Provide rimraf/mkdirp shims without heredocs (avoid YAML '<<' issues)
          mkdir -p .github/ci-bin
          if ! command -v rimraf >/dev/null 2>&1; then
            printf '#!/usr/bin/env bash\nrm -rf "$@"\n' > .github/ci-bin/rimraf
            chmod +x .github/ci-bin/rimraf
          fi
          if ! command -v mkdirp >/dev/null 2>&1; then
            printf '#!/usr/bin/env bash\nmkdir -p "$@"\n' > .github/ci-bin/mkdirp
            chmod +x .github/ci-bin/mkdirp
          fi
          export PATH="$PWD/.github/ci-bin:$PATH"

          # Try normal build; fallback to manual clean + webpack if needed
          if ! npm run build; then
            echo "npm run build failed; attempting fallback…"
            rm -rf ./build ./dist && mkdir -p build dist
            if [ -x ./node_modules/.bin/webpack ]; then
              ./node_modules/.bin/webpack --colors --bail
            else
              npx -y webpack-cli@3 webpack --colors --bail
            fi
          fi

          test -d build && [ -n "$(ls -A build)" ] || { echo "build/ missing or empty"; exit 1; }
          mkdir -p /tmp/vrt-builds
          cp -r build /tmp/vrt-builds/base-build

      # Build PR at repo root
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check-files.outputs.head_sha }}
          clean: true
          fetch-depth: 1

      - name: Install and build (PR)
        env:
          NODE_ENV: production
        shell: bash
        run: |
          set -e
          npm ci

          mkdir -p .github/ci-bin
          if ! command -v rimraf >/dev/null 2>&1; then
            printf '#!/usr/bin/env bash\nrm -rf "$@"\n' > .github/ci-bin/rimraf
            chmod +x .github/ci-bin/rimraf
          fi
          if ! command -v mkdirp >/dev/null 2>&1; then
            printf '#!/usr/bin/env bash\nmkdir -p "$@"\n' > .github/ci-bin/mkdirp
            chmod +x .github/ci-bin/mkdirp
          fi
          export PATH="$PWD/.github/ci-bin:$PATH"

          if ! npm run build; then
            echo "npm run build failed; attempting fallback…"
            rm -rf ./build ./dist && mkdir -p build dist
            if [ -x ./node_modules/.bin/webpack ]; then
              ./node_modules/.bin/webpack --colors --bail
            else
              npx -y webpack-cli@3 webpack --colors --bail
            fi
          fi

          test -d build && [ -n "$(ls -A build)" ] || { echo "build/ missing or empty"; exit 1; }
          cp -r build /tmp/vrt-builds/pr-build

      - name: Upload base build
        uses: actions/upload-artifact@v4
        with:
          name: base-build
          path: /tmp/vrt-builds/base-build/
          if-no-files-found: error
          retention-days: 2

      - name: Upload PR build
        uses: actions/upload-artifact@v4
        with:
          name: pr-build
          path: /tmp/vrt-builds/pr-build/
          if-no-files-found: error
          retention-days: 2

      - name: Update comment (build complete)
        if: success()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.open_comment.outputs.comment_id }}
          REQUESTER: ${{ needs.check-files.outputs.requester }}
          IS_HUMAN: ${{ needs.check-files.outputs.is_human }}
        with:
          script: |
            const name = process.env.IS_HUMAN === 'true' ? '@' + process.env.REQUESTER : process.env.REQUESTER;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: Number(process.env.COMMENT_ID),
              body:
                `## 🚀 ULTRA Visual Regression Tester — BUILD READY\n\n` +
                `Requester: ${name}\n\n` +
                `- 🏗️ Build: ✅ done\n` +
                `- 🧪 Matrix: running across the multiverse\n` +
                `- 🎨 Analysis: standing by\n\n` +
                `_snapping screenshots like paparazzi_ 📸`
            });

      - name: Update comment (build failed)
        if: failure()
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.open_comment.outputs.comment_id }}
          REQUESTER: ${{ needs.check-files.outputs.requester }}
          IS_HUMAN: ${{ needs.check-files.outputs.is_human }}
        with:
          script: |
            const name = process.env.IS_HUMAN === 'true' ? '@' + process.env.REQUESTER : process.env.REQUESTER;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: Number(process.env.COMMENT_ID),
              body:
                `## ❌ VRT couldn’t launch — build tripped over itself\n\n` +
                `Hey ${name}, the build phase failed so visual checks didn’t run.\n` +
                `Peek the logs for the exact faceplant. We’ll fix fast and re‑run!`
            });

  test-matrix:
    needs: [check-files, build]
    if: success()
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        browser: [chromium, firefox, webkit]
    steps:
      - name: Download base build
        uses: actions/download-artifact@v4
        with:
          name: base-build
          path: base-build/

      - name: Download PR build
        uses: actions/download-artifact@v4
        with:
          name: pr-build
          path: pr-build/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright and helpers
        shell: bash
        run: |
          set -e
          npm init -y
          npm install --save-dev @playwright/test@latest gifenc pngjs pixelmatch
          if [ "${RUNNER_OS}" = "Linux" ]; then
            npx -y playwright@latest install --with-deps ${{ matrix.browser }}
          else
            npx -y playwright@latest install ${{ matrix.browser }}
          fi

      - name: Write Playwright config
        shell: bash
        run: |
          cat > playwright.config.js << 'EOF'
          const { defineConfig, devices } = require('@playwright/test');
          const browserDevices = {
            chromium: 'Desktop Chrome',
            firefox: 'Desktop Firefox',
            webkit: 'Desktop Safari'
          };
          module.exports = defineConfig({
            testDir: '.',
            timeout: 60000,
            fullyParallel: false,
            forbidOnly: !!process.env.CI,
            retries: 2,
            workers: 1,
            reporter: 'list',
            use: {
              trace: 'retain-on-failure',
              screenshot: 'only-on-failure',
              viewport: { width: 1366, height: 900 },
              video: 'on'
            },
            projects: [{
              name: process.env.BROWSER || 'chromium',
              use: { ...devices[browserDevices[process.env.BROWSER || 'chromium']] }
            }]
          });
          EOF

      - name: Write tests (initial + extension + advanced settings)
        shell: bash
        run: |
          cat > screenshot-test.spec.js << 'EOF'
          const { test, expect } = require('@playwright/test');

          const PORT = process.env.PORT || '8080';
          const BASE = `http://localhost:${PORT}`;

          async function waitEditor(page) {
            await page.goto(`${BASE}/editor.html`);
            await page.waitForLoadState('networkidle');
            await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
            await page.waitForTimeout(1000);
          }

          test.describe('Visual Regression (focused set)', () => {
            test('Editor - Initial', async ({ page }) => {
              await waitEditor(page);
              await page.screenshot({ path: 'screenshots/editor-initial.png', fullPage: true });
            });

            test('Extension Library Modal', async ({ page }) => {
              await waitEditor(page);
              const extBtn = page.locator(
                '[aria-label="Add Extension"], [aria-label*="extension" i], button:has-text("Add Extension"), [data-testid*="extension"], [class*="extension-button"]'
              ).first();
              if (await extBtn.count()) {
                await extBtn.click();
                await page.waitForTimeout(800);
              }
              await page.screenshot({ path: 'screenshots/extension-library.png', fullPage: true });
            });

            test('Advanced Settings Modal', async ({ page }) => {
              await waitEditor(page);
              const candidates = [
                '[aria-label*="advanced" i]',
                '[aria-label*="settings" i]',
                'button:has-text("Advanced")',
                'button:has-text("Settings")'
              ];
              for (const sel of candidates) {
                const h = page.locator(sel).first();
                if (await h.count()) { await h.click(); break; }
              }
              await page.waitForTimeout(800);
              await page.screenshot({ path: 'screenshots/advanced-settings.png', fullPage: true });
            });
          });
          EOF

      - name: Start base server
        shell: bash
        run: |
          npx -y http-server@14 base-build -p 8080 >/dev/null 2>&1 &
          echo $! > base-server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/ >/dev/null 2>&1; then
              echo "Base server ready"
              break
            fi
            [ $i -eq 30 ] && { echo "Base server failed"; exit 1; }
            sleep 1
          done

      - name: Capture base screenshots
        env:
          BROWSER: ${{ matrix.browser }}
        shell: bash
        run: |
          set -e
          mkdir -p screenshots-base
          rm -rf screenshots test-results || true
          npx playwright test screenshot-test.spec.js
          [ -d screenshots ] && cp -r screenshots/* screenshots-base/ || true
          rm -rf screenshots

      - name: Stop base server
        if: always()
        shell: bash
        run: |
          [ -f base-server.pid ] && kill "$(cat base-server.pid)" 2>/dev/null || true
          rm -f base-server.pid

      - name: Start PR server
        shell: bash
        run: |
          npx -y http-server@14 pr-build -p 8081 >/dev/null 2>&1 &
          echo $! > pr-server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:8081/ >/dev/null 2>&1; then
              echo "PR server ready"
              break
            fi
            [ $i -eq 30 ] && { echo "PR server failed"; exit 1; }
            sleep 1
          done

      - name: Capture PR screenshots
        env:
          PORT: '8081'
          BROWSER: ${{ matrix.browser }}
        shell: bash
        run: |
          set -e
          mkdir -p screenshots-pr
          rm -rf screenshots test-results || true
          npx playwright test screenshot-test.spec.js
          [ -d screenshots ] && cp -r screenshots/* screenshots-pr/ || true
          rm -rf screenshots

      - name: Compare and create diffs
        shell: bash
        run: |
          cat > compare.js << 'EOF'
          const fs = require('fs');
          const { PNG } = require('pngjs');
          const pixelmatch = require('pixelmatch');
          const { GIFEncoder, quantize, applyPalette } = require('gifenc');

          const shots = [
            'editor-initial.png',
            'extension-library.png',
            'advanced-settings.png'
          ];

          fs.mkdirSync('screenshots-diff', { recursive: true });
          fs.mkdirSync('screenshots-gifs', { recursive: true });

          let changesDetected = false;
          const results = [];

          for (const s of shots) {
            const base = `screenshots-base/${s}`;
            const pr = `screenshots-pr/${s}`;
            if (!fs.existsSync(base) || !fs.existsSync(pr)) {
              results.push({ name: s, skipped: true });
              continue;
            }

            const b = PNG.sync.read(fs.readFileSync(base));
            const p = PNG.sync.read(fs.readFileSync(pr));

            const w = Math.min(b.width, p.width);
            const h = Math.min(b.height, p.height);
            const diff = new PNG({ width: w, height: h });

            const n = pixelmatch(b.data, p.data, diff.data, w, h, { threshold: 0.1 });
            const pct = ((n / (w * h)) * 100).toFixed(2);

            if (n > 0) {
              changesDetected = true;
              fs.writeFileSync(`screenshots-diff/${s}`, PNG.sync.write(diff));

              try {
                const enc = GIFEncoder();
                for (const frame of [b, p, diff]) {
                  const pal = quantize(frame.data, 256, { format: 'rgba444' });
                  const idx = applyPalette(frame.data, pal, 'rgba444');
                  enc.writeFrame(idx, frame.width, frame.height, { palette: pal, delay: 900 });
                }
                enc.finish();
                fs.writeFileSync(`screenshots-gifs/${s.replace('.png', '.gif')}`, Buffer.from(enc.bytes()));
              } catch {}

              results.push({ name: s, diffPixels: n, diffPercentage: pct, hasDiff: true, skipped: false });
            } else {
              results.push({ name: s, diffPixels: 0, diffPercentage: '0.00', hasDiff: false, skipped: false });
            }
          }

          fs.writeFileSync('comparison-results.json', JSON.stringify({ changesDetected, results }, null, 2));
          EOF
          node compare.js

      - name: Upload results (per combo)
        uses: actions/upload-artifact@v4
        with:
          name: vrt-results-${{ matrix.os }}-${{ matrix.browser }}
          path: |
            comparison-results.json
            screenshots-base/
            screenshots-pr/
            screenshots-diff/
            screenshots-gifs/
          retention-days: 2

  merge-and-report:
    needs: [check-files, build, test-matrix]
    if: |
      always() &&
      needs.check-files.outputs.should_run == 'true' &&
      needs.build.result == 'success' &&
      (needs.test-matrix.result == 'success' || needs.test-matrix.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Download comment id
        uses: actions/download-artifact@v4
        with:
          name: vrt-comment-id

      - name: Read comment id
        id: cid
        run: echo "comment_id=$(cat comment_id.txt)" >> "$GITHUB_OUTPUT"

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: all-results/
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Analyze results
        id: analyze
        shell: bash
        run: |
          cat > analyze.js << 'EOF'
          const fs = require('fs');
          const path = require('path');

          const platforms = ['ubuntu-latest', 'windows-latest', 'macos-latest'];
          const browsers = ['chromium', 'firefox', 'webkit'];

          const all = {};
          let completed = 0;
          let changes = false;

          for (const os of platforms) {
            for (const br of browsers) {
              const dir = path.join('all-results', `vrt-results-${os}-${br}`);
              const file = path.join(dir, 'comparison-results.json');
              if (fs.existsSync(file)) {
                const data = JSON.parse(fs.readFileSync(file, 'utf8'));
                all[`${os}-${br}`] = data;
                completed++;
                if (data.changesDetected) changes = true;
              }
            }
          }

          const summary = {
            anyChanges: changes,
            totalCombinations: platforms.length * browsers.length,
            completedCombinations: completed,
            allResults: all
          };
          fs.writeFileSync('merged-analysis.json', JSON.stringify(summary, null, 2));
          EOF
          node analyze.js
          echo "completed=$(node -p \"require('./merged-analysis.json').completedCombinations\")" >> "$GITHUB_OUTPUT"
          echo "any_changes=$(node -p \"require('./merged-analysis.json').anyChanges\")" >> "$GITHUB_OUTPUT"

      - name: Push baselines (ubuntu+chromium only)
        if: steps.analyze.outputs.completed != '0'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" vrt-baselines-repo
          cd vrt-baselines-repo
          if ! git show-ref --quiet refs/heads/vrt-baselines; then
            git checkout --orphan vrt-baselines
            git rm -rf . >/dev/null 2>&1 || true
          else
            git checkout vrt-baselines
          fi

          rm -rf .github
          mkdir -p "pr-${{ needs.check-files.outputs.pr_number }}"
          SRC="../all-results/vrt-results-ubuntu-latest-chromium"
          [ -d "$SRC" ] && cp -r "$SRC"/* "pr-${{ needs.check-files.outputs.pr_number }}/" || true

          cat > "pr-${{ needs.check-files.outputs.pr_number }}/README.md" <<MD
          # Visual Regression Baseline (Enhanced)
          - Base SHA: \`${{ needs.check-files.outputs.base_sha }}\`
          - PR SHA: \`${{ needs.check-files.outputs.head_sha }}\`
          - Run: #${{ github.run_number }}
          - Platforms tested: ubuntu, windows, macos
          - Browsers tested: chromium, firefox, webkit
          MD

          git add .
          git commit -m "Add VRT baselines for PR #${{ needs.check-files.outputs.pr_number }}" || true
          git push -u origin vrt-baselines

      - name: Push images for all combos
        id: upload_images
        if: steps.analyze.outputs.completed != '0'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --depth 1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" vrt-images-repo
          cd vrt-images-repo
          if ! git show-ref --quiet refs/heads/vrt-images; then
            git checkout --orphan vrt-images
            git rm -rf . >/dev/null 2>&1 || true
          else
            git checkout vrt-images
          fi

          rm -rf .github
          RUN_DIR="pr-${{ needs.check-files.outputs.pr_number }}/run-${{ github.run_number }}"
          mkdir -p "$RUN_DIR"

          for os in ubuntu-latest windows-latest macos-latest; do
            for br in chromium firefox webkit; do
              SRC="../all-results/vrt-results-${os}-${br}"
              if [ -d "$SRC" ]; then
                mkdir -p "$RUN_DIR/${os}-${br}"
                cp -r "$SRC/comparison-results.json" "$RUN_DIR/${os}-${br}/" || true
                cp -r "$SRC/screenshots-base" "$RUN_DIR/${os}-${br}/" || true
                cp -r "$SRC/screenshots-pr" "$RUN_DIR/${os}-${br}/" || true
                cp -r "$SRC/screenshots-diff" "$RUN_DIR/${os}-${br}/" || true
                cp -r "$SRC/screenshots-gifs" "$RUN_DIR/${os}-${br}/" || true
              fi
            done
          done

          git add .
          git commit -m "VRT images for PR #${{ needs.check-files.outputs.pr_number }} run #${{ github.run_number }}" || true
          git push -u origin vrt-images

          echo "base_url=https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/vrt-images/${RUN_DIR}" >> "$GITHUB_OUTPUT"

      - name: Update comment (results)
        if: steps.analyze.outputs.completed != '0'
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.cid.outputs.comment_id }}
          REQUESTER: ${{ needs.check-files.outputs.requester }}
          IS_HUMAN: ${{ needs.check-files.outputs.is_human }}
          BASE_URL: ${{ steps.upload_images.outputs.base_url }}
        with:
          script: |
            const fs = require('fs');
            const analysis = JSON.parse(fs.readFileSync('merged-analysis.json','utf8'));
            const name = process.env.IS_HUMAN === 'true' ? '@' + process.env.REQUESTER : process.env.REQUESTER;

            const platforms = {
              'ubuntu-latest': '<img width="12" height="12" alt="Ubuntu Logo" src="https://github.com/user-attachments/assets/f61ac63e-1fc8-4577-9fb1-736d921b81a2" /> Ubuntu',
              'windows-latest': '<img width="12" height="12" alt="Windows Logo" src="https://github.com/user-attachments/assets/4da4c060-732a-4aaf-b080-6b8de0600c71" /> Windows',
              'macos-latest': '<img width="12" height="12" alt="Apple Logo" src="https://github.com/user-attachments/assets/636ee068-b7a7-489d-a545-a616534900ed" /> Apple'
            };
            const browsers = { chromium:'Chrome', firefox:'Firefox', webkit:'WebKit' };

            let body = '';
            body += `## 🎬 ULTRA Visual Regression — FINAL CUT\n\n`;
            body += `Requester: ${name}\n\n`;
            body += `Combos finished: **${analysis.completedCombinations}/${analysis.totalCombinations}**\n\n`;
            body += analysis.anyChanges ? '⚠️ Visual changes detected — see highlights below.\n\n' : '✅ No visual diffs found — ship it! 🛳️\n\n';

            body += '### 📊 Matrix Summary\n\n';
            body += '| Platform | Browser | Changes | Details |\n|---|---|---|---|\n';
            for (const [key, r] of Object.entries(analysis.allResults)) {
              const parts = key.split('-'); const br = parts.pop(); const os = parts.join('-');
              const status = r.changesDetected ? '⚠️ Changes' : '✅ No changes';
              const link = `[View](#${key.replace(/[^a-z0-9]/gi,'')})`;
              body += `| ${platforms[os]||os} | ${browsers[br]||br} | ${status} | ${link} |\n`;
            }
            body += '\n---\n\n';

            for (const [key, r] of Object.entries(analysis.allResults)) {
              const parts = key.split('-'); const br = parts.pop(); const os = parts.join('-');
              const open = r.changesDetected ? ' open' : '';
              body += `<details id="${key.replace(/[^a-z0-9]/gi,'')}"${open}>\n`;
              body += `<summary><strong>${platforms[os]||os} + ${browsers[br]||br}</strong></summary>\n\n`;
              if (!r.results?.length) { body += `_No results._\n\n</details>\n\n`; continue; }
              for (const item of r.results) {
                if (item.skipped) continue;
                const nice = item.name.replace('.png','').replace(/-/g,' ').replace(/\b\w/g, m => m.toUpperCase());
                body += `#### ${nice}\n\n`;
                if (item.hasDiff) {
                  body += `<table><tr><th>Base</th><th>PR</th><th>Diff</th></tr><tr>`;
                  body += `<td><img src="${process.env.BASE_URL}/${key}/screenshots-base/${item.name}" width="280"/></td>`;
                  body += `<td><img src="${process.env.BASE_URL}/${key}/screenshots-pr/${item.name}" width="280"/></td>`;
                  body += `<td><img src="${process.env.BASE_URL}/${key}/screenshots-diff/${item.name}" width="280"/></td>`;
                  body += `</tr></table>\n\n`;
                  const gif = item.name.replace('.png','.gif');
                  body += `<img src="${process.env.BASE_URL}/${key}/screenshots-gifs/${gif}" width="840"/>\n\n`;
                  body += `Diff: ${item.diffPercentage}% (${item.diffPixels} px)\n\n`;
                } else {
                  body += `✅ Pixel-perfect match.\n\n`;
                }
              }
              body += `</details>\n\n`;
            }

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: Number(process.env.COMMENT_ID),
              body
            });

      - name: Update comment (matrix produced no results)
        if: steps.analyze.outputs.completed == '0'
        uses: actions/github-script@v7
        env:
          COMMENT_ID: ${{ steps.cid.outputs.comment_id }}
          REQUESTER: ${{ needs.check-files.outputs.requester }}
          IS_HUMAN: ${{ needs.check-files.outputs.is_human }}
        with:
          script: |
            const name = process.env.IS_HUMAN === 'true' ? '@' + process.env.REQUESTER : process.env.REQUESTER;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: Number(process.env.COMMENT_ID),
              body:
                `## ❌ VRT matrix fizzled (0/9 produced results)\n\n` +
                `Sorry ${name}! Likely a Playwright install or server boot hiccup. Re-run with \`/vrt\` or push again — I’m ready to zoom.`
            });

  handle-build-failure:
    needs: [check-files, build]
    if: |
      always() &&
      needs.check-files.outputs.should_run == 'true' &&
      needs.build.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Download comment id
        uses: actions/download-artifact@v4
        with:
          name: vrt-comment-id
        continue-on-error: true

      - name: Post build failure comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const fs = require('fs');
              const id = fs.readFileSync('comment_id.txt', 'utf8').trim();
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: Number(id),
                body:
                  `## ❌ ULTRA Visual Regression Testing — Build Failed\n\n` +
                  `Build failed; VRT did not run. Please check the workflow logs.`
              });
            } catch (e) {
              core.warning('Could not update comment: ' + e.message);
            }
