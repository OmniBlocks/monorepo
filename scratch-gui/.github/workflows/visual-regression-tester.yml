name: Visual Regression Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  visual-regression:
    if: >-
      (github.actor != 'dependabot[bot]') &&
      ((github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/vrt')))
    runs-on: ubuntu-latest

    steps:
      - name: React to comment (if triggered by comment)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'issue_comment'
              ? context.issue.number
              : context.payload.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            return {
              ref: pr.data.head.ref,
              sha: pr.data.head.sha,
              number: pr.data.number,
              base_ref: pr.data.base.ref,
              base_sha: pr.data.base.sha
            };

      - name: Post initial comment
        id: vrt_comment
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ fromJSON(steps.pr.outputs.result).number }},
              body: `## 🎬 Visual Regression Testing\n\n` +
                    `Hi @${username}! Starting the MEGA visual regression test...\n\n` +
                    `⏳ Building base and PR versions...\n` +
                    `📸 Capturing screenshots with video recording...\n` +
                    `🎨 Generating diff images and GIF animations...\n` +
                    `💾 Saving baselines to version control...\n\n` +
                    `_This is going to be awesome!_ 🚀`
            });
            return comment.data.id;

      # ============================================================
      # BUILD BASE VERSION
      # ============================================================
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).base_sha }}
          path: base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: base/package-lock.json

      - name: Install dependencies (base)
        working-directory: base
        run: npm ci

      - name: Build base version
        working-directory: base
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start base server
        working-directory: base
        run: |
          npx http-server build -p 8080 &
          echo $! > ../base-server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "Base server is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Base server failed to start"
              exit 1
            fi
            sleep 1
          done

      # ============================================================
      # PLAYWRIGHT TEST HARNESS WITH VIDEO RECORDING
      # ============================================================
      - name: Install Playwright and dependencies
        run: |
          npm init -y
          npm install --save-dev @playwright/test@latest gifenc pngjs pixelmatch
          npx playwright install --with-deps chromium

      - name: Create Playwright config with video recording
        run: |
          cat > playwright.config.js << 'EOF'
          const { defineConfig, devices } = require('@playwright/test');
          module.exports = defineConfig({
            testDir: '.',
            timeout: 60000,
            fullyParallel: false,
            forbidOnly: !!process.env.CI,
            retries: 2,
            workers: 1,
            reporter: 'list',
            use: {
              trace: 'retain-on-failure',
              screenshot: 'only-on-failure',
              viewport: { width: 1366, height: 900 },
              video: {
                mode: 'on',
                size: { width: 1366, height: 900 }
              }
            },
            projects: [
              {
                name: 'chromium',
                use: { ...devices['Desktop Chrome'] },
              },
            ],
          });
          EOF

      - name: Create Playwright test (tab fix + songs)
        run: |
          cat > screenshot-test.spec.js << 'EOF'
          const { test, expect } = require('@playwright/test');

          const PORT = process.env.PORT || '8080';
          const BASE = `http://localhost:${PORT}`;

          async function waitEditor(page) {
            await page.waitForLoadState('networkidle');
            await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
            await page.waitForTimeout(1500);
          }

          async function clickTabByIndex(page, index) {
            const tabList = page.locator('[role="tablist"]').first();
            await expect(tabList).toBeVisible({ timeout: 10000 });
            const tab = tabList.locator('[role="tab"]').nth(index);
            await expect(tab).toBeVisible({ timeout: 5000 });
            await tab.scrollIntoViewIfNeeded();
            await tab.click({ trial: false });
            await page.waitForTimeout(800);
          }

          test.describe('Visual Regression Screenshots', () => {
            test('Editor - Initial Load', async ({ page }) => {
              await page.goto(`${BASE}/editor.html`);
              await waitEditor(page);
              await page.screenshot({ path: 'screenshots/editor-initial.png', fullPage: true });
            });

            test('Editor - Blocks Workspace', async ({ page }) => {
              await page.goto(`${BASE}/editor.html`);
              await waitEditor(page);
              const editorWrapper = page.locator('[class*="editor-wrapper"]').first();
              if (await editorWrapper.count()) {
                await editorWrapper.screenshot({ path: 'screenshots/blocks-workspace.png' });
              } else {
                await page.screenshot({ path: 'screenshots/blocks-workspace.png', fullPage: false });
              }
            });

            test('Editor - Stage and Sprites', async ({ page }) => {
              await page.goto(`${BASE}/editor.html`);
              await waitEditor(page);
              const stageWrapper = page.locator('[class*="stage-and-target-wrapper"]').first();
              if (await stageWrapper.count()) {
                await stageWrapper.screenshot({ path: 'screenshots/stage-sprites.png' });
              } else {
                await page.screenshot({ path: 'screenshots/stage-sprites.png', clip: { x: 0, y: 0, width: 600, height: 800 } });
              }
            });

            test('Editor - Code Tab', async ({ page }) => {
              await page.goto(`${BASE}/editor.html`);
              await waitEditor(page);
              await clickTabByIndex(page, 0);
              await page.screenshot({ path: 'screenshots/code-tab.png', fullPage: true });
            });

            test('Editor - Costumes Tab', async ({ page }) => {
              await page.goto(`${BASE}/editor.html`);
              await waitEditor(page);
              await clickTabByIndex(page, 1);
              await page.screenshot({ path: 'screenshots/costumes-tab.png', fullPage: true });
            });

            test('Editor - Sounds Tab', async ({ page }) => {
              await page.goto(`${BASE}/editor.html`);
              await waitEditor(page);
              await clickTabByIndex(page, 2);
              await page.screenshot({ path: 'screenshots/sounds-tab.png', fullPage: true });
            });

            test('Editor - Songs Tab', async ({ page }) => {
              await page.goto(`${BASE}/editor.html`);
              await waitEditor(page);
              await clickTabByIndex(page, 3);
              await page.screenshot({ path: 'screenshots/songs-tab.png', fullPage: true });
            });

            test('Player View', async ({ page }) => {
              await page.goto(`${BASE}/`);
              await page.waitForLoadState('networkidle');
              await page.waitForTimeout(1000);
              await page.screenshot({ path: 'screenshots/player-view.png', fullPage: true });
            });
          });
          EOF

      # ============================================================
      # CAPTURE BASE SCREENSHOTS
      # ============================================================
      - name: Capture base screenshots
        run: |
          mkdir -p screenshots-base videos-base
          npx playwright test screenshot-test.spec.js --project=chromium
          mv screenshots screenshots-base/
          # Move videos if they exist
          find test-results -name "*.webm" -exec mv {} videos-base/ \; 2>/dev/null || true

      - name: Stop base server
        if: always()
        run: |
          if [ -f base-server.pid ]; then
            kill $(cat base-server.pid) || true
            rm base-server.pid
          fi

      # ============================================================
      # BUILD PR VERSION
      # ============================================================
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).sha }}
          path: pr

      - name: Install dependencies (PR)
        working-directory: pr
        run: npm ci

      - name: Build PR version
        working-directory: pr
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start PR server
        working-directory: pr
        run: |
          npx http-server build -p 8081 &
          echo $! > ../pr-server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:8081/ > /dev/null; then
              echo "PR server is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "PR server failed to start"
              exit 1
            fi
            sleep 1
          done

      # ============================================================
      # CAPTURE PR SCREENSHOTS
      # ============================================================
      - name: Capture PR screenshots
        env:
          PORT: '8081'
        run: |
          mkdir -p screenshots-pr videos-pr
          rm -rf test-results
          npx playwright test screenshot-test.spec.js --project=chromium
          mv screenshots screenshots-pr/
          find test-results -name "*.webm" -exec mv {} videos-pr/ \; 2>/dev/null || true

      - name: Stop PR server
        if: always()
        run: |
          if [ -f pr-server.pid ]; then
            kill $(cat pr-server.pid) || true
            rm pr-server.pid
          fi

      # ============================================================
      # COMPARE & CREATE GIFS
      # ============================================================
      - name: Compare screenshots and generate GIFs
        id: compare
        run: |
          cat > compare-and-gif.js << 'EOF'
          const fs = require('fs');
          const PNG = require('pngjs').PNG;
          const pixelmatch = require('pixelmatch');
          const { GIFEncoder, quantize, applyPalette } = require('gifenc');

          const screenshots = [
            'editor-initial.png',
            'blocks-workspace.png',
            'stage-sprites.png',
            'code-tab.png',
            'costumes-tab.png',
            'sounds-tab.png',
            'songs-tab.png',
            'player-view.png'
          ];

          let changesDetected = false;
          const results = [];

          fs.mkdirSync('screenshots-diff', { recursive: true });
          fs.mkdirSync('screenshots-gifs', { recursive: true });

          for (const screenshot of screenshots) {
            const basePath = `screenshots-base/${screenshot}`;
            const prPath = `screenshots-pr/${screenshot}`;

            if (!fs.existsSync(basePath) || !fs.existsSync(prPath)) {
              console.log(`Skipping ${screenshot} - file not found`);
              results.push({ name: screenshot, skipped: true });
              continue;
            }

            const base = PNG.sync.read(fs.readFileSync(basePath));
            const pr = PNG.sync.read(fs.readFileSync(prPath));

            const { width, height } = base;
            const diff = new PNG({ width, height });

            const numDiffPixels = pixelmatch(
              base.data,
              pr.data,
              diff.data,
              width,
              height,
              { threshold: 0.1 }
            );

            const diffPercentage = ((numDiffPixels / (width * height)) * 100).toFixed(2);

            if (numDiffPixels > 0) {
              changesDetected = true;
              
              // Save diff image
              fs.writeFileSync(`screenshots-diff/${screenshot}`, PNG.sync.write(diff));
              
              // Create animated GIF: base → pr → diff
              try {
                const gif = GIFEncoder();
                
                // Convert PNG to indexed color for GIF
                const frames = [base, pr, diff];
                const format = 'rgba444'; // Simplified palette
                
                for (const frame of frames) {
                  const palette = quantize(frame.data, 256, { format });
                  const index = applyPalette(frame.data, palette, format);
                  gif.writeFrame(index, width, height, { palette, delay: 1000 });
                }
                
                gif.finish();
                const gifBuffer = Buffer.from(gif.bytes());
                fs.writeFileSync(`screenshots-gifs/${screenshot.replace('.png', '.gif')}`, gifBuffer);
              } catch (e) {
                console.log(`Could not create GIF for ${screenshot}: ${e.message}`);
              }
              
              results.push({
                name: screenshot,
                diffPixels: numDiffPixels,
                diffPercentage,
                hasDiff: true
              });
            } else {
              results.push({
                name: screenshot,
                diffPixels: 0,
                diffPercentage: '0.00',
                hasDiff: false
              });
            }
          }

          fs.writeFileSync('comparison-results.json', JSON.stringify({ changesDetected, results }, null, 2));
          EOF

          node compare-and-gif.js
          CHANGES=$(cat comparison-results.json | grep -o '"changesDetected":[^,}]*' | cut -d':' -f2 | tr -d ' ')
          echo "changes_detected=$CHANGES" >> $GITHUB_OUTPUT

      # ============================================================
      # SAVE BASELINES TO VERSION CONTROL
      # ============================================================
      - name: Save baseline screenshots to vrt-baselines branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create/checkout vrt-baselines branch
          git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git vrt-baselines-repo || true
          cd vrt-baselines-repo
          
          git fetch origin vrt-baselines 2>/dev/null || git checkout --orphan vrt-baselines
          git checkout vrt-baselines 2>/dev/null || echo "Creating new vrt-baselines branch"
          
          # Create directory for this PR
          mkdir -p pr-${{ fromJSON(steps.pr.outputs.result).number }}/base
          mkdir -p pr-${{ fromJSON(steps.pr.outputs.result).number }}/pr
          mkdir -p pr-${{ fromJSON(steps.pr.outputs.result).number }}/diff
          
          # Copy screenshots
          cp -r ../screenshots-base/* pr-${{ fromJSON(steps.pr.outputs.result).number }}/base/ 2>/dev/null || true
          cp -r ../screenshots-pr/* pr-${{ fromJSON(steps.pr.outputs.result).number }}/pr/ 2>/dev/null || true
          cp -r ../screenshots-diff/* pr-${{ fromJSON(steps.pr.outputs.result).number }}/diff/ 2>/dev/null || true
          
          # Create README
          cat > pr-${{ fromJSON(steps.pr.outputs.result).number }}/README.md << 'READMEEOF'
          # Visual Regression Baseline for PR #${{ fromJSON(steps.pr.outputs.result).number }}
          
          - **Base SHA**: `${{ fromJSON(steps.pr.outputs.result).base_sha }}`
          - **PR SHA**: `${{ fromJSON(steps.pr.outputs.result).sha }}`
          - **Run**: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - **Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          READMEEOF
          
          git add .
          git commit -m "Add VRT baselines for PR #${{ fromJSON(steps.pr.outputs.result).number }}" || echo "No changes to commit"
          git push origin vrt-baselines 2>/dev/null || git push -u origin vrt-baselines

      # ============================================================
      # UPLOAD INLINE IMAGES TO BRANCH
      # ============================================================
      - name: Upload diff images to vrt-images branch
        id: upload_images
        if: steps.compare.outputs.changes_detected == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Clone and setup vrt-images branch
          git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git vrt-images-repo || true
          cd vrt-images-repo
          
          git fetch origin vrt-images 2>/dev/null || git checkout --orphan vrt-images
          git checkout vrt-images 2>/dev/null || echo "Creating new vrt-images branch"
          
          # Create directory for this run
          RUN_DIR="run-${{ github.run_number }}"
          mkdir -p $RUN_DIR
          
          # Copy diff images and GIFs
          cp -r ../screenshots-diff/* $RUN_DIR/ 2>/dev/null || true
          cp -r ../screenshots-gifs/* $RUN_DIR/ 2>/dev/null || true
          
          git add .
          git commit -m "Add VRT images for run #${{ github.run_number }}" || echo "No changes"
          git push origin vrt-images 2>/dev/null || git push -u origin vrt-images
          
          # Output image URLs
          echo "image_base_url=https://raw.githubusercontent.com/${{ github.repository }}/vrt-images/run-${{ github.run_number }}" >> $GITHUB_OUTPUT

      # ============================================================
      # UPLOAD ARTIFACTS
      # ============================================================
      - name: Upload base screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-base
          path: screenshots-base/

      - name: Upload PR screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-pr
          path: screenshots-pr/

      - name: Upload diff screenshots
        if: steps.compare.outputs.changes_detected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-diff
          path: screenshots-diff/

      - name: Upload GIF animations
        if: steps.compare.outputs.changes_detected == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-gifs
          path: screenshots-gifs/

      - name: Upload comparison results
        uses: actions/upload-artifact@v4
        with:
          name: comparison-results
          path: comparison-results.json

      - name: Upload base videos
        uses: actions/upload-artifact@v4
        with:
          name: videos-base
          path: videos-base/

      - name: Upload PR videos
        uses: actions/upload-artifact@v4
        with:
          name: videos-pr
          path: videos-pr/

      # ============================================================
      # POST RESULTS WITH INLINE IMAGES
      # ============================================================
      - name: Post results comment with inline images
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('comparison-results.json', 'utf8'));
            const prNumber = ${{ fromJSON(steps.pr.outputs.result).number }};
            const runId = context.runId;
            const runNumber = context.runNumber;
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            
            const imageBaseUrl = '${{ steps.upload_images.outputs.image_base_url }}';

            let body = `## 🎬 Visual Regression Test Results\n\n`;
            body += `Hi @${username}! Here are the visual comparison results:\n\n`;

            if (results.changesDetected) {
              body += `### ⚠️ Visual Changes Detected\n\n`;
              
              const changedScreenshots = results.results.filter(r => r.hasDiff);
              
              for (const result of changedScreenshots) {
                const displayName = result.name.replace('.png', '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                body += `#### 📸 ${displayName}\n`;
                body += `- **Difference:** ${result.diffPercentage}% (${result.diffPixels.toLocaleString()} pixels)\n\n`;
                
                // Inline diff image
                body += `**Diff Visualization:**\n\n`;
                body += `![${displayName} Diff](${imageBaseUrl}/${result.name})\n\n`;
                
                // Inline GIF animation
                const gifName = result.name.replace('.png', '.gif');
                body += `**Animated Comparison (Base → PR → Diff):**\n\n`;
                body += `![${displayName} Animation](${imageBaseUrl}/${gifName})\n\n`;
                
                body += `---\n\n`;
              }

              body += `### 📊 Summary Table\n\n`;
              body += `| Screenshot | Status | Difference |\n`;
              body += `|------------|--------|------------|\n`;
              for (const result of results.results) {
                if (result.skipped) {
                  body += `| ${result.name.replace('.png', '')} | ⚠️ Skipped | N/A |\n`;
                } else {
                  const status = result.hasDiff ? '⚠️ Changed' : '✅ No change';
                  const name = result.name.replace('.png', '');
                  body += `| ${name} | ${status} | ${result.diffPercentage}% |\n`;
                }
              }
            } else {
              body += `### ✅ No Visual Changes Detected\n\n`;
              body += `All screenshots match the base branch! 🎉\n\n`;
              
              body += `### 📊 All Screenshots Checked\n\n`;
              body += `| Screenshot | Status |\n`;
              body += `|------------|--------|\n`;
              for (const result of results.results) {
                if (result.skipped) {
                  body += `| ${result.name.replace('.png', '')} | ⚠️ Skipped |\n`;
                } else {
                  const name = result.name.replace('.png', '');
                  body += `| ${name} | ✅ No change |\n`;
                }
              }
            }

            body += `\n---\n\n`;
            body += `### 📦 Downloads\n\n`;
            body += `- 📸 [Base Screenshots](https://github.com/${{ github.repository }}/actions/runs/${runId}#artifacts)\n`;
            body += `- 📸 [PR Screenshots](https://github.com/${{ github.repository }}/actions/runs/${runId}#artifacts)\n`;
            body += `- 🎨 [Diff Images](https://github.com/${{ github.repository }}/actions/runs/${runId}#artifacts)\n`;
            body += `- 🎬 [GIF Animations](https://github.com/${{ github.repository }}/actions/runs/${runId}#artifacts)\n`;
            body += `- 🎥 [Video Recordings (Base)](https://github.com/${{ github.repository }}/actions/runs/${runId}#artifacts)\n`;
            body += `- 🎥 [Video Recordings (PR)](https://github.com/${{ github.repository }}/actions/runs/${runId}#artifacts)\n`;
            body += `- 💾 [Version-Controlled Baselines](https://github.com/${{ github.repository }}/tree/vrt-baselines/pr-${prNumber})\n\n`;
            body += `💡 **Pro tip:** The baselines are saved to the \`vrt-baselines\` branch for future reference!`;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body
            });

      - name: Update comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `❌ **Visual Regression Testing Failed** @${username}\n\n` +
                    `Something went wrong during the screenshot capture or comparison.\n\n` +
                    `Check the logs for details: [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
