name: Visual Regression Testing

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  visual-regression:
    if: >-
      (github.actor != 'dependabot[bot]') &&
      ((github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/vrt')))
    runs-on: ubuntu-latest

    steps:
      - name: React to comment (if triggered by comment)
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            });

      - name: Get PR details
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.eventName === 'issue_comment'
              ? context.issue.number
              : context.payload.number;

            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            return {
              ref: pr.data.head.ref,
              sha: pr.data.head.sha,
              number: pr.data.number,
              base_ref: pr.data.base.ref,
              base_sha: pr.data.base.sha
            };

      - name: Post initial comment
        id: vrt_comment
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ fromJSON(steps.pr.outputs.result).number }},
              body: `${initial_spinner} **Visual Regression Testing, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `${checklist_spinner} Checkout & Setup Base\n` +
                    `⬜ Building Base Version\n` +
                    `⬜ Building PR Version\n\n` +
                    `📸 **Capture Phase:**\n` +
                    `⬜ Taking Base Screenshots + Video\n` +
                    `⬜ Taking PR Screenshots + Video\n\n` +
                    `🎨 **Analysis Phase:**\n` +
                    `⬜ Comparing Screenshots\n` +
                    `⬜ Generating Diff Images & GIFs\n\n` +
                    `💾 **Storage Phase:**\n` +
                    `⬜ Saving to vrt-baselines\n` +
                    `⬜ Uploading inline assets\n\n` +
                    `_Hold tight, this is going to be EPIC!_ 🚀`
            });
            return comment.data.id;

      # ============================================================
      # BUILD BASE VERSION
      # ============================================================
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).base_sha }}
          path: base

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: base/package-lock.json

      - name: Install dependencies (base)
        working-directory: base
        run: npm ci

      - name: Update comment - Building Base
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `${initial_spinner} **Visual Regression Testing, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup Base\n` +
                    `${checklist_spinner} Building Base Version\n` +
                    `⬜ Building PR Version\n\n` +
                    `📸 **Capture Phase:**\n` +
                    `⬜ Taking Base Screenshots + Video\n` +
                    `⬜ Taking PR Screenshots + Video\n\n` +
                    `🎨 **Analysis Phase:**\n` +
                    `⬜ Comparing Screenshots\n` +
                    `⬜ Generating Diff Images & GIFs\n\n` +
                    `💾 **Storage Phase:**\n` +
                    `⬜ Saving to vrt-baselines\n` +
                    `⬜ Uploading inline assets`
            });

      - name: Build base version
        working-directory: base
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start base server
        working-directory: base
        run: |
          npx http-server build -p 8080 &
          echo $! > ../base-server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/ > /dev/null; then
              echo "Base server is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Base server failed to start"
              exit 1
            fi
            sleep 1
          done

      # ============================================================
      # PLAYWRIGHT + VIDEO
      # ============================================================
      - name: Install Playwright and dependencies
        run: |
          npm init -y
          npm install --save-dev @playwright/test@latest gifenc pngjs pixelmatch
          npx playwright install --with-deps chromium

      - name: Create Playwright config with video recording
        run: |
          cat > playwright.config.js << 'EOF'
          const { defineConfig, devices } = require('@playwright/test');
          module.exports = defineConfig({
            testDir: '.',
            timeout: 60000,
            fullyParallel: false,
            forbidOnly: !!process.env.CI,
            retries: 2,
            workers: 1,
            reporter: 'list',
            use: {
              trace: 'retain-on-failure',
              screenshot: 'only-on-failure',
              viewport: { width: 1366, height: 900 },
              video: { mode: 'on', size: { width: 1366, height: 900 } }
            },
            projects: [{ name: 'chromium', use: { ...devices['Desktop Chrome'] } }]
          });
          EOF

      - name: Create Playwright test (tabs by index incl. Songs)
        run: |
          cat > screenshot-test.spec.js << 'EOF'
          const { test, expect } = require('@playwright/test');

          const PORT = process.env.PORT || '8080';
          const BASE = `http://localhost:${PORT}`;

          async function waitEditor(page) {
            await page.goto(`${BASE}/editor.html`);
            await page.waitForLoadState('networkidle');
            await page.waitForSelector('[class*="menu-bar"]', { timeout: 20000 });
            await page.waitForTimeout(1500);
          }

          async function clickTabByIndex(page, index) {
            const tabList = page.locator('[role="tablist"]').first();
            await expect(tabList).toBeVisible({ timeout: 10000 });
            const tab = tabList.locator('[role="tab"]').nth(index);
            await expect(tab).toBeVisible({ timeout: 5000 });
            await tab.scrollIntoViewIfNeeded();
            await tab.click();
            await page.waitForTimeout(800);
          }

          test.describe('Visual Regression Screenshots', () => {
            test('Editor - Initial Load', async ({ page }) => {
              await waitEditor(page);
              await page.screenshot({ path: 'screenshots/editor-initial.png', fullPage: true });
            });

            test('Editor - Blocks Workspace', async ({ page }) => {
              await waitEditor(page);
              const editorWrapper = page.locator('[class*="editor-wrapper"]').first();
              if (await editorWrapper.count()) {
                await editorWrapper.screenshot({ path: 'screenshots/blocks-workspace.png' });
              } else {
                await page.screenshot({ path: 'screenshots/blocks-workspace.png', fullPage: false });
              }
            });

            test('Editor - Stage and Sprites', async ({ page }) => {
              await waitEditor(page);
              const stageWrapper = page.locator('[class*="stage-and-target-wrapper"]').first();
              if (await stageWrapper.count()) {
                await stageWrapper.screenshot({ path: 'screenshots/stage-sprites.png' });
              } else {
                await page.screenshot({ path: 'screenshots/stage-sprites.png', clip: { x: 0, y: 0, width: 600, height: 800 } });
              }
            });

            test('Editor - Code Tab', async ({ page }) => {
              await waitEditor(page);
              await clickTabByIndex(page, 0);
              await page.screenshot({ path: 'screenshots/code-tab.png', fullPage: true });
            });

            test('Editor - Costumes Tab', async ({ page }) => {
              await waitEditor(page);
              await clickTabByIndex(page, 1);
              await page.screenshot({ path: 'screenshots/costumes-tab.png', fullPage: true });
            });

            test('Editor - Sounds Tab', async ({ page }) => {
              await waitEditor(page);
              await clickTabByIndex(page, 2);
              await page.screenshot({ path: 'screenshots/sounds-tab.png', fullPage: true });
            });

            test('Editor - Songs Tab', async ({ page }) => {
              await waitEditor(page);
              await clickTabByIndex(page, 3);
              await page.screenshot({ path: 'screenshots/songs-tab.png', fullPage: true });
            });

            test('Player View', async ({ page }) => {
              await page.goto(`${BASE}/`);
              await page.waitForLoadState('networkidle');
              await page.waitForTimeout(1000);
              await page.screenshot({ path: 'screenshots/player-view.png', fullPage: true });
            });
          });
          EOF

      # ============================================================
      # CAPTURE BASE SCREENSHOTS
      # ============================================================
      - name: Update comment - Capturing Base Screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `${initial_spinner} **Visual Regression Testing, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup Base\n` +
                    `✅ Building Base Version\n` +
                    `⬜ Building PR Version\n\n` +
                    `📸 **Capture Phase:**\n` +
                    `${checklist_spinner} Taking Base Screenshots + Video\n` +
                    `⬜ Taking PR Screenshots + Video\n\n` +
                    `🎨 **Analysis Phase:**\n` +
                    `⬜ Comparing Screenshots\n` +
                    `⬜ Generating Diff Images & GIFs\n\n` +
                    `💾 **Storage Phase:**\n` +
                    `⬜ Saving to vrt-baselines\n` +
                    `⬜ Uploading inline assets`
            });

      - name: Capture base screenshots
        run: |
          mkdir -p screenshots-base videos-base
          rm -rf screenshots test-results
          npx playwright test screenshot-test.spec.js --project=chromium
          # Move the FILES, not the folder, so compare can find them
          shopt -s nullglob dotglob
          cp -R screenshots/* screenshots-base/ 2>/dev/null || true
          rm -rf screenshots
          # Move videos if they exist
          find test-results -name "*.webm" -exec mv {} videos-base/ \; 2>/dev/null || true

      - name: Stop base server
        if: always()
        run: |
          if [ -f base-server.pid ]; then
            kill $(cat base-server.pid) || true
            rm base-server.pid
          fi

      # ============================================================
      # BUILD PR VERSION
      # ============================================================
      - name: Update comment - Building PR
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `${initial_spinner} **Visual Regression Testing, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup Base\n` +
                    `✅ Building Base Version\n` +
                    `${checklist_spinner} Building PR Version\n\n` +
                    `📸 **Capture Phase:**\n` +
                    `✅ Taking Base Screenshots + Video\n` +
                    `⬜ Taking PR Screenshots + Video\n\n` +
                    `🎨 **Analysis Phase:**\n` +
                    `⬜ Comparing Screenshots\n` +
                    `⬜ Generating Diff Images & GIFs\n\n` +
                    `💾 **Storage Phase:**\n` +
                    `⬜ Saving to vrt-baselines\n` +
                    `⬜ Uploading inline assets`
            });

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJSON(steps.pr.outputs.result).sha }}
          path: pr

      - name: Install dependencies (PR)
        working-directory: pr
        run: npm ci

      - name: Build PR version
        working-directory: pr
        run: npm run build
        env:
          NODE_ENV: production

      - name: Start PR server
        working-directory: pr
        run: |
          npx http-server build -p 8081 &
          echo $! > ../pr-server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:8081/ > /dev/null; then
              echo "PR server is ready!"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "PR server failed to start"
              exit 1
            fi
            sleep 1
          done

      # ============================================================
      # CAPTURE PR SCREENSHOTS
      # ============================================================
      - name: Update comment - Capturing PR Screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `${initial_spinner} **Visual Regression Testing, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup Base\n` +
                    `✅ Building Base Version\n` +
                    `✅ Building PR Version\n\n` +
                    `📸 **Capture Phase:**\n` +
                    `✅ Taking Base Screenshots + Video\n` +
                    `${checklist_spinner} Taking PR Screenshots + Video\n\n` +
                    `🎨 **Analysis Phase:**\n` +
                    `⬜ Comparing Screenshots\n` +
                    `⬜ Generating Diff Images & GIFs\n\n` +
                    `💾 **Storage Phase:**\n` +
                    `⬜ Saving to vrt-baselines\n` +
                    `⬜ Uploading inline assets`
            });

      - name: Capture PR screenshots
        env:
          PORT: '8081'
        run: |
          mkdir -p screenshots-pr videos-pr
          rm -rf screenshots test-results
          npx playwright test screenshot-test.spec.js --project=chromium
          shopt -s nullglob dotglob
          cp -R screenshots/* screenshots-pr/ 2>/dev/null || true
          rm -rf screenshots
          find test-results -name "*.webm" -exec mv {} videos-pr/ \; 2>/dev/null || true

      - name: Stop PR server
        if: always()
        run: |
          if [ -f pr-server.pid ]; then
            kill $(cat pr-server.pid) || true
            rm pr-server.pid
          fi

      # ============================================================
      # COMPARE & CREATE GIFs
      # ============================================================
      - name: Update comment - Comparing Screenshots
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `${initial_spinner} **Visual Regression Testing, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup Base\n` +
                    `✅ Building Base Version\n` +
                    `✅ Building PR Version\n\n` +
                    `📸 **Capture Phase:**\n` +
                    `✅ Taking Base Screenshots + Video\n` +
                    `✅ Taking PR Screenshots + Video\n\n` +
                    `🎨 **Analysis Phase:**\n` +
                    `${checklist_spinner} Comparing Screenshots & Generating Diff/GIFs\n\n` +
                    `💾 **Storage Phase:**\n` +
                    `⬜ Saving to vrt-baselines\n` +
                    `⬜ Uploading inline assets`
            });

      - name: Compare screenshots and generate GIFs
        id: compare
        run: |
          cat > compare-and-gif.js << 'EOF'
          const fs = require('fs');
          const PNG = require('pngjs').PNG;
          const pixelmatch = require('pixelmatch');
          const { GIFEncoder, quantize, applyPalette } = require('gifenc');

          const screenshots = [
            'editor-initial.png',
            'blocks-workspace.png',
            'stage-sprites.png',
            'code-tab.png',
            'costumes-tab.png',
            'sounds-tab.png',
            'songs-tab.png',
            'player-view.png'
          ];

          let changesDetected = false;
          const results = [];

          fs.mkdirSync('screenshots-diff', { recursive: true });
          fs.mkdirSync('screenshots-gifs', { recursive: true });

          for (const screenshot of screenshots) {
            const basePath = `screenshots-base/${screenshot}`;
            const prPath = `screenshots-pr/${screenshot}`;

            if (!fs.existsSync(basePath) || !fs.existsSync(prPath)) {
              console.log(`Skipping ${screenshot} - file not found`);
              results.push({ name: screenshot, skipped: true });
              continue;
            }

            const base = PNG.sync.read(fs.readFileSync(basePath));
            const pr = PNG.sync.read(fs.readFileSync(prPath));

            const { width, height } = base;
            const diff = new PNG({ width, height });

            const numDiffPixels = pixelmatch(
              base.data,
              pr.data,
              diff.data,
              width,
              height,
              { threshold: 0.1 }
            );

            const diffPercentage = ((numDiffPixels / (width * height)) * 100).toFixed(2);

            if (numDiffPixels > 0) {
              changesDetected = true;
              fs.writeFileSync(`screenshots-diff/${screenshot}`, PNG.sync.write(diff));
              try {
                const gif = GIFEncoder();
                const frames = [base, pr, diff];
                const format = 'rgba444';
                for (const frame of frames) {
                  const palette = quantize(frame.data, 256, { format });
                  const index = applyPalette(frame.data, palette, format);
                  gif.writeFrame(index, width, height, { palette, delay: 900 });
                }
                gif.finish();
                const gifBuffer = Buffer.from(gif.bytes());
                fs.writeFileSync(`screenshots-gifs/${screenshot.replace('.png', '.gif')}`, gifBuffer);
              } catch (e) {
                console.log(`Could not create GIF for ${screenshot}: ${e.message}`);
              }
              results.push({ name: screenshot, diffPixels: numDiffPixels, diffPercentage, hasDiff: true, skipped: false });
            } else {
              results.push({ name: screenshot, diffPixels: 0, diffPercentage: '0.00', hasDiff: false, skipped: false });
            }
          }

          fs.writeFileSync('comparison-results.json', JSON.stringify({ changesDetected, results }, null, 2));
          EOF

          node compare-and-gif.js
          CHANGES=$(node -e "console.log(require('./comparison-results.json').changesDetected)")
          echo "changes_detected=$CHANGES" >> $GITHUB_OUTPUT

      # ============================================================
      # SAVE BASELINES TO VERSION CONTROL
      # ============================================================
      - name: Update comment - Saving Baselines
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `${initial_spinner} **Visual Regression Testing, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup Base\n` +
                    `✅ Building Base Version\n` +
                    `✅ Building PR Version\n\n` +
                    `📸 **Capture Phase:**\n` +
                    `✅ Taking Base Screenshots + Video\n` +
                    `✅ Taking PR Screenshots + Video\n\n` +
                    `🎨 **Analysis Phase:**\n` +
                    `✅ Comparing Screenshots & Generating Diff/GIFs\n\n` +
                    `💾 **Storage Phase:**\n` +
                    `${checklist_spinner} Saving to vrt-baselines\n` +
                    `⬜ Uploading inline assets`
            });

      - name: Save baseline screenshots to vrt-baselines branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if git ls-remote --heads https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git vrt-baselines | grep -q vrt-baselines; then
            git clone --single-branch --branch vrt-baselines --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git vrt-baselines-repo
            cd vrt-baselines-repo
          else
            git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git vrt-baselines-repo
            cd vrt-baselines-repo
            git checkout --orphan vrt-baselines
            git rm -rf . 2>/dev/null || true
          fi
          
          rm -rf .github
          
          mkdir -p pr-${{ fromJSON(steps.pr.outputs.result).number }}/base
          mkdir -p pr-${{ fromJSON(steps.pr.outputs.result).number }}/pr
          mkdir -p pr-${{ fromJSON(steps.pr.outputs.result).number }}/diff
          
          cp -r ../screenshots-base/* pr-${{ fromJSON(steps.pr.outputs.result).number }}/base/ 2>/dev/null || true
          cp -r ../screenshots-pr/*   pr-${{ fromJSON(steps.pr.outputs.result).number }}/pr/   2>/dev/null || true
          cp -r ../screenshots-diff/* pr-${{ fromJSON(steps.pr.outputs.result).number }}/diff/ 2>/dev/null || true
          
          cat > pr-${{ fromJSON(steps.pr.outputs.result).number }}/README.md << 'READMEEOF'
          # Visual Regression Baseline
          - Base SHA: `${{ fromJSON(steps.pr.outputs.result).base_sha }}`
          - PR SHA: `${{ fromJSON(steps.pr.outputs.result).sha }}`
          - Run: [#${{ github.run_number }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - Date: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          READMEEOF
          
          git add .
          git commit -m "Add VRT baselines for PR #${{ fromJSON(steps.pr.outputs.result).number }}" || echo "No changes to commit"
          git push origin vrt-baselines || git push -u origin vrt-baselines

      # ============================================================
      # UPLOAD INLINE ASSETS (ALWAYS)
      # ============================================================
      - name: Update comment - Uploading Inline Assets
        uses: actions/github-script@v7
        with:
          script: |
            const initial_spinner = '<img src="https://lh5.googleusercontent.com/proxy/OUqG0HgVNVMNorlPCmI4VgJa-3h7uHLkkMy9vdJ0eRsQlvJBytFUS-HvuW-O9EJd-c9xB7KAqlwby4Fzp59g1705FzBuP-F8dC1ZaBQtmLeCu5i6FfSd6Mmzh8mjOwgrEYZwy5UStg" width="20" height="20">';
            const checklist_spinner = '<img src="https://github.com/user-attachments/assets/881cd049-000f-4b24-a868-9831c3ea9019" width="18" height="18">';
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `${initial_spinner} **Visual Regression Testing, requested by @${username}...**\n\n` +
                    `🏗️ **Build Phase:**\n` +
                    `✅ Checkout & Setup Base\n` +
                    `✅ Building Base Version\n` +
                    `✅ Building PR Version\n\n` +
                    `📸 **Capture Phase:**\n` +
                    `✅ Taking Base Screenshots + Video\n` +
                    `✅ Taking PR Screenshots + Video\n\n` +
                    `🎨 **Analysis Phase:**\n` +
                    `✅ Comparing Screenshots & Generating Diff/GIFs\n\n` +
                    `💾 **Storage Phase:**\n` +
                    `${checklist_spinner} Saving to vrt-baselines\n` +
                    `${checklist_spinner} Uploading inline assets`
            });

      - name: Upload assets to vrt-images branch (base/pr/diff/gifs/videos)
        id: upload_assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git vrt-images | grep -q vrt-images; then
            git clone --single-branch --branch vrt-images --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git vrt-images-repo
            cd vrt-images-repo
          else
            git clone --depth 1 https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git vrt-images-repo
            cd vrt-images-repo
            git checkout --orphan vrt-images
            git rm -rf . 2>/dev/null || true
          fi

          rm -rf .github

          RUN_DIR="pr-${{ fromJSON(steps.pr.outputs.result).number }}/run-${{ github.run_number }}"
          mkdir -p "$RUN_DIR/base" "$RUN_DIR/pr" "$RUN_DIR/diff" "$RUN_DIR/gifs" "$RUN_DIR/videos-base" "$RUN_DIR/videos-pr"

          cp -r ../screenshots-base/* "$RUN_DIR/base/" 2>/dev/null || true
          cp -r ../screenshots-pr/*   "$RUN_DIR/pr/"   2>/dev/null || true
          cp -r ../screenshots-diff/* "$RUN_DIR/diff/" 2>/dev/null || true
          cp -r ../screenshots-gifs/* "$RUN_DIR/gifs/" 2>/dev/null || true
          cp -r ../videos-base/*      "$RUN_DIR/videos-base/" 2>/dev/null || true
          cp -r ../videos-pr/*        "$RUN_DIR/videos-pr/" 2>/dev/null || true

          git add .
          git commit -m "VRT assets for PR #${{ fromJSON(steps.pr.outputs.result).number }} run #${{ github.run_number }}" || echo "No changes"
          git push origin vrt-images || git push -u origin vrt-images

          echo "base_url=https://raw.githubusercontent.com/${{ github.repository }}/vrt-images/$RUN_DIR/base" >> $GITHUB_OUTPUT
          echo "pr_url=https://raw.githubusercontent.com/${{ github.repository }}/vrt-images/$RUN_DIR/pr" >> $GITHUB_OUTPUT
          echo "diff_url=https://raw.githubusercontent.com/${{ github.repository }}/vrt-images/$RUN_DIR/diff" >> $GITHUB_OUTPUT
          echo "gif_url=https://raw.githubusercontent.com/${{ github.repository }}/vrt-images/$RUN_DIR/gifs" >> $GITHUB_OUTPUT
          echo "videos_base_url=https://raw.githubusercontent.com/${{ github.repository }}/vrt-images/$RUN_DIR/videos-base" >> $GITHUB_OUTPUT
          echo "videos_pr_url=https://raw.githubusercontent.com/${{ github.repository }}/vrt-images/$RUN_DIR/videos-pr" >> $GITHUB_OUTPUT

      # ============================================================
      # ARTIFACTS
      # ============================================================
      - name: Upload comparison results
        uses: actions/upload-artifact@v4
        with:
          name: comparison-results
          path: comparison-results.json

      - name: Upload all screenshots and videos (single artifact)
        uses: actions/upload-artifact@v4
        with:
          name: vrt-assets
          path: |
            screenshots-base/
            screenshots-pr/
            screenshots-diff/
            screenshots-gifs/
            videos-base/
            videos-pr/

      # ============================================================
      # POST RESULTS WITH INLINE ASSETS
      # ============================================================
      - name: Post results comment with inline assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const results = JSON.parse(fs.readFileSync('comparison-results.json', 'utf8'));
            const prNumber = ${{ fromJSON(steps.pr.outputs.result).number }};
            const runId = context.runId;
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;

            const baseURL = '${{ steps.upload_assets.outputs.base_url }}';
            const prURL   = '${{ steps.upload_assets.outputs.pr_url }}';
            const diffURL = '${{ steps.upload_assets.outputs.diff_url }}';
            const gifURL  = '${{ steps.upload_assets.outputs.gif_url }}';
            const vBase   = '${{ steps.upload_assets.outputs.videos_base_url }}';
            const vPr     = '${{ steps.upload_assets.outputs.videos_pr_url }}';

            const display = n => n.replace('.png','').replace(/-/g,' ').replace(/\b\w/g, l => l.toUpperCase());

            let body = `## 🎬 Visual Regression Test Results\n\n`;
            body += `Hi @${username}! Inline previews below. Scroll for all views.\n\n`;

            // Inline gallery
            const items = results.results.length ? results.results : [];
            for (const r of items) {
              const name = r.name || '';
              if (!name) continue;
              const dname = display(name);

              body += `### ${dname}\n`;
              body += `<table><thead><tr><th align="left">Base</th><th align="left">PR</th></tr></thead><tbody>`;
              body += `<tr><td><img src="${baseURL}/${name}" width="420"/></td><td><img src="${prURL}/${name}" width="420"/></td></tr>`;
              body += `</tbody></table>\n`;

              if (r.hasDiff) {
                body += `Diff and Animation:\n\n`;
                body += `<img src="${diffURL}/${name}" width="840"/>\n\n`;
                body += `<img src="${gifURL}/${name.replace('.png','.gif')}" width="840"/>\n\n`;
              } else if (r.skipped) {
                body += `_Skipped (file not found)._\n\n`;
              } else {
                body += `_No pixel difference detected._\n\n`;
              }
            }

            // Videos (link list)
            function listFiles(dir) {
              try {
                return fs.readdirSync(dir).filter(f => f.endsWith('.webm'));
              } catch { return []; }
            }
            const vBaseNames = listFiles('videos-base');
            const vPrNames   = listFiles('videos-pr');

            body += `\n---\n`;
            body += `### 🎥 Video Recordings (links)\n`;
            if (!vBaseNames.length && !vPrNames.length) {
              body += `_No videos captured._\n`;
            } else {
              if (vBaseNames.length) {
                body += `- Base: `;
                body += vBaseNames.map(f => `[${f}](${vBase}/${encodeURIComponent(f)})`).join(' • ');
                body += `\n`;
              }
              if (vPrNames.length) {
                body += `- PR: `;
                body += vPrNames.map(f => `[${f}](${vPr}/${encodeURIComponent(f)})`).join(' • ');
                body += `\n`;
              }
            }

            body += `\n---\n`;
            body += `### 📦 Downloads\n`;
            body += `- [Artifacts for this run](https://github.com/${{ github.repository }}/actions/runs/${runId}#artifacts)\n`;
            body += `- [Version-Controlled Baselines](https://github.com/${{ github.repository }}/tree/vrt-baselines/pr-${prNumber})\n`;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body
            });

      - name: Update comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const username = context.eventName === 'issue_comment'
              ? context.payload.comment.user.login
              : context.payload.pull_request.user.login;
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: ${{ steps.vrt_comment.outputs.result }},
              body: `❌ **Visual Regression Testing Failed** @${username}\n\n` +
                    `Something went wrong during the screenshot capture or comparison.\n\n` +
                    `Check the logs for details: [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`
            });
