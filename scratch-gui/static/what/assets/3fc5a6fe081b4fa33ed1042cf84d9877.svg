<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="551.05105" height="478.97898" viewBox="0,0,551.05105,478.97898"><g transform="translate(38.96929,41.26266)"><g data-paper-data="{&quot;isPaintingLayer&quot;:true}" fill-rule="nonzero" stroke="none" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" style="mix-blend-mode: normal"><path d="M-38.96929,437.71632v-478.97898h551.05105v478.97898z" fill="#000000" stroke-width="0"></path><text transform="translate(38.7593,59.34488) scale(0.53221,0.53221)" font-size="40" xml:space="preserve" fill="#ffffff" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">And with that...</tspan><tspan x="0" dy="46.150000000000006px">Amp became a hero, and saved</tspan><tspan x="0" dy="46.150000000000006px">OmniBlocks forever.</tspan><tspan x="0" dy="46.150000000000006px">When he accidentally deleted main</tspan><tspan x="0" dy="46.150000000000006px">we though we were screwed for sure.</tspan><tspan x="0" dy="46.150000000000006px">Thankfully, Amp came in clutch and </tspan><tspan x="0" dy="46.150000000000006px">he restored a backup of main that had</tspan><tspan x="0" dy="46.150000000000006px">all the recent commits.</tspan><tspan x="0" dy="46.150000000000006px">We dedicate this easter egg to Amp.</tspan><tspan x="0" dy="46.150000000000006px">Thank you, Amp. You saved OmniBlocks </tspan></text><text transform="translate(84.5704,330.53429) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#ffffff" fill-rule="nonzero" stroke="none" stroke-width="1" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10" stroke-dasharray="" stroke-dashoffset="0" font-family="Sans Serif" font-weight="normal" text-anchor="start" style="mix-blend-mode: normal"><tspan x="0" dy="0">Music: Apollo 13 Main Theme </tspan></text></g></g></svg>