name: PR Test Reporter

on:
  pull_request:
    branches: [ develop ]

jobs:
  test-and-comment:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests and capture output
      - name: Run tests
        id: tests
        run: |
          npm run test > test-output.txt 2>&1 || echo "TESTS_FAILED=true" >> $GITHUB_ENV
          echo "TEST_OUTPUT=$(cat test-output.txt | jq -R -s -c '.')" >> $GITHUB_ENV

      # 5. AI Summary (using YOUR original AI inference action)
      - name: Generate test summary
        if: env.TESTS_FAILED == 'true'
        id: ai-summary
        uses: actions/ai-inference@v1  # From your original workflow
        with:
          prompt: |
            Summarize these test failures for a GitHub PR comment:
            - Start with "❌ Tests failed"
            - List 1-3 key errors (file + error type)
            - Format as bullet points
            - Keep it under 200 words
            - Example:
              """
              ❌ Tests failed
              - `src/utils.js`: TypeError: undefined is not a function
              - `test/api.js`: Timeout of 2000ms exceeded
              """

            Raw test output:
            ${{ env.TEST_OUTPUT }}

      # 6. Post comment to PR
      - name: Comment on PR
        if: env.TESTS_FAILED == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `
                ${{ steps.ai-summary.outputs.response }}

                <details>
                  <summary>📜 Full Test Output</summary>
                  <pre>${{ env.TEST_OUTPUT }}</pre>
                </details>
              `
            });
