name: Test Monitor (Auto-Issue on Fail)

on:
  push:
    branches: [ main, master ]  # Runs on every commit to main/master

jobs:
  test-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # Required to create issues

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests and capture output
      - name: Run tests
        id: tests
        run: |
          npm run test > test-output.txt 2>&1 || echo "TESTS_FAILED=true" >> $GITHUB_ENV
          echo "TEST_OUTPUT=$(cat test-output.txt | jq -R -s -c '.')" >> $GITHUB_ENV

      # 5. Generate AI summary (only if tests failed)
      - name: Generate failure summary
        if: env.TESTS_FAILED == 'true'
        id: ai-summary
        uses: actions/ai@v0
        with:
          prompt: |
            Create a GitHub issue body for failed tests:
            - Start with "🚨 Tests failed in commit: [SHA]"
            - List 1-3 key failures (file + error snippet)
            - Add a "How to Reproduce" section
            - Format as markdown
            - Keep it under 200 words

            Test output:
            ${{ env.TEST_OUTPUT }}
 
            Commit: ${{ github.sha }}

      # 6. Create issue if tests failed
      - name: Create failure issue
        if: env.TESTS_FAILED == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Tests failed in ${context.sha.substring(0, 7)}`,
              body: `
                ${{ steps.ai-summary.outputs.response }}

                **Full Test Output:**
                <details>
                  <pre>${{ env.TEST_OUTPUT }}</pre>
                </details>

                *Triggered by push to ${context.ref}*
              `,
              labels: ['tests', 'bug']
            });
