name: Test Monitor (Auto-Issue on Fail)

on:
  push:
    branches: [develop]

jobs:
  test-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      # 1. Checkout code
      - uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      # 3. Install dependencies
      - name: Install dependencies
        run: npm install

      # 4. Run tests and capture output
      - name: Run tests
        id: tests
        run: |
          npm run test > test-output.txt 2>&1 || echo "TESTS_FAILED=true" >> $GITHUB_ENV
          echo "TEST_OUTPUT=$(cat test-output.txt)" >> $GITHUB_ENV
          echo "SHORT_SHA=${GITHUB_SHA:0:7}" >> $GITHUB_ENV

      # 5. Generate failure summary with AI
      - name: Generate failure report
        if: env.TESTS_FAILED == 'true'
        id: ai-summary
        uses: actions/ai-inference@v1  # From your original workflow
        with:
          prompt: |
            Create a GitHub issue body for test failures in commit ${{ env.SHORT_SHA }}:
            - Start with "🚨 Tests failed in commit: ${{ env.SHORT_SHA }}"
            - List 1-3 key failures (file + error snippet)
            - Add reproduction steps
            - Format as markdown
            - Keep under 200 words

            Test output:
            ${{ env.TEST_OUTPUT }}

      # 6. Create issue if tests failed
      - name: Create failure issue
        if: env.TESTS_FAILED == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Tests failed in ${process.env.SHORT_SHA}`,
              body: `
                ${{ steps.ai-summary.outputs.response }}

                **Full Output:**
                <details>
                  <pre>${{ env.TEST_OUTPUT }}</pre>
                </details>

                *Triggered by push to ${context.ref}*
              `,
              labels: ['tests', 'bug']
            });
